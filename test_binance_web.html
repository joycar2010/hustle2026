<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance API 测试页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #f0b90b;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .test-button {
            display: block;
            width: 200px;
            margin: 0 auto 30px;
            padding: 15px 30px;
            background: #f0b90b;
            color: #1e1e2e;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .test-button:hover {
            background: #ffc107;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(240, 185, 11, 0.3);
        }

        .test-button:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            text-align: center;
            color: #f0b90b;
            margin: 20px 0;
            font-size: 18px;
        }

        .account-card {
            background: #252930;
            border: 1px solid #2b3139;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .account-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #2b3139;
        }

        .account-name {
            font-size: 20px;
            font-weight: bold;
            color: #f0b90b;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-success {
            background: rgba(14, 203, 129, 0.2);
            color: #0ecb81;
        }

        .status-error {
            background: rgba(246, 70, 93, 0.2);
            color: #f6465d;
        }

        .status-warning {
            background: rgba(240, 185, 11, 0.2);
            color: #f0b90b;
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .data-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: #1e1e2e;
            border-radius: 8px;
        }

        .data-label {
            color: #888;
            font-size: 14px;
        }

        .data-value {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
        }

        .value-positive {
            color: #0ecb81;
        }

        .value-negative {
            color: #f6465d;
        }

        .value-neutral {
            color: #e0e0e0;
        }

        .value-unavailable {
            color: #888;
        }

        .value-banned {
            color: #f0b90b;
        }

        .error-message {
            background: rgba(246, 70, 93, 0.1);
            border: 1px solid #f6465d;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            color: #f6465d;
            font-size: 14px;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #f0b90b;
            margin: 20px 0 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Binance API 测试页面</h1>

        <button class="test-button" id="testButton" onclick="runTest()">开始测试</button>

        <div id="loading" class="loading" style="display: none;">
            正在测试 Binance API...
        </div>

        <div id="results"></div>
    </div>

    <script>
        // Binance API credentials
        const API_KEY = 'DLtsEW0Ei6EVKE6lxlQqsoQ2SGMqcXoWrx97CFB9gVckp8PF87iFxF3URW9S3NSI';
        const API_SECRET = 'fqqLLpgecb2Wb1AsHhx1zxUeNCU1nAKg21k9xnZuETyRJBNRxFuyK99TtAgnCbhp';

        async function runTest() {
            const button = document.getElementById('testButton');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');

            button.disabled = true;
            loading.style.display = 'block';
            results.innerHTML = '';

            try {
                // Test Spot Account
                const spotData = await testSpotAccount();

                // Test Futures Account
                const futuresData = await testFuturesAccount();

                // Test Position Risk
                const positionsData = await testPositionRisk();

                // Test Income (Daily P&L)
                const dailyPnlData = await testDailyPnL();

                // Test Funding Fees
                const fundingFeeData = await testFundingFees();

                // Display results
                displayResults({
                    spot: spotData,
                    futures: futuresData,
                    positions: positionsData,
                    dailyPnl: dailyPnlData,
                    fundingFee: fundingFeeData
                });

            } catch (error) {
                results.innerHTML = `
                    <div class="account-card">
                        <div class="error-message">
                            测试失败: ${error.message}
                        </div>
                    </div>
                `;
            } finally {
                button.disabled = false;
                loading.style.display = 'none';
            }
        }

        async function testSpotAccount() {
            try {
                const timestamp = Date.now();
                const queryString = `timestamp=${timestamp}`;
                const signature = await generateSignature(queryString);

                const response = await fetch(`https://api.binance.com/api/v3/account?${queryString}&signature=${signature}`, {
                    headers: {
                        'X-MBX-APIKEY': API_KEY
                    }
                });

                if (!response.ok) {
                    const error = await response.json();
                    return { error: error, status: response.status };
                }

                return await response.json();
            } catch (error) {
                return { error: error.message };
            }
        }

        async function testFuturesAccount() {
            try {
                const timestamp = Date.now();
                const queryString = `timestamp=${timestamp}`;
                const signature = await generateSignature(queryString);

                const response = await fetch(`https://fapi.binance.com/fapi/v2/account?${queryString}&signature=${signature}`, {
                    headers: {
                        'X-MBX-APIKEY': API_KEY
                    }
                });

                if (!response.ok) {
                    const error = await response.json();
                    return { error: error, status: response.status };
                }

                return await response.json();
            } catch (error) {
                return { error: error.message };
            }
        }

        async function testPositionRisk() {
            try {
                const timestamp = Date.now();
                const queryString = `timestamp=${timestamp}`;
                const signature = await generateSignature(queryString);

                const response = await fetch(`https://fapi.binance.com/fapi/v2/positionRisk?${queryString}&signature=${signature}`, {
                    headers: {
                        'X-MBX-APIKEY': API_KEY
                    }
                });

                if (!response.ok) {
                    const error = await response.json();
                    return { error: error, status: response.status };
                }

                return await response.json();
            } catch (error) {
                return { error: error.message };
            }
        }

        async function testDailyPnL() {
            try {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const startTime = today.getTime();

                const timestamp = Date.now();
                const queryString = `incomeType=REALIZED_PNL&startTime=${startTime}&timestamp=${timestamp}`;
                const signature = await generateSignature(queryString);

                const response = await fetch(`https://fapi.binance.com/fapi/v1/income?${queryString}&signature=${signature}`, {
                    headers: {
                        'X-MBX-APIKEY': API_KEY
                    }
                });

                if (!response.ok) {
                    const error = await response.json();
                    return { error: error, status: response.status };
                }

                return await response.json();
            } catch (error) {
                return { error: error.message };
            }
        }

        async function testFundingFees() {
            try {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const startTime = today.getTime();

                const timestamp = Date.now();
                const queryString = `incomeType=FUNDING_FEE&startTime=${startTime}&timestamp=${timestamp}`;
                const signature = await generateSignature(queryString);

                const response = await fetch(`https://fapi.binance.com/fapi/v1/income?${queryString}&signature=${signature}`, {
                    headers: {
                        'X-MBX-APIKEY': API_KEY
                    }
                });

                if (!response.ok) {
                    const error = await response.json();
                    return { error: error, status: response.status };
                }

                return await response.json();
            } catch (error) {
                return { error: error.message };
            }
        }

        async function generateSignature(queryString) {
            const encoder = new TextEncoder();
            const data = encoder.encode(queryString);
            const key = encoder.encode(API_SECRET);

            const cryptoKey = await crypto.subtle.importKey(
                'raw',
                key,
                { name: 'HMAC', hash: 'SHA-256' },
                false,
                ['sign']
            );

            const signature = await crypto.subtle.sign('HMAC', cryptoKey, data);
            return Array.from(new Uint8Array(signature))
                .map(b => b.toString(16).padStart(2, '0'))
                .join('');
        }

        function getBanInfo(error) {
            if (!error || !error.msg) return null;

            const match = error.msg.match(/banned until (\d+)/);
            if (match) {
                const banUntilMs = parseInt(match[1]);
                const banUntilDate = new Date(banUntilMs);
                const now = new Date();
                const minutesLeft = Math.ceil((banUntilDate - now) / 1000 / 60);

                if (minutesLeft > 0) {
                    const hours = banUntilDate.getHours();
                    const minutes = banUntilDate.getMinutes();
                    const ampm = hours >= 12 ? 'PM' : 'AM';
                    const displayHours = hours % 12 || 12;
                    const displayMinutes = minutes.toString().padStart(2, '0');

                    return `限制至${displayHours}:${displayMinutes} ${ampm} (${minutesLeft}分钟)`;
                }
            }

            return null;
        }

        function formatValue(value, field, data) {
            // Check for ban
            if (data.error) {
                const banInfo = getBanInfo(data.error);
                if (banInfo) {
                    return { text: banInfo, class: 'value-banned' };
                }
                return { text: '暂无', class: 'value-unavailable' };
            }

            // Check for null/undefined
            if (value == null || value === undefined) {
                return { text: '暂无', class: 'value-unavailable' };
            }

            // Format number
            const num = parseFloat(value);
            if (isNaN(num)) {
                return { text: '暂无', class: 'value-unavailable' };
            }

            // Determine color
            let colorClass = 'value-neutral';
            if (['dailyPnl', 'fundingFee', 'unrealizedPnl'].includes(field)) {
                colorClass = num >= 0 ? 'value-positive' : 'value-negative';
            }

            // Format with sign for P&L fields
            const sign = num >= 0 && ['dailyPnl', 'fundingFee', 'unrealizedPnl'].includes(field) ? '+' : '';
            return {
                text: `${sign}${num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} USDT`,
                class: colorClass
            };
        }

        function displayResults(data) {
            const results = document.getElementById('results');

            // Calculate aggregated values
            let spotTotal = 0;
            let spotFree = 0;
            let spotLocked = 0;

            if (data.spot && !data.spot.error && data.spot.balances) {
                data.spot.balances.forEach(balance => {
                    if (balance.asset === 'USDT') {
                        spotTotal = parseFloat(balance.free) + parseFloat(balance.locked);
                        spotFree = parseFloat(balance.free);
                        spotLocked = parseFloat(balance.locked);
                    }
                });
            }

            const futuresTotal = data.futures && !data.futures.error ? parseFloat(data.futures.totalWalletBalance || 0) : 0;
            const futuresAvailable = data.futures && !data.futures.error ? parseFloat(data.futures.availableBalance || 0) : 0;
            const futuresMargin = data.futures && !data.futures.error ? parseFloat(data.futures.totalMarginBalance || 0) : 0;
            const futuresUnrealized = data.futures && !data.futures.error ? parseFloat(data.futures.totalUnrealizedProfit || 0) : 0;

            // Calculate total positions
            let totalPositions = 0;
            if (data.positions && !data.positions.error && Array.isArray(data.positions)) {
                data.positions.forEach(pos => {
                    const amt = parseFloat(pos.positionAmt || 0);
                    const price = parseFloat(pos.markPrice || 0);
                    if (amt !== 0) {
                        totalPositions += Math.abs(amt * price);
                    }
                });
            }

            // Calculate daily P&L
            let dailyPnl = 0;
            if (data.dailyPnl && !data.dailyPnl.error && Array.isArray(data.dailyPnl)) {
                dailyPnl = data.dailyPnl.reduce((sum, item) => sum + parseFloat(item.income || 0), 0);
            }

            // Calculate funding fees
            let fundingFee = 0;
            if (data.fundingFee && !data.fundingFee.error && Array.isArray(data.fundingFee)) {
                fundingFee = data.fundingFee.reduce((sum, item) => sum + parseFloat(item.income || 0), 0);
            }

            // Calculate final metrics
            const totalAssets = spotTotal + futuresTotal;
            const availableBalance = spotFree + futuresAvailable;
            const netAssets = futuresMargin;
            const frozenAssets = spotLocked + (futuresTotal - futuresAvailable);

            // Get margin balance from assets
            let marginBalance = 0;
            if (data.futures && !data.futures.error && data.futures.assets) {
                const usdtAsset = data.futures.assets.find(a => a.asset === 'USDT');
                if (usdtAsset) {
                    marginBalance = parseFloat(usdtAsset.marginBalance || 0);
                }
            }

            // Calculate risk ratio
            const totalMaintMargin = data.futures && !data.futures.error ? parseFloat(data.futures.totalMaintMargin || 0) : 0;
            const riskRatio = futuresMargin > 0 ? (totalMaintMargin / futuresMargin * 100) : 0;

            // Build HTML
            let html = `
                <div class="account-card">
                    <div class="account-header">
                        <div class="account-name">Binance 账户信息</div>
                        <div class="status-badge ${data.futures && data.futures.error ? 'status-error' : 'status-success'}">
                            ${data.futures && data.futures.error ? '部分失败' : '正常'}
                        </div>
                    </div>
            `;

            // Display aggregated data
            html += '<div class="data-grid">';

            const metrics = [
                { label: '账户总资产', value: totalAssets, field: 'totalAssets', data: data.spot },
                { label: '可用总资产', value: availableBalance, field: 'availableBalance', data: data.spot },
                { label: '净资产', value: netAssets, field: 'netAssets', data: data.futures },
                { label: '总持仓', value: totalPositions, field: 'totalPositions', data: data.positions },
                { label: '冻结资产', value: frozenAssets, field: 'frozenAssets', data: data.spot },
                { label: '当日盈亏', value: dailyPnl, field: 'dailyPnl', data: data.dailyPnl },
                { label: '保证金余额', value: marginBalance, field: 'marginBalance', data: data.futures },
                { label: '风险率', value: riskRatio, field: 'riskRatio', data: data.futures },
                { label: '掉期费', value: fundingFee, field: 'fundingFee', data: data.fundingFee }
            ];

            metrics.forEach(metric => {
                const formatted = formatValue(metric.value, metric.field, metric.data);
                html += `
                    <div class="data-item">
                        <span class="data-label">${metric.label}</span>
                        <span class="data-value ${formatted.class}">${formatted.text}</span>
                    </div>
                `;
            });

            html += '</div>';

            // Display errors if any
            if (data.futures && data.futures.error) {
                const banInfo = getBanInfo(data.futures.error);
                html += `
                    <div class="error-message">
                        <strong>合约账户错误:</strong> ${banInfo || data.futures.error.msg || '未知错误'}
                    </div>
                `;
            }

            html += '</div>';

            results.innerHTML = html;
        }
    </script>
</body>
</html>
