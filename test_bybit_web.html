<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bybit API 测试</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .test-button {
            display: block;
            width: 200px;
            margin: 0 auto 30px;
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .test-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .test-button:active {
            transform: translateY(0);
        }

        .test-button:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }

        .account-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .account-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .account-name {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .account-platform {
            padding: 5px 15px;
            background: #fbbf24;
            color: white;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .metric-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .metric-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .metric-value {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .metric-value.positive {
            color: #10b981;
        }

        .metric-value.negative {
            color: #ef4444;
        }

        .metric-value.warning {
            color: #f59e0b;
        }

        .metric-value.error {
            color: #ef4444;
        }

        .metric-value.unavailable {
            color: #9ca3af;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 18px;
            margin: 20px 0;
        }

        .error-message {
            background: #fee2e2;
            border: 1px solid #ef4444;
            color: #991b1b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .success-message {
            background: #d1fae5;
            border: 1px solid #10b981;
            color: #065f46;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .endpoint-info {
            background: #e0e7ff;
            padding: 10px 15px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 12px;
            color: #4338ca;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔷 Bybit API 测试</h1>

        <button class="test-button" onclick="testBybitAPI()" id="testBtn">
            开始测试
        </button>

        <div id="loading" class="loading" style="display: none;">
            正在测试 Bybit API...
        </div>

        <div id="results"></div>
    </div>

    <script>
        const API_KEY = 'KWL699v3EhZBVxzKOg';
        const API_SECRET = 'EiOw3inPLTVFrTmi0s2zEtTztWmuKfqGvSUg';
        const BASE_URL = 'https://api.bybit.com';

        function generateSignature(timestamp, params) {
            const recvWindow = '5000';
            const paramStr = Object.keys(params)
                .sort()
                .map(key => `${key}=${params[key]}`)
                .join('&');

            const signStr = timestamp + API_KEY + recvWindow + paramStr;
            return CryptoJS.HmacSHA256(signStr, API_SECRET).toString();
        }

        async function makeBybitRequest(endpoint, params = {}) {
            const timestamp = Date.now().toString();
            const signature = generateSignature(timestamp, params);

            const queryString = Object.keys(params)
                .map(key => `${key}=${encodeURIComponent(params[key])}`)
                .join('&');

            const url = `${BASE_URL}${endpoint}${queryString ? '?' + queryString : ''}`;

            try {
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'X-BAPI-API-KEY': API_KEY,
                        'X-BAPI-TIMESTAMP': timestamp,
                        'X-BAPI-SIGN': signature,
                        'X-BAPI-RECV-WINDOW': '5000'
                    }
                });

                const data = await response.json();

                if (data.retCode !== 0) {
                    throw new Error(data.retMsg || 'API Error');
                }

                return data.result;
            } catch (error) {
                console.error(`Error calling ${endpoint}:`, error);
                throw error;
            }
        }

        function formatNumber(num) {
            if (num === null || num === undefined) return '暂无';
            return parseFloat(num).toLocaleString('en-US', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }

        function getBanInfo(error) {
            if (!error) return null;

            // Check for rate limit ban
            if (error.toLowerCase().includes('rate limit') || error.toLowerCase().includes('banned')) {
                // Try to extract ban timestamp
                const match = error.match(/(\d{13})/);
                if (match) {
                    const banUntilMs = parseInt(match[1]);
                    const banUntilDate = new Date(banUntilMs);
                    const now = new Date();
                    const minutesLeft = Math.ceil((banUntilDate - now) / 1000 / 60);

                    if (minutesLeft > 0) {
                        const hours = banUntilDate.getHours();
                        const minutes = banUntilDate.getMinutes();
                        const ampm = hours >= 12 ? 'PM' : 'AM';
                        const displayHours = hours % 12 || 12;
                        const displayMinutes = minutes.toString().padStart(2, '0');

                        return `限制至${displayHours}:${displayMinutes} ${ampm} (${minutesLeft}分钟)`;
                    }
                }
                return '暂时受限';
            }

            return null;
        }

        async function testBybitAPI() {
            const btn = document.getElementById('testBtn');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');

            btn.disabled = true;
            loading.style.display = 'block';
            results.innerHTML = '';

            try {
                // Get today's start and end timestamps
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const startTime = today.getTime();
                const endTime = Date.now();

                const accountData = {
                    walletBalance: null,
                    positions: null,
                    accountInfo: null,
                    profitLoss: null,
                    fundingFee: null,
                    errors: {}
                };

                // 1. Get wallet balance with coin=USDT
                try {
                    accountData.walletBalance = await makeBybitRequest('/v5/account/wallet-balance', {
                        accountType: 'UNIFIED',
                        coin: 'USDT'
                    });
                } catch (error) {
                    accountData.errors.walletBalance = error.message;
                }

                // 2. Get positions with settleCoin=USDT
                try {
                    accountData.positions = await makeBybitRequest('/v5/position/list', {
                        category: 'linear',
                        settleCoin: 'USDT'
                    });
                } catch (error) {
                    accountData.errors.positions = error.message;
                }

                // 3. Get account info with coin=USDT
                try {
                    accountData.accountInfo = await makeBybitRequest('/v5/account/info', {
                        coin: 'USDT'
                    });
                } catch (error) {
                    accountData.errors.accountInfo = error.message;
                }

                // 4. Get profit/loss with settleCoin=USDT
                try {
                    accountData.profitLoss = await makeBybitRequest('/v5/position/closed-pnl', {
                        category: 'linear',
                        settleCoin: 'USDT',
                        startTime: startTime,
                        endTime: endTime,
                        limit: 50
                    });
                } catch (error) {
                    accountData.errors.profitLoss = error.message;
                }

                // 5. Get funding fee with settleCoin=USDT
                try {
                    accountData.fundingFee = await makeBybitRequest('/v5/account/funding-fee', {
                        category: 'linear',
                        settleCoin: 'USDT',
                        startTime: startTime,
                        endTime: endTime,
                        limit: 50
                    });
                } catch (error) {
                    accountData.errors.fundingFee = error.message;
                }

                // Calculate metrics
                const metrics = calculateMetrics(accountData);

                // Display results
                displayResults(metrics, accountData.errors);

            } catch (error) {
                results.innerHTML = `
                    <div class="error-message">
                        <strong>测试失败:</strong> ${error.message}
                    </div>
                `;
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }

        function calculateMetrics(data) {
            const metrics = {
                totalAssets: '暂无',
                availableBalance: '暂无',
                netAssets: '暂无',
                frozenAssets: '暂无',
                totalPositions: '暂无',
                dailyPnl: '暂无',
                marginBalance: '暂无',
                riskRatio: '暂无',
                fundingFee: '暂无'
            };

            // Wallet balance metrics
            if (data.walletBalance && data.walletBalance.list && data.walletBalance.list.length > 0) {
                const account = data.walletBalance.list[0];
                const equity = parseFloat(account.totalEquity || 0);
                const walletBalance = parseFloat(account.totalWalletBalance || 0);
                const availableBalance = parseFloat(account.totalAvailableBalance || 0);

                metrics.totalAssets = formatNumber(equity);
                metrics.netAssets = formatNumber(equity);
                metrics.availableBalance = formatNumber(availableBalance);
                metrics.frozenAssets = formatNumber(walletBalance - availableBalance);
            }

            // Positions metrics
            if (data.positions && data.positions.list) {
                let totalPositionValue = 0;
                let totalUnrealizedPnl = 0;

                data.positions.list.forEach(pos => {
                    const size = parseFloat(pos.size || 0);
                    const markPrice = parseFloat(pos.markPrice || 0);
                    const unrealizedPnl = parseFloat(pos.unrealisedPnl || 0);

                    totalPositionValue += Math.abs(size * markPrice);
                    totalUnrealizedPnl += unrealizedPnl;
                });

                metrics.totalPositions = formatNumber(totalPositionValue);

                // Calculate daily P&L (closed + unrealized)
                let closedPnl = 0;
                if (data.profitLoss && data.profitLoss.list) {
                    data.profitLoss.list.forEach(pnl => {
                        closedPnl += parseFloat(pnl.closedPnl || 0);
                    });
                }

                const dailyPnl = closedPnl + totalUnrealizedPnl;
                metrics.dailyPnl = formatNumber(dailyPnl);
            }

            // Account info metrics
            if (data.accountInfo) {
                metrics.marginBalance = formatNumber(data.accountInfo.marginBalance || 0);
                metrics.riskRatio = data.accountInfo.riskRatio
                    ? parseFloat(data.accountInfo.riskRatio).toFixed(2) + '%'
                    : '暂无';
            }

            // Funding fee
            if (data.fundingFee && data.fundingFee.list) {
                let totalFundingFee = 0;
                data.fundingFee.list.forEach(fee => {
                    totalFundingFee += parseFloat(fee.fundingFee || 0);
                });
                metrics.fundingFee = formatNumber(totalFundingFee);
            }

            return metrics;
        }

        function displayResults(metrics, errors) {
            const results = document.getElementById('results');

            // Check if there are any errors
            const hasErrors = Object.keys(errors).length > 0;

            let html = '';

            if (hasErrors) {
                html += '<div class="error-message"><strong>部分接口调用失败:</strong><br>';
                Object.entries(errors).forEach(([key, error]) => {
                    const banInfo = getBanInfo(error);
                    if (banInfo) {
                        html += `${key}: ${banInfo}<br>`;
                    } else {
                        html += `${key}: ${error}<br>`;
                    }
                });
                html += '</div>';
            } else {
                html += '<div class="success-message"><strong>✓ 所有接口调用成功!</strong></div>';
            }

            html += `
                <div class="account-card">
                    <div class="account-header">
                        <div class="account-name">Bybit 账户 (hustle)</div>
                        <div class="account-platform">Bybit</div>
                    </div>

                    <div class="metrics-grid">
                        <div class="metric-item">
                            <div class="metric-label">账户总资产</div>
                            <div class="metric-value">${metrics.totalAssets} USDT</div>
                            <div class="endpoint-info">/v5/account/wallet-balance?coin=USDT → equity</div>
                        </div>

                        <div class="metric-item">
                            <div class="metric-label">净资产</div>
                            <div class="metric-value">${metrics.netAssets} USDT</div>
                            <div class="endpoint-info">/v5/account/wallet-balance?coin=USDT → equity</div>
                        </div>

                        <div class="metric-item">
                            <div class="metric-label">可用总资产</div>
                            <div class="metric-value">${metrics.availableBalance} USDT</div>
                            <div class="endpoint-info">/v5/account/wallet-balance?coin=USDT → availableToTrade</div>
                        </div>

                        <div class="metric-item">
                            <div class="metric-label">冻结资产</div>
                            <div class="metric-value">${metrics.frozenAssets} USDT</div>
                            <div class="endpoint-info">walletBalance - availableToTrade</div>
                        </div>

                        <div class="metric-item">
                            <div class="metric-label">总持仓</div>
                            <div class="metric-value">${metrics.totalPositions} USDT</div>
                            <div class="endpoint-info">/v5/position/list?settleCoin=USDT → Σ(size×markPrice)</div>
                        </div>

                        <div class="metric-item">
                            <div class="metric-label">当日盈亏</div>
                            <div class="metric-value ${parseFloat(metrics.dailyPnl.replace(/,/g, '')) >= 0 ? 'positive' : 'negative'}">
                                ${metrics.dailyPnl} USDT
                            </div>
                            <div class="endpoint-info">/v5/position/closed-pnl?settleCoin=USDT → closedPnl + unrealizedPnl</div>
                        </div>

                        <div class="metric-item">
                            <div class="metric-label">保证金余额</div>
                            <div class="metric-value">${metrics.marginBalance} USDT</div>
                            <div class="endpoint-info">/v5/account/info?coin=USDT → marginBalance</div>
                        </div>

                        <div class="metric-item">
                            <div class="metric-label">风险率</div>
                            <div class="metric-value ${parseFloat(metrics.riskRatio) > 60 ? 'warning' : ''}">${metrics.riskRatio}</div>
                            <div class="endpoint-info">/v5/account/info?coin=USDT → riskRatio</div>
                        </div>

                        <div class="metric-item">
                            <div class="metric-label">资金费</div>
                            <div class="metric-value ${parseFloat(metrics.fundingFee.replace(/,/g, '')) >= 0 ? 'positive' : 'negative'}">
                                ${metrics.fundingFee} USDT
                            </div>
                            <div class="endpoint-info">/v5/account/funding-fee?settleCoin=USDT → Σ(fundingFee)</div>
                        </div>
                    </div>
                </div>
            `;

            results.innerHTML = html;
        }
    </script>
</body>
</html>
