<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>策略监控面板 - 实时显示策略运行状态</title>
  <link rel="stylesheet" href="./style.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div class="header">
      <h1>策略监控面板</h1>
      <div class="status-indicator">
        <span class="status-dot" id="connectionStatus"></span>
        <span id="statusText">连接中...</span>
      </div>
    </div>

    <!-- Summary Cards -->
    <div class="summary-cards">
      <div class="card">
        <div class="card-label">运行中策略</div>
        <div class="card-value success" id="runningCount">0</div>
      </div>
      <div class="card">
        <div class="card-label">今日收益</div>
        <div class="card-value primary" id="todayProfit">0.00 USDT</div>
      </div>
      <div class="card">
        <div class="card-label">总策略数</div>
        <div class="card-value" id="totalStrategies">0</div>
      </div>
    </div>

    <!-- Market Data Chart -->
    <div class="chart-container">
      <h2>市场数据 - 实时价格</h2>
      <div id="marketChart" style="width: 100%; height: 300px;"></div>
    </div>

    <!-- Strategies List -->
    <div class="strategies-container">
      <h2>策略列表</h2>
      <div id="strategiesList"></div>
    </div>

    <!-- Profit Chart -->
    <div class="chart-container">
      <h2>收益趋势</h2>
      <div id="profitChart" style="width: 100%; height: 300px;"></div>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
