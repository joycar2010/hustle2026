<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统设置 - 布珥·迈拓空间设计</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #1a2430;
            color: #ffffff;
            display: flex;
            min-height: 100vh;
            line-height: 1.6;
        }
        
        /* 侧边栏样式 */
        .sidebar {
            width: 240px;
            background-color: #151e29;
            padding: 20px 0;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
        }
        
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .logo img {
            width: 80px;
            height: 80px;
            border-radius: 8px;
        }
        
        .nav-menu {
            margin-top: 30px;
        }
        
        .nav-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }
        
        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }
        
        .nav-item.active {
            background-color: rgba(153, 0, 0, 0.2);
            border-left-color: #990000;
        }
        
        .nav-item a {
            color: #ffffff;
            text-decoration: none;
            display: flex;
            align-items: center;
            font-size: 16px;
        }
        
        .nav-item i {
            margin-right: 12px;
            font-size: 18px;
        }
        
        .nav-item span {
            flex: 1;
        }
        
        /* 主内容区域 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-left: 240px;
        }
        
        /* 顶部导航栏 */
        .top-nav {
            height: 80px;
            background-color: #151e29;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
        }
        
        .nav-left {
            display: flex;
            align-items: center;
        }
        
        .nav-title {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }
        
        .nav-right {
            display: flex;
            align-items: center;
            gap: 30px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 24px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .user-info:hover {
            background-color: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #ffffff;
            border: 2px solid #cc0000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #cc0000;
            margin-right: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .user-info:hover .user-avatar {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(204, 0, 0, 0.3);
        }
        
        .user-details {
            text-align: right;
            transition: all 0.3s ease;
        }
        
        .user-name {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 2px;
        }
        
        .user-role {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
        }
        
        .user-info:hover .user-role {
            color: rgba(255, 255, 255, 0.9);
        }
        
        /* 用户信息更新动画 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .user-info.updated {
            animation: fadeIn 0.5s ease;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            border: none;
        }
        
        .btn-primary {
            background-color: #990000;
            color: #fff;
        }
        
        .btn-primary:hover {
            background-color: #cc0000;
            transform: translateY(-2px);
        }
        
        /* 内容区域 */
        .content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }
        
        /* 设置容器 */
        .settings-container {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 30px;
        }
        
        /* 设置分组 */
        .settings-group {
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .settings-group:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        
        .group-title {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 20px;
        }
        
        /* 表单样式 */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 16px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            padding: 12px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        
        .form-input:focus {
            border-color: #990000;
            box-shadow: 0 0 0 3px rgba(153, 0, 0, 0.1);
        }

        .form-input option {
            background-color: #1a2430;
            color: white;
        }
        
        .form-textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        /* 开关样式 */
        .switch-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .switch-label {
            font-size: 16px;
            font-weight: 500;
            color: #fff;
        }
        
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }
        
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.2);
            transition: .4s;
            border-radius: 34px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: #990000;
        }
        
        input:focus + .slider {
            box-shadow: 0 0 1px #990000;
        }
        
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        
        /* 加载状态 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        
        .loading::after {
            content: '';
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #990000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        
        /* 通知提示 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: #fff;
            font-weight: 500;
            z-index: 2000;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.3s ease;
        }
        
        .toast.active {
            opacity: 1;
            transform: translateX(0);
        }
        
        .toast.success {
            background-color: #4caf50;
        }
        
        .toast.error {
            background-color: #cc0000;
        }
        
        .toast.info {
            background-color: #2196f3;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .main-content {
                margin-left: 0;
                width: 100%;
            }
            
            .content {
                padding: 20px;
            }
            
            .top-nav {
                padding: 0 20px;
            }
            
            .settings-container {
                padding: 20px;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 576px) {
            /* 移动端适配已在768px媒体查询中处理 */
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="logo">
        <img src="/images/logo.png" alt="Logo">
      </div>
      <nav class="nav-menu">
        <div class="nav-item">
          <a href="/dashboard">
            <i class="fas fa-tachometer-alt"></i>
            <span>仪表盘</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/brand-edit">
            <i class="fas fa-edit"></i>
            <span>品牌管理</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/works">
            <i class="fas fa-palette"></i>
            <span>作品管理</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/categories">
            <i class="fas fa-list"></i>
            <span>分类管理</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/leads">
            <i class="fas fa-handshake"></i>
            <span>线索管理</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/customers">
            <i class="fas fa-users"></i>
            <span>客户管理</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/stats">
            <i class="fas fa-chart-bar"></i>
            <span>数据统计</span>
          </a>
        </div>
        <div class="nav-item active">
          <a href="/settings">
            <i class="fas fa-cog"></i>
            <span>系统设置</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/users">
            <i class="fas fa-user-cog"></i>
            <span>操作员管理</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/logout">
            <i class="fas fa-sign-out-alt"></i>
            <span>退出登录</span>
          </a>
        </div>
      </nav>
    </aside>
    
    <!-- 主内容区域 -->
    <div class="main-content">
        <!-- 顶部导航栏 -->
        <div class="top-nav">
            <div class="nav-left">
                <div class="nav-title">系统设置</div>
            </div>
            <div class="nav-right">
                <button class="btn btn-primary" onclick="saveSettings()">
                    💾 保存设置
                </button>
                <div class="user-info" id="userInfoContainer">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">管理员</div>
                        <div class="user-role" id="userRole">系统管理员</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 内容区域 -->
        <div class="content">
            <div class="settings-container">
                <div id="settingsContent">
                    <div class="loading"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 通知提示 -->
    <div class="toast" id="toast"></div>
    
    <script>
        // 全局设置数据
        let settingsData = null;
        
        // 加载当前用户信息
        async function loadCurrentUserInfo() {
            try {
                const response = await fetch('/api/v1/users/current');
                
                if (!response.ok) {
                    if (response.status === 401) {
                        // 未授权，重定向到登录页面
                        console.log('未授权访问，重定向到登录页面');
                        window.location.href = '/login';
                        return null;
                    }
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const result = await response.json();
                
                if (result.success && result.data) {
                    return result.data;
                } else {
                    console.error('获取用户信息失败:', result.message || '未知错误');
                    return null;
                }
            } catch (error) {
                console.error('获取用户信息出错:', error.message);
                return null;
            }
        }
        
        // 更新用户信息显示
        function updateUserInfoDisplay(userInfo) {
            if (!userInfo) {
                return;
            }
            
            const { id, username, role, permissions } = userInfo;
            
            const userInfoContainer = document.getElementById('userInfoContainer');
            const userAvatar = document.getElementById('userAvatar');
            const userName = document.getElementById('userName');
            const userRole = document.getElementById('userRole');
            
            if (userAvatar) {
                userAvatar.textContent = id || 'A';
            }
            
            if (userName) {
                userName.textContent = username || '未知用户';
            }
            
            if (userRole) {
                const roleMap = {
                    'admin': '系统管理员',
                    'editor': '编辑员',
                    'viewer': '查看员'
                };
                userRole.textContent = roleMap[role] || '普通用户';
            }
            
            // 添加更新动画效果
            if (userInfoContainer) {
                userInfoContainer.classList.add('updated');
                setTimeout(() => {
                    userInfoContainer.classList.remove('updated');
                }, 500);
            }
            
            // 根据权限更新导航菜单
            updateNavigationBasedOnPermissions(permissions, role);
        }
        
        // 根据权限更新导航菜单
        function updateNavigationBasedOnPermissions(permissions, role) {
            // 导航项与权限的映射关系
            const navPermissionMap = {
                'dashboard': 'dashboard',
                'brand-edit': 'brand',
                'works': 'works',
                'categories': 'categories',
                'leads': 'leads',
                'customers': 'customers',
                'stats': 'stats',
                'settings': 'settings',
                'users': 'users'
            };
            
            // 获取所有导航项
            const navItems = document.querySelectorAll('.nav-item');
            
            navItems.forEach(navItem => {
                const link = navItem.querySelector('a');
                if (link) {
                    const href = link.getAttribute('href');
                    // 提取路径部分（去掉开头的/）
                    const path = href.substring(1);
                    
                    // 检查是否需要权限控制（排除退出登录）
                    if (path !== 'logout') {
                        const requiredPermission = navPermissionMap[path];
                        
                        // 管理员角色或有对应权限的用户可以看到该导航项
                        if (role === 'admin' || (permissions && permissions[requiredPermission])) {
                            navItem.style.display = 'block';
                        } else {
                            navItem.style.display = 'none';
                        }
                    }
                }
            });
        }
        
        // 初始化页面
        document.addEventListener('DOMContentLoaded', async () => {
            loadSettings();
            
            // 加载当前用户信息
            const userInfo = await loadCurrentUserInfo();
            updateUserInfoDisplay(userInfo);
            
            // 设置定时刷新用户信息，每5分钟更新一次
            setInterval(async () => {
                const updatedUserInfo = await loadCurrentUserInfo();
                updateUserInfoDisplay(updatedUserInfo);
            }, 300000);
        });
        
        // 加载系统设置和关于我们数据
        async function loadSettings() {
            const container = document.getElementById('settingsContent');
            container.innerHTML = '<div class="loading"></div>';
            
            try {
                // 获取系统设置数据
                const settingsResponse = await fetch('/api/v1/settings');
                if (!settingsResponse.ok) {
                    throw new Error('加载系统设置失败');
                }
                const settingsResult = await settingsResponse.json();
                
                // 获取关于我们数据
                const aboutResponse = await fetch('/api/v1/about');
                if (!aboutResponse.ok) {
                    throw new Error('加载关于我们数据失败');
                }
                const aboutResult = await aboutResponse.json();
                
                if (settingsResult.success && aboutResult.success) {
                    // 合并系统设置和关于我们数据
                    settingsData = {
                        ...settingsResult.data,
                        brandInfo: aboutResult.data.brandInfo,
                        contactInfo: aboutResult.data.contactInfo
                    };
                    renderSettings();
                } else {
                    showToast('加载设置失败', 'error');
                }
            } catch (error) {
                console.error('加载设置错误:', error);
                showToast('加载设置失败', 'error');
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: rgba(255, 255, 255, 0.5);">加载设置失败，请刷新页面重试</div>';
            }
        }
        
        // 渲染系统设置
        function renderSettings() {
            if (!settingsData) return;
            
            const container = document.getElementById('settingsContent');
            
            container.innerHTML = `

                
                <!-- 基本设置 -->
                <div class="settings-group">
                    <div class="group-title">基本设置</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label" for="siteName">网站名称</label>
                            <input type="text" class="form-input" id="siteName" value="${settingsData.siteName}" placeholder="请输入网站名称">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="siteLogo">网站Logo</label>
                            <input type="text" class="form-input" id="siteLogo" value="${settingsData.siteLogo}" placeholder="请输入Logo URL">
                        </div>
                    </div>
                </div>
                
                <!-- 社交媒体设置 -->
                <div class="settings-group">
                    <div class="group-title">社交媒体设置</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label" for="wechat">微信公众号</label>
                            <input type="text" class="form-input" id="wechat" value="${settingsData.socialMedia.wechat}" placeholder="请输入微信公众号">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="weibo">微博</label>
                            <input type="text" class="form-input" id="weibo" value="${settingsData.socialMedia.weibo}" placeholder="请输入微博账号">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="instagram">Instagram</label>
                            <input type="text" class="form-input" id="instagram" value="${settingsData.socialMedia.instagram}" placeholder="请输入Instagram账号">
                        </div>
                    </div>
                </div>
                
                <!-- SEO设置 -->
                <div class="settings-group">
                    <div class="group-title">SEO设置</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label" for="seoTitle">网站标题</label>
                            <input type="text" class="form-input" id="seoTitle" value="${settingsData.seoSettings.title}" placeholder="请输入网站标题">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="seoDescription">网站描述</label>
                            <textarea class="form-input form-textarea" id="seoDescription" placeholder="请输入网站描述">${settingsData.seoSettings.description}</textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="seoKeywords">关键词</label>
                            <input type="text" class="form-input" id="seoKeywords" value="${settingsData.seoSettings.keywords}" placeholder="请输入关键词，用逗号分隔">
                        </div>
                    </div>
                </div>
                
                <!-- 通知设置 -->
                <div class="settings-group">
                    <div class="group-title">通知设置</div>
                    <div class="switch-group">
                        <span class="switch-label">新线索通知</span>
                        <label class="switch">
                            <input type="checkbox" id="leadNotification" ${settingsData.notificationSettings.leadNotification ? 'checked' : ''}>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="switch-group">
                        <span class="switch-label">作品更新通知</span>
                        <label class="switch">
                            <input type="checkbox" id="workNotification" ${settingsData.notificationSettings.workNotification ? 'checked' : ''}>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="switch-group">
                        <span class="switch-label">邮件通知</span>
                        <label class="switch">
                            <input type="checkbox" id="emailNotification" ${settingsData.notificationSettings.emailNotification ? 'checked' : ''}>
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            `;
        }
        
        // 保存系统设置和关于我们数据
        async function saveSettings() {
            try {
                // 收集系统设置数据
                const systemSettings = {
                    siteName: document.getElementById('siteName').value,
                    siteLogo: document.getElementById('siteLogo').value,
                    socialMedia: {
                        wechat: document.getElementById('wechat').value,
                        weibo: document.getElementById('weibo').value,
                        instagram: document.getElementById('instagram').value
                    },
                    seoSettings: {
                        title: document.getElementById('seoTitle').value,
                        description: document.getElementById('seoDescription').value,
                        keywords: document.getElementById('seoKeywords').value
                    },
                    notificationSettings: {
                        leadNotification: document.getElementById('leadNotification').checked,
                        workNotification: document.getElementById('workNotification').checked,
                        emailNotification: document.getElementById('emailNotification').checked
                    }
                };
                
                // 发送更新请求
                const systemResponse = await fetch('/api/v1/settings', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(systemSettings)
                });
                
                const systemResult = await systemResponse.json();
                
                if (systemResult.success) {
                    // 更新本地设置数据
                    settingsData = systemResult.data;
                    showToast('设置保存成功', 'success');
                } else {
                    const errorMessage = systemResult.message || '未知错误';
                    showToast('保存失败: ' + errorMessage, 'error');
                }
            } catch (error) {
                console.error('保存设置错误:', error);
                showToast('保存设置失败', 'error');
            }
        }
        
        // 显示通知
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} active`;
            
            setTimeout(() => {
                toast.classList.remove('active');
            }, 3000);
        }
    </script>
</body>
</html>
