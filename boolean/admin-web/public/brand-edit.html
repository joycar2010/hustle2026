<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>品牌内容管理 - 布珥·迈拓空间设计</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #1a2430;
            color: #ffffff;
            display: flex;
            min-height: 100vh;
            line-height: 1.6;
        }
        
        /* 侧边栏样式 */
        .sidebar {
            width: 240px;
            background-color: #151e29;
            padding: 20px 0;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
        }
        
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .logo img {
            width: 80px;
            height: 80px;
            border-radius: 8px;
        }
        
        .nav-menu {
            margin-top: 30px;
        }
        
        .nav-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }
        
        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }
        
        .nav-item.active {
            background-color: rgba(153, 0, 0, 0.2);
            border-left-color: #990000;
        }
        
        .nav-item a {
            color: #ffffff;
            text-decoration: none;
            display: flex;
            align-items: center;
            font-size: 16px;
        }
        
        .nav-item i {
            margin-right: 12px;
            font-size: 18px;
        }
        
        .nav-item span {
            flex: 1;
        }
        
        /* 主内容区域 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-left: 240px;
        }
        
        /* 顶部导航栏 */
        .top-nav {
            height: 80px;
            background-color: #151e29;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
        }
        
        .nav-right {
            display: flex;
            align-items: center;
            gap: 30px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 24px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .user-info:hover {
            background-color: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #ffffff;
            border: 2px solid #cc0000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #cc0000;
            margin-right: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .user-info:hover .user-avatar {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(204, 0, 0, 0.3);
        }
        
        .user-details {
            text-align: right;
            transition: all 0.3s ease;
        }
        
        .user-name {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 2px;
        }
        
        .user-role {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
        }
        
        .user-info:hover .user-role {
            color: rgba(255, 255, 255, 0.9);
        }
        
        /* 用户信息更新动画 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .user-info.updated {
            animation: fadeIn 0.5s ease;
        }
        
        .nav-left {
            display: flex;
            align-items: center;
        }
        
        .nav-title {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }
        
        .nav-right {
            display: flex;
            align-items: center;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            border: none;
        }
        
        .btn-primary {
            background-color: #990000;
            color: #fff;
        }
        
        .btn-primary:hover {
            background-color: #cc0000;
            transform: translateY(-2px);
        }
        
        /* 内容区域 */
        .content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }
        
        /* 设置容器 */
        .settings-container {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 30px;
        }
        
        /* 设置分组 */
        .settings-group {
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .settings-group:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        
        .group-title {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 20px;
        }
        
        /* 表单样式 */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 16px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            padding: 12px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        
        .form-input:focus {
            border-color: #990000;
            box-shadow: 0 0 0 3px rgba(153, 0, 0, 0.1);
        }

        .form-input option {
            background-color: #1a2430;
            color: white;
        }
        
        .form-textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        /* 列表项样式 */
        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            margin-bottom: 10px;
        }
        
        .list-item-content {
            flex: 1;
        }
        
        .list-item-title {
            font-weight: 500;
            margin-bottom: 5px;
        }
        
        .list-item-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 14px;
        }
        
        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        
        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }
        
        .btn-danger {
            background-color: #dc3545;
            color: #fff;
        }
        
        .btn-danger:hover {
            background-color: #c82333;
        }
        
        /* 加载状态 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        
        .loading::after {
            content: '';
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #990000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        
        /* 通知提示 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: #fff;
            font-weight: 500;
            z-index: 2000;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.3s ease;
        }
        
        .toast.active {
            opacity: 1;
            transform: translateX(0);
        }
        
        .toast.success {
            background-color: #4caf50;
        }
        
        .toast.error {
            background-color: #cc0000;
        }
        
        .toast.info {
            background-color: #2196f3;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .main-content {
                margin-left: 0;
                width: 100%;
            }
            
            .content {
                padding: 20px;
            }
            
            .top-nav {
                padding: 0 20px;
            }
            
            .settings-container {
                padding: 20px;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* 模态框样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(3px);
        }
        
        .modal-content {
            position: relative;
            z-index: 3001;
            background-color: #2a2a2a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: modalFadeIn 0.3s ease;
        }
        
        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .modal-header h3 {
            margin: 0;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: #fff;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        
        .modal-close:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
        
        .modal-body {
            padding: 24px;
        }
        
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding: 20px 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* 模态框响应式设计 */
        @media (max-width: 768px) {
            .modal-content {
                width: 95%;
                margin: 20px;
            }
            
            .modal-header,
            .modal-body,
            .modal-footer {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="logo">
        <img src="/images/logo.png" alt="Logo">
      </div>
      <nav class="nav-menu">
        <div class="nav-item">
          <a href="/dashboard">
            <i class="fas fa-tachometer-alt"></i>
            <span>仪表盘</span>
          </a>
        </div>
        <div class="nav-item active">
          <a href="/brand-edit">
            <i class="fas fa-edit"></i>
            <span>品牌管理</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/works">
            <i class="fas fa-palette"></i>
            <span>作品管理</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/categories">
            <i class="fas fa-list"></i>
            <span>分类管理</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/leads">
            <i class="fas fa-handshake"></i>
            <span>线索管理</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/customers">
            <i class="fas fa-users"></i>
            <span>客户管理</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/stats">
            <i class="fas fa-chart-bar"></i>
            <span>数据统计</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/settings">
            <i class="fas fa-cog"></i>
            <span>系统设置</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/users">
            <i class="fas fa-user-cog"></i>
            <span>操作员管理</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/logout">
            <i class="fas fa-sign-out-alt"></i>
            <span>退出登录</span>
          </a>
        </div>
      </nav>
    </aside>
    
    <!-- 主内容区域 -->
    <div class="main-content">
        <!-- 顶部导航栏 -->
        <div class="top-nav">
            <div class="nav-left">
                <div class="nav-title">品牌内容管理</div>
            </div>
            <div class="nav-right">
                <button class="btn btn-primary" onclick="saveBrandInfo()">
                    💾 保存设置
                </button>
                <div class="user-info" id="userInfoContainer">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">管理员</div>
                        <div class="user-role" id="userRole">系统管理员</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 内容区域 -->
        <div class="content">
            <div class="settings-container">
                <div id="brandContent">
                    <div class="loading"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 通知提示 -->
    <div class="toast" id="toast"></div>
    
    <!-- 设计理念模态框 -->
    <div class="modal" id="conceptModal" style="display: none;">
        <div class="modal-overlay" onclick="closeConceptModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="conceptModalTitle">添加设计理念</h3>
                <button class="modal-close" onclick="closeConceptModal()">×</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="conceptIndex" value="-1">
                <div class="form-group">
                    <label class="form-label" for="conceptTitle">理念标题</label>
                    <input type="text" class="form-input" id="conceptTitle" placeholder="请输入设计理念标题">
                </div>
                <div class="form-group">
                    <label class="form-label" for="conceptDescription">理念描述</label>
                    <textarea class="form-input form-textarea" id="conceptDescription" placeholder="请输入设计理念描述" rows="4"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeConceptModal()">取消</button>
                <button class="btn btn-primary" onclick="saveConcept()">保存</button>
            </div>
        </div>
    </div>
    
    <!-- 设计流程模态框 -->
    <div class="modal" id="processModal" style="display: none;">
        <div class="modal-overlay" onclick="closeProcessModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="processModalTitle">添加设计流程</h3>
                <button class="modal-close" onclick="closeProcessModal()">×</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="processIndex" value="-1">
                <div class="form-group">
                    <label class="form-label" for="processTitle">流程标题</label>
                    <input type="text" class="form-input" id="processTitle" placeholder="请输入设计流程标题">
                </div>
                <div class="form-group">
                    <label class="form-label" for="processDescription">流程描述</label>
                    <textarea class="form-input form-textarea" id="processDescription" placeholder="请输入设计流程描述" rows="4"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeProcessModal()">取消</button>
                <button class="btn btn-primary" onclick="saveProcess()">保存</button>
            </div>
        </div>
    </div>
    
    <!-- 团队成员模态框 -->
    <div class="modal" id="teamModal" style="display: none;">
        <div class="modal-overlay" onclick="closeTeamModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="teamModalTitle">添加团队成员</h3>
                <button class="modal-close" onclick="closeTeamModal()">×</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="teamIndex" value="-1">
                <div class="form-group">
                    <label class="form-label" for="teamName">成员姓名</label>
                    <input type="text" class="form-input" id="teamName" placeholder="请输入团队成员姓名">
                </div>
                <div class="form-group">
                    <label class="form-label" for="teamPosition">成员职位</label>
                    <input type="text" class="form-input" id="teamPosition" placeholder="请输入团队成员职位">
                </div>
                <div class="form-group">
                    <label class="form-label">成员照片</label>
                    <div style="display: flex; align-items: center; gap: 20px;">
                        <div id="teamPhotoPreview" style="width: 100px; height: 100px; border-radius: 8px; background-color: rgba(255, 255, 255, 0.05); display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px dashed rgba(255, 255, 255, 0.2);">
                            <span id="previewText">点击上传</span>
                            <img id="teamPhotoImg" src="" alt="预览" style="width: 100%; height: 100%; object-fit: cover; display: none;">
                        </div>
                        <div>
                            <input type="file" id="teamPhotoUpload" accept="image/*" style="display: none;">
                            <input type="hidden" id="teamPhoto" value="">
                            <button class="btn btn-secondary" onclick="document.getElementById('teamPhotoUpload').click()">选择照片</button>
                            <button class="btn btn-sm btn-danger" onclick="clearTeamPhoto()" style="margin-top: 8px;">清除照片</button>
                        </div>
                    </div>
                    <small style="color: rgba(255, 255, 255, 0.6); display: block; margin-top: 8px;">支持 JPG、PNG 格式，建议尺寸 200x200px</small>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeTeamModal()">取消</button>
                <button class="btn btn-primary" onclick="saveTeamMember()">保存</button>
            </div>
        </div>
    </div>
    
    <!-- 资质荣誉模态框 -->
    <div class="modal" id="honorModal" style="display: none;">
        <div class="modal-overlay" onclick="closeHonorModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="honorModalTitle">添加资质荣誉</h3>
                <button class="modal-close" onclick="closeHonorModal()">×</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="honorIndex" value="-1">
                <div class="form-group">
                    <label class="form-label" for="honorTitle">荣誉标题</label>
                    <input type="text" class="form-input" id="honorTitle" placeholder="请输入资质荣誉标题">
                </div>
                <div class="form-group">
                    <label class="form-label" for="honorDescription">荣誉描述</label>
                    <textarea class="form-input form-textarea" id="honorDescription" placeholder="请输入资质荣誉描述" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label" for="honorIcon">荣誉图标</label>
                    <input type="text" class="form-input" id="honorIcon" placeholder="请输入荣誉图标（如：🏆）">
                    <small style="color: rgba(255, 255, 255, 0.6); display: block; margin-top: 8px;">可输入 emoji 表情作为图标</small>
                </div>
                <div class="form-group">
                    <label class="form-label">荣誉证书</label>
                    <div style="display: flex; align-items: center; gap: 20px;">
                        <div id="honorPhotoPreview" style="width: 100px; height: 100px; border-radius: 8px; background-color: rgba(255, 255, 255, 0.05); display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px dashed rgba(255, 255, 255, 0.2);">
                            <span id="honorPreviewText">点击上传</span>
                            <img id="honorPhotoImg" src="" alt="预览" style="width: 100%; height: 100%; object-fit: cover; display: none;">
                        </div>
                        <div>
                            <input type="file" id="honorPhotoUpload" accept="image/*" style="display: none;">
                            <input type="hidden" id="honorPhoto" value="">
                            <button class="btn btn-secondary" onclick="document.getElementById('honorPhotoUpload').click()">选择证书</button>
                            <button class="btn btn-sm btn-danger" onclick="clearHonorPhoto()" style="margin-top: 8px;">清除证书</button>
                        </div>
                    </div>
                    <small style="color: rgba(255, 255, 255, 0.6); display: block; margin-top: 8px;">支持 JPG、PNG 格式，建议尺寸 400x300px</small>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeHonorModal()">取消</button>
                <button class="btn btn-primary" onclick="saveHonor()">保存</button>
            </div>
        </div>
    </div>
    
    <!-- 合作伙伴模态框 -->
    <div class="modal" id="partnerModal" style="display: none;">
        <div class="modal-overlay" onclick="closePartnerModal()"></div>
        <div class="modal-content">
            <div class="modal-header">

    <script>
        // 全局品牌数据
        let brandData = null;
        
        // 初始化页面
        document.addEventListener('DOMContentLoaded', async () => {
            loadBrandInfo();
            
            // 加载当前用户信息
            const userInfo = await loadCurrentUserInfo();
            updateUserInfoDisplay(userInfo);
            
            // 设置定时刷新用户信息，每5分钟更新一次
            setInterval(async () => {
                const updatedUserInfo = await loadCurrentUserInfo();
                updateUserInfoDisplay(updatedUserInfo);
            }, 300000);
        });
        
        // 加载当前用户信息
        async function loadCurrentUserInfo() {
            try {
                const response = await fetch('/api/v1/users/current');
                
                if (!response.ok) {
                    if (response.status === 401) {
                        // 未授权，重定向到登录页面
                        console.log('未授权访问，重定向到登录页面');
                        window.location.href = '/login';
                        return null;
                    }
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const result = await response.json();
                
                if (result.success && result.data) {
                    return result.data;
                } else {
                    console.error('获取用户信息失败:', result.message || '未知错误');
                    return null;
                }
            } catch (error) {
                console.error('获取用户信息出错:', error.message);
                return null;
            }
        }
        
        // 更新用户信息显示
        function updateUserInfoDisplay(userInfo) {
            if (!userInfo) {
                return;
            }
            
            const { id, username, role, permissions } = userInfo;
            
            const userInfoContainer = document.getElementById('userInfoContainer');
            const userAvatar = document.getElementById('userAvatar');
            const userName = document.getElementById('userName');
            const userRole = document.getElementById('userRole');
            
            if (userAvatar) {
                userAvatar.textContent = id || 'A';
            }
            
            if (userName) {
                userName.textContent = username || '未知用户';
            }
            
            if (userRole) {
                const roleMap = {
                    'admin': '系统管理员',
                    'editor': '编辑员',
                    'viewer': '查看员'
                };
                userRole.textContent = roleMap[role] || '普通用户';
            }
            
            // 添加更新动画效果
            if (userInfoContainer) {
                userInfoContainer.classList.add('updated');
                setTimeout(() => {
                    userInfoContainer.classList.remove('updated');
                }, 500);
            }
            
            // 根据权限更新导航菜单
            updateNavigationBasedOnPermissions(permissions, role);
        }
        
        // 根据权限更新导航菜单
        function updateNavigationBasedOnPermissions(permissions, role) {
            // 导航项与权限的映射关系
            const navPermissionMap = {
                'dashboard': 'dashboard',
                'brand-edit': 'brand',
                'works': 'works',
                'categories': 'categories',
                'leads': 'leads',
                'customers': 'customers',
                'stats': 'stats',
                'settings': 'settings',
                'users': 'users'
            };
            
            // 获取所有导航项
            const navItems = document.querySelectorAll('.nav-item');
            
            navItems.forEach(navItem => {
                const link = navItem.querySelector('a');
                if (link) {
                    const href = link.getAttribute('href');
                    // 提取路径部分（去掉开头的/）
                    const path = href.substring(1);
                    
                    // 检查是否需要权限控制（排除退出登录）
                    if (path !== 'logout') {
                        const requiredPermission = navPermissionMap[path];
                        
                        // 管理员角色或有对应权限的用户可以看到该导航项
                        if (role === 'admin' || (permissions && permissions[requiredPermission])) {
                            navItem.style.display = 'block';
                        } else {
                            navItem.style.display = 'none';
                        }
                    }
                }
            });
        }
        
        // 加载品牌信息
        async function loadBrandInfo() {
            const container = document.getElementById('brandContent');
            container.innerHTML = '<div class="loading"></div>';
            
            try {
                // 获取品牌信息数据
                const response = await fetch('/api/v1/about');
                if (!response.ok) {
                    throw new Error('加载品牌信息失败');
                }
                const result = await response.json();
                
                if (result.success) {
                    brandData = result.data;
                    renderBrandInfo();
                } else {
                    showToast('加载品牌信息失败', 'error');
                }
            } catch (error) {
                console.error('加载品牌信息错误:', error);
                showToast('加载品牌信息失败', 'error');
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: rgba(255, 255, 255, 0.5);">加载品牌信息失败，请刷新页面重试</div>';
            }
        }

        // 处理合作伙伴照片上传
        function handlePartnerPhotoUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            // 验证文件类型
            const validTypes = ['image/jpeg', 'image/png', 'image/jpg'];
            if (!validTypes.includes(file.type)) {
                showToast('请上传 JPG 或 PNG 格式的图片', 'error');
                return;
            }
            
            // 文件大小验证已通过压缩处理，不再限制最大尺寸
            // 无论文件多大，都会自动压缩到合适大小
            
            // 预览图片
            const reader = new FileReader();
            reader.onload = function(e) {
                const previewImg = document.getElementById('partnerPhotoImg');
                const previewText = document.getElementById('partnerPreviewText');
                const partnerPhoto = document.getElementById('partnerPhoto');
                
                previewImg.src = e.target.result;
                previewImg.style.display = 'block';
                previewText.style.display = 'none';
                partnerPhoto.value = e.target.result; // 存储 base64 编码的图片
            };
            reader.readAsDataURL(file);
        }
        
        // 清除合作伙伴照片
        function clearPartnerPhoto() {
            const previewImg = document.getElementById('partnerPhotoImg');
            const previewText = document.getElementById('partnerPreviewText');
            const partnerPhoto = document.getElementById('partnerPhoto');
            const partnerPhotoUpload = document.getElementById('partnerPhotoUpload');
            
            previewImg.src = '';
            previewImg.style.display = 'none';
            previewText.style.display = 'block';
            partnerPhoto.value = '';
            partnerPhotoUpload.value = '';
        }
        
        // 打开合作伙伴模态框
        function openPartnerModal(index = -1) {
            if (!brandData.partners) {
                brandData.partners = {
                    description: '',
                    list: []
                };
            }
            
            const modal = document.getElementById('partnerModal');
            const modalTitle = document.getElementById('partnerModalTitle');
            const partnerIndex = document.getElementById('partnerIndex');
            const partnerName = document.getElementById('partnerName');
            const partnerPhoto = document.getElementById('partnerPhoto');
            const previewImg = document.getElementById('partnerPhotoImg');
            const previewText = document.getElementById('partnerPreviewText');
            const partnerPhotoUpload = document.getElementById('partnerPhotoUpload');
            
            if (index === -1) {
                // 添加模式
                modalTitle.textContent = '添加合作伙伴';
                partnerIndex.value = '-1';
                partnerName.value = '';
                clearPartnerPhoto();
            } else {
                // 编辑模式
                const partner = brandData.partners.list[index];
                modalTitle.textContent = '编辑合作伙伴';
                partnerIndex.value = index;

            reader.onload = function(e) {
                const previewImg = document.getElementById('teamPhotoImg');
                const previewText = document.getElementById('previewText');
                const teamPhoto = document.getElementById('teamPhoto');
                
                previewImg.src = e.target.result;
                previewImg.style.display = 'block';
                previewText.style.display = 'none';
                teamPhoto.value = e.target.result; // 存储 base64 编码的图片
            };
            reader.readAsDataURL(file);
        }

                // 添加新资质荣誉
                const newHonor = {
                    id: brandData.honors.length + 1,
                    title,
                    description,
                    icon: icon || '🏆',
                    image: image || ''
                };
                brandData.honors.push(newHonor);
                showToast('资质荣誉添加成功', 'success');
            } else {
                // 编辑现有资质荣誉
                brandData.honors[index] = {
                    ...brandData.honors[index],
                    title,
                    description,
                    icon: icon || '🏆',
                    image: image || ''
                };
                showToast('资质荣誉编辑成功', 'success');
            }
            
            closeHonorModal();
            renderBrandInfo();
        }
        
        // 添加资质荣誉
        function addHonor() {
            openHonorModal();
        }
        
        // 编辑资质荣誉
        function editHonor(index) {
            openHonorModal(index);
        }
        
        // 删除资质荣誉
        function deleteHonor(index) {
            if (!brandData.honors || !brandData.honors[index]) return;

            if (confirm('确定要删除这个资质荣誉吗？')) {
                brandData.honors.splice(index, 1);
                // 重新编号
                brandData.honors.forEach((honor, i) => {
                    honor.id = i + 1;
                });
                renderBrandInfo();
                showToast('资质荣誉删除成功', 'success');
            }
        }

        // 移动资质荣誉
        function moveHonor(index, direction) {
            if (!brandData.honors || !brandData.honors[index]) return;

            if (direction === 'up' && index > 0) {
                // 上移：与前一个元素交换
                const temp = brandData.honors[index];
                brandData.honors[index] = brandData.honors[index - 1];
                brandData.honors[index - 1] = temp;
            } else if (direction === 'down' && index < brandData.honors.length - 1) {
                // 下移：与后一个元素交换
                const temp = brandData.honors[index];
                brandData.honors[index] = brandData.honors[index + 1];
                brandData.honors[index + 1] = temp;
            }

            // 重新编号
            brandData.honors.forEach((honor, i) => {
                honor.id = i + 1;
            });

            renderBrandInfo();
            showToast('资质荣誉排序更新成功', 'success');
        }
        
        // 显示通知
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} active`;
            
            setTimeout(() => {
                toast.classList.remove('active');
            }, 3000);
        }

        // 公司照片管理模块

        // 打开公司照片模态框
        function openCompanyPhotoModal(index = -1) {
            if (!brandData.companyPhotos) {
                brandData.companyPhotos = [];
            }

            const modal = document.getElementById('companyPhotosModal');
            const modalTitle = document.getElementById('companyPhotosModalTitle');
            const photoIndex = document.getElementById('photoIndex');
            const photoUrl = document.getElementById('photoUrl');
            const photoDescription = document.getElementById('photoDescription');
            const isCover = document.getElementById('isCover');

            if (index === -1) {
                // 添加模式
                modalTitle.textContent = '添加公司照片';
                photoIndex.value = '-1';
                photoUrl.value = '';
                photoDescription.value = '';
                isCover.checked = false;
                // 重置预览
                const previewImg = document.getElementById('photoPreviewImg');
                const previewText = document.getElementById('photoPreviewText');
                if (previewImg) previewImg.style.display = 'none';
                if (previewText) previewText.style.display = 'block';
            } else {
                // 编辑模式
                const photo = brandData.companyPhotos[index];
                modalTitle.textContent = '编辑公司照片';
                photoIndex.value = index;
                photoUrl.value = photo.url || '';
                photoDescription.value = photo.description || '';
                isCover.checked = photo.isCover || false;
                // 更新预览
                const previewImg = document.getElementById('photoPreviewImg');
                const previewText = document.getElementById('photoPreviewText');
                if (photo.url) {
                    if (previewImg) {
                        previewImg.src = photo.url;
                        previewImg.style.display = 'block';
                    }
                    if (previewText) previewText.style.display = 'none';
                } else {
                    if (previewImg) previewImg.style.display = 'none';
                    if (previewText) previewText.style.display = 'block';
                }
            }

            modal.style.display = 'block';
            // 自动聚焦到第一个输入框
            setTimeout(() => {
                photoUrl.focus();
            }, 100);
        }

        // 关闭公司照片模态框
        function closeCompanyPhotosModal() {
            const modal = document.getElementById('companyPhotosModal');
            modal.style.display = 'none';
        }

        // 保存公司照片
        function saveCompanyPhoto() {
            const index = parseInt(document.getElementById('photoIndex').value);
            const photoUrl = document.getElementById('photoUrl').value.trim();
            const photoDescription = document.getElementById('photoDescription').value.trim();
            const isCover = document.getElementById('isCover').checked;

            if (!photoUrl) {
                showToast('请输入照片URL', 'error');
                return;
            }

            if (!brandData.companyPhotos) {
                brandData.companyPhotos = [];
            }

            if (index === -1) {
                // 添加新照片
                brandData.companyPhotos.push({
                    id: brandData.companyPhotos.length + 1,
                    url: photoUrl,
                    description: photoDescription,
                    isCover: isCover,
                    createdAt: new Date().toISOString()
                });
                showToast('公司照片添加成功', 'success');
            } else {
                // 编辑现有照片
                brandData.companyPhotos[index] = {
                    ...brandData.companyPhotos[index],
                    url: photoUrl,
                    description: photoDescription,
                    isCover: isCover
                };
                showToast('公司照片编辑成功', 'success');
            }

            closeCompanyPhotosModal();
            renderBrandInfo();
        }

        // 添加公司照片
        function addCompanyPhoto() {
            openCompanyPhotoModal();
        }

        // 编辑公司照片
        function editCompanyPhoto(index) {
            openCompanyPhotoModal(index);
        }

        // 删除公司照片
        function deleteCompanyPhoto(index) {
            if (!brandData.companyPhotos || !brandData.companyPhotos[index]) return;

            if (confirm('确定要删除这张公司照片吗？')) {
                brandData.companyPhotos.splice(index, 1);
                // 重新编号
                brandData.companyPhotos.forEach((photo, i) => {
                    photo.id = i + 1;
                });
                renderBrandInfo();
                showToast('公司照片删除成功', 'success');
            }
        }

        // 移动公司照片
        function moveCompanyPhoto(index, direction) {
            if (!brandData.companyPhotos || !brandData.companyPhotos[index]) return;

            if (direction === 'up' && index > 0) {
                // 上移：与前一个元素交换
                const temp = brandData.companyPhotos[index];
                brandData.companyPhotos[index] = brandData.companyPhotos[index - 1];
                brandData.companyPhotos[index - 1] = temp;
            } else if (direction === 'down' && index < brandData.companyPhotos.length - 1) {
                // 下移：与后一个元素交换
                const temp = brandData.companyPhotos[index];
                brandData.companyPhotos[index] = brandData.companyPhotos[index + 1];
                brandData.companyPhotos[index + 1] = temp;
            }

            // 重新编号
            brandData.companyPhotos.forEach((photo, i) => {
                photo.id = i + 1;
            });

            renderBrandInfo();
            showToast('公司照片排序更新成功', 'success');
        }

        // 图片压缩函数
        function compressImage(file, quality = 0.8) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');

                        // 计算压缩后的尺寸
                        const maxWidth = 1200;
                        const maxHeight = 800;
                        let width = img.width;
                        let height = img.height;

                        if (width > maxWidth) {
                            height = (height * maxWidth) / width;
                            width = maxWidth;
                        }
                        if (height > maxHeight) {
                            width = (width * maxHeight) / height;
                            height = maxHeight;
                        }

                        canvas.width = width;
                        canvas.height = height;

                        // 绘制并压缩图片
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => {
                            resolve(blob);
                        }, 'image/jpeg', quality);
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // 处理公司照片上传
        async function handlePhotoUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            // 验证文件类型
            const validTypes = ['image/jpeg', 'image/png', 'image/jpg'];
            if (!validTypes.includes(file.type)) {
                showToast('请上传 JPG 或 PNG 格式的图片', 'error');
                return;
            }

            // 定义压缩阈值（1MB）
            const COMPRESSION_THRESHOLD = 1 * 1024 * 1024;
            let processedFile = file;

            // 检查是否需要压缩
            if (file.size > COMPRESSION_THRESHOLD) {
                showToast('图片过大，正在自动压缩...', 'info');
                
                try {
                    // 压缩图片
                    const compressedBlob = await compressImage(file, 0.7);
                    processedFile = compressedBlob;
                    showToast('图片压缩完成', 'success');
                } catch (error) {
                    showToast('图片压缩失败，使用原始图片', 'warning');
                    console.error('Compression error:', error);
                }
            }

            // 预览图片
            const reader = new FileReader();
            reader.onload = function(e) {
                const previewImg = document.getElementById('photoPreviewImg');
                const previewText = document.getElementById('photoPreviewText');
                const photoUrl = document.getElementById('photoUrl');

                previewImg.src = e.target.result;
                previewImg.style.display = 'block';
                previewText.style.display = 'none';
                photoUrl.value = e.target.result; // 存储 base64 编码的图片
            };
            reader.readAsDataURL(processedFile);
        }

        // 清除公司照片
        function clearPhoto() {
            const previewImg = document.getElementById('photoPreviewImg');
            const previewText = document.getElementById('photoPreviewText');
            const photoUrl = document.getElementById('photoUrl');

            previewImg.src = '';
            previewImg.style.display = 'none';
            previewText.style.display = 'block';
            photoUrl.value = '';
        }

        // 绑定公司照片上传事件
        document.addEventListener('DOMContentLoaded', function() {
            const photoUpload = document.getElementById('photoUpload');
            if (photoUpload) {
                photoUpload.addEventListener('change', handlePhotoUpload);
            }
        });
    </script>

    <!-- 公司照片管理模态框 -->
    <div class="modal" id="companyPhotosModal" style="display: none;">

            </div>

                    <button class="btn btn-sm btn-danger" onclick="clearPhoto()" style="margin-top: 8px;">清除照片</button>
                </div>
                <div class="form-group">
                    <label class="form-label" for="photoDescription">照片说明</label>

                <button class="btn btn-primary" onclick="saveCompanyPhoto()">保存</button>
            </div>
        </div>
    </div>
