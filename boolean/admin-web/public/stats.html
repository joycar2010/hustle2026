<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据统计 - 布珥·迈拓空间设计</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #1a2430;
            color: #ffffff;
            display: flex;
            min-height: 100vh;
            line-height: 1.6;
        }
        
        /* 侧边栏样式 */
        .sidebar {
            width: 240px;
            background-color: #151e29;
            padding: 20px 0;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
        }
        
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .logo img {
            width: 80px;
            height: 80px;
            border-radius: 8px;
        }
        
        .nav-menu {
            margin-top: 30px;
        }
        
        .nav-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }
        
        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }
        
        .nav-item.active {
            background-color: rgba(153, 0, 0, 0.2);
            border-left-color: #990000;
        }
        
        .nav-item a {
            color: #ffffff;
            text-decoration: none;
            display: flex;
            align-items: center;
            font-size: 16px;
        }
        
        .nav-item i {
            margin-right: 12px;
            font-size: 18px;
        }
        
        .nav-item span {
            flex: 1;
        }
        
        /* 主内容区域 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-left: 240px;
        }
        
        /* 顶部导航栏 */
        .top-nav {
            height: 80px;
            background-color: #151e29;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
        }
        
        .nav-left {
            display: flex;
            align-items: center;
        }
        
        .nav-title {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }
        
        .nav-right {
            display: flex;
            align-items: center;
            gap: 30px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 24px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .user-info:hover {
            background-color: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #ffffff;
            border: 2px solid #cc0000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #cc0000;
            margin-right: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .user-info:hover .user-avatar {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(204, 0, 0, 0.3);
        }
        
        .user-details {
            text-align: right;
            transition: all 0.3s ease;
        }
        
        .user-name {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 2px;
        }
        
        .user-role {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
        }
        
        .user-info:hover .user-role {
            color: rgba(255, 255, 255, 0.9);
        }
        
        /* 用户信息更新动画 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .user-info.updated {
            animation: fadeIn 0.5s ease;
        }
        
        /* 内容区域 */
        .content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }
        
        /* 统计卡片容器 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }
        
        /* 统计卡片 */
        .stat-card {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 30px;
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(153, 0, 0, 0.3);
        }
        
        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .stat-title {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .stat-icon {
            font-size: 32px;
            color: #990000;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 10px;
        }
        
        .stat-change {
            font-size: 14px;
            color: #4caf50;
        }
        
        /* 图表容器 */
        .charts-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .chart-card {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 30px;
        }
        
        .chart-title {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 20px;
        }
        
        /* 图表区域 */
        .chart-area {
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
        }
        
        /* 数据表格 */
        .data-table-container {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .table-title {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 20px;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table th,
        .data-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .data-table th {
            font-weight: bold;
            color: #fff;
            background-color: rgba(255, 255, 255, 0.05);
        }
        
        .data-table td {
            color: rgba(255, 255, 255, 0.8);
        }
        
        .data-table tbody tr:hover {
            background-color: rgba(153, 0, 0, 0.1);
        }
        
        /* 刷新按钮 */
        .refresh-btn {
            padding: 10px 20px;
            background-color: #990000;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        
        .refresh-btn:hover {
            background-color: #cc0000;
            transform: translateY(-2px);
        }
        
        /* 加载状态 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        
        .loading::after {
            content: '';
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #990000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        
        /* 通知提示 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: #fff;
            font-weight: 500;
            z-index: 2000;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.3s ease;
        }
        
        .toast.active {
            opacity: 1;
            transform: translateX(0);
        }
        
        .toast.success {
            background-color: #4caf50;
        }
        
        .toast.error {
            background-color: #cc0000;
        }
        
        .toast.info {
            background-color: #2196f3;
        }
        
        /* 响应式设计 */
        @media (max-width: 1200px) {
            .charts-container {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .main-content {
                margin-left: 0;
                width: 100%;
            }
            
            .content {
                padding: 20px;
            }
            
            .top-nav {
                padding: 0 20px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 576px) {
            /* 移动端适配已在768px媒体查询中处理 */
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="logo">
        <img src="/images/logo.png" alt="Logo">
      </div>
      <nav class="nav-menu">
        <div class="nav-item">
          <a href="/dashboard">
            <i class="fas fa-tachometer-alt"></i>
            <span>仪表盘</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/brand-edit">
            <i class="fas fa-edit"></i>
            <span>品牌管理</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/works">
            <i class="fas fa-palette"></i>
            <span>作品管理</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/categories">
            <i class="fas fa-list"></i>
            <span>分类管理</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/leads">
            <i class="fas fa-handshake"></i>
            <span>线索管理</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/customers">
            <i class="fas fa-users"></i>
            <span>客户管理</span>
          </a>
        </div>
        <div class="nav-item active">
          <a href="/stats">
            <i class="fas fa-chart-bar"></i>
            <span>数据统计</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/settings">
            <i class="fas fa-cog"></i>
            <span>系统设置</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/users">
            <i class="fas fa-user-cog"></i>
            <span>操作员管理</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/logout">
            <i class="fas fa-sign-out-alt"></i>
            <span>退出登录</span>
          </a>
        </div>
      </nav>
    </aside>
    
    <!-- 主内容区域 -->
    <div class="main-content">
        <!-- 顶部导航栏 -->
        <div class="top-nav">
            <div class="nav-left">
                <div class="nav-title">数据统计</div>
            </div>
            <div class="nav-right">
                <button class="refresh-btn" onclick="refreshData()">
                    🔄 刷新数据
                </button>
                <div class="user-info" id="userInfoContainer">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">管理员</div>
                        <div class="user-role" id="userRole">系统管理员</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 内容区域 -->
        <div class="content">
            <!-- 统计卡片 -->
            <div class="stats-grid" id="statsGrid">
                <div class="loading"></div>
            </div>
            
            <!-- 图表区域 -->
            <div class="charts-container" id="chartsContainer">
                <div class="loading"></div>
            </div>
            
            <!-- 数据表格 -->
            <div class="data-table-container">
                <div class="table-title">详细统计数据</div>
                <table class="data-table" id="dataTable">
                    <thead>
                        <tr>
                            <th>项目类型</th>
                            <th>作品数量</th>
                            <th>浏览量</th>
                            <th>线索数量</th>
                            <th>转化率</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="5" style="text-align: center; color: rgba(255, 255, 255, 0.5);">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- 通知提示 -->
    <div class="toast" id="toast"></div>
    
    <script>
        // 全局状态
        let statsData = null;
        let lastUpdateTime = null;
        
        // 加载当前用户信息
        async function loadCurrentUserInfo() {
            try {
                const response = await fetch('/api/v1/users/current');
                
                if (!response.ok) {
                    if (response.status === 401) {
                        // 未授权，重定向到登录页面
                        console.log('未授权访问，重定向到登录页面');
                        window.location.href = '/login';
                        return null;
                    }
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const result = await response.json();
                
                if (result.success && result.data) {
                    return result.data;
                } else {
                    console.error('获取用户信息失败:', result.message || '未知错误');
                    return null;
                }
            } catch (error) {
                console.error('获取用户信息出错:', error.message);
                return null;
            }
        }
        
        // 更新用户信息显示
        function updateUserInfoDisplay(userInfo) {
            if (!userInfo) {
                return;
            }
            
            const { id, username, role, permissions } = userInfo;
            
            const userInfoContainer = document.getElementById('userInfoContainer');
            const userAvatar = document.getElementById('userAvatar');
            const userName = document.getElementById('userName');
            const userRole = document.getElementById('userRole');
            
            if (userAvatar) {
                userAvatar.textContent = id || 'A';
            }
            
            if (userName) {
                userName.textContent = username || '未知用户';
            }
            
            if (userRole) {
                const roleMap = {
                    'admin': '系统管理员',
                    'editor': '编辑员',
                    'viewer': '查看员'
                };
                userRole.textContent = roleMap[role] || '普通用户';
            }
            
            // 添加更新动画效果
            if (userInfoContainer) {
                userInfoContainer.classList.add('updated');
                setTimeout(() => {
                    userInfoContainer.classList.remove('updated');
                }, 500);
            }
            
            // 根据权限更新导航菜单
            updateNavigationBasedOnPermissions(permissions, role);
        }
        
        // 根据权限更新导航菜单
        function updateNavigationBasedOnPermissions(permissions, role) {
            // 导航项与权限的映射关系
            const navPermissionMap = {
                'dashboard': 'dashboard',
                'brand-edit': 'brand',
                'works': 'works',
                'categories': 'categories',
                'leads': 'leads',
                'customers': 'customers',
                'stats': 'stats',
                'settings': 'settings',
                'users': 'users'
            };
            
            // 获取所有导航项
            const navItems = document.querySelectorAll('.nav-item');
            
            navItems.forEach(navItem => {
                const link = navItem.querySelector('a');
                if (link) {
                    const href = link.getAttribute('href');
                    // 提取路径部分（去掉开头的/）
                    const path = href.substring(1);
                    
                    // 检查是否需要权限控制（排除退出登录）
                    if (path !== 'logout') {
                        const requiredPermission = navPermissionMap[path];
                        
                        // 管理员角色或有对应权限的用户可以看到该导航项
                        if (role === 'admin' || (permissions && permissions[requiredPermission])) {
                            navItem.style.display = 'block';
                        } else {
                            navItem.style.display = 'none';
                        }
                    }
                }
            });
        }
        
        // 初始化页面
        document.addEventListener('DOMContentLoaded', async () => {
            loadStatsData();
            
            // 加载当前用户信息
            const userInfo = await loadCurrentUserInfo();
            updateUserInfoDisplay(userInfo);
            
            // 设置定时刷新，每5分钟自动刷新一次
            setInterval(loadStatsData, 5 * 60 * 1000);
            
            // 设置定时刷新用户信息，每5分钟更新一次
            setInterval(async () => {
                const updatedUserInfo = await loadCurrentUserInfo();
                updateUserInfoDisplay(updatedUserInfo);
            }, 300000);
        });
        
        // 加载统计数据
        async function loadStatsData() {
            showLoading();
            
            try {
                const response = await fetch('/api/v1/stats/detailed');
                if (!response.ok) {
                    throw new Error('加载数据失败');
                }
                
                const result = await response.json();
                if (result.success) {
                    statsData = result.data;
                    lastUpdateTime = new Date();
                    renderStats();
                    renderCharts();
                    renderTable();
                    showToast('数据加载成功', 'success');
                } else {
                    throw new Error(result.message || '加载数据失败');
                }
            } catch (error) {
                console.error('加载统计数据错误:', error);
                showToast('加载数据失败', 'error');
            } finally {
                hideLoading();
            }
        }
        
        // 刷新数据
        function refreshData() {
            loadStatsData();
        }
        
        // 显示加载状态
        function showLoading() {
            const statsGrid = document.getElementById('statsGrid');
            const chartsContainer = document.getElementById('chartsContainer');
            
            statsGrid.innerHTML = '<div class="loading"></div>';
            chartsContainer.innerHTML = '<div class="loading"></div>';
        }
        
        // 隐藏加载状态
        function hideLoading() {
            // 加载完成后自动隐藏，不需要额外操作
        }
        
        // 渲染统计卡片
        function renderStats() {
            if (!statsData) return;
            
            const statsGrid = document.getElementById('statsGrid');
            const statsCards = [
                {
                    title: '作品总数',
                    value: statsData.totalWorks,
                    icon: '📋',
                    change: `+${statsData.worksChange} 本月`,
                    color: '#4caf50'
                },
                {
                    title: '分类数量',
                    value: statsData.totalCategories,
                    icon: '🏷️',
                    change: `+${statsData.categoriesChange} 本月`,
                    color: '#2196f3'
                },
                {
                    title: '线索总数',
                    value: statsData.totalLeads,
                    icon: '👥',
                    change: `+${statsData.leadsChange} 本月`,
                    color: '#ff9800'
                },
                {
                    title: '总浏览量',
                    value: statsData.totalViews,
                    icon: '👁️',
                    change: `+${statsData.viewsChange}% 本月`,
                    color: '#9c27b0'
                }
            ];
            
            statsGrid.innerHTML = statsCards.map(card => `
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-title">${card.title}</div>
                        <div class="stat-icon">${card.icon}</div>
                    </div>
                    <div class="stat-value">${card.value.toLocaleString()}</div>
                    <div class="stat-change" style="color: ${card.color}">${card.change}</div>
                </div>
            `).join('');
        }
        
        // 渲染图表（简化版，实际项目中可以使用Chart.js等库）
        function renderCharts() {
            if (!statsData) return;
            
            const chartsContainer = document.getElementById('chartsContainer');
            
            chartsContainer.innerHTML = `
                <div class="chart-card">
                    <div class="chart-title">作品类型分布</div>
                    <div class="chart-area">
                        <div style="font-size: 18px; text-align: center; color: rgba(255, 255, 255, 0.7);">
                            <div style="margin-bottom: 20px;">作品类型分布图表</div>
                            <div style="display: flex; flex-direction: column; gap: 10px; align-items: center;">
                                ${Object.entries(statsData.worksByCategory).map(([category, count]) => `
                                    <div style="display: flex; align-items: center; gap: 10px; width: 100%; max-width: 300px;">
                                        <div style="width: 120px; text-align: left;">${category}</div>
                                        <div style="flex: 1; height: 20px; background-color: rgba(255, 255, 255, 0.1); border-radius: 10px; overflow: hidden;">
                                            <div style="height: 100%; width: ${(count / statsData.totalWorks) * 100}%; background-color: #990000; transition: width 0.5s ease;"></div>
                                        </div>
                                        <div style="width: 50px; text-align: right;">${count}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>
                <div class="chart-card">
                    <div class="chart-title">线索状态分布</div>
                    <div class="chart-area">
                        <div style="font-size: 18px; text-align: center; color: rgba(255, 255, 255, 0.7);">
                            <div style="margin-bottom: 20px;">线索状态分布图表</div>
                            <div style="display: flex; flex-direction: column; gap: 10px; align-items: center;">
                                ${Object.entries(statsData.leadsByStatus).map(([status, count]) => `
                                    <div style="display: flex; align-items: center; gap: 10px; width: 100%; max-width: 300px;">
                                        <div style="width: 120px; text-align: left;">${getStatusName(status)}</div>
                                        <div style="flex: 1; height: 20px; background-color: rgba(255, 255, 255, 0.1); border-radius: 10px; overflow: hidden;">
                                            <div style="height: 100%; width: ${(count / statsData.totalLeads) * 100}%; background-color: ${getStatusColor(status)}; transition: width 0.5s ease;"></div>
                                        </div>
                                        <div style="width: 50px; text-align: right;">${count}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // 渲染数据表格
        function renderTable() {
            if (!statsData) return;
            
            const tableBody = document.getElementById('tableBody');
            
            const tableRows = statsData.detailedStats.map(stat => `
                <tr>
                    <td>${stat.category}</td>
                    <td>${stat.worksCount}</td>
                    <td>${stat.views}</td>
                    <td>${stat.leadsCount}</td>
                    <td>${stat.conversionRate}%</td>
                </tr>
            `).join('');
            
            tableBody.innerHTML = tableRows;
        }
        
        // 获取状态名称
        function getStatusName(status) {
            const statusMap = {
                'new': '新线索',
                'processing': '处理中',
                'completed': '已完成',
                'canceled': '已取消'
            };
            return statusMap[status] || status;
        }
        
        // 获取状态颜色
        function getStatusColor(status) {
            const colorMap = {
                'new': '#ffc107',
                'processing': '#2196f3',
                'completed': '#4caf50',
                'canceled': '#f44336'
            };
            return colorMap[status] || '#9e9e9e';
        }
        
        // 显示通知
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} active`;
            
            setTimeout(() => {
                toast.classList.remove('active');
            }, 3000);
        }
    </script>
</body>
</html>
