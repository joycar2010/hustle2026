<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>布珥·迈拓空间设计 - 后台管理</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #1a2430;
            color: #ffffff;
            display: flex;
            min-height: 100vh;
            line-height: 1.6;
        }
        
        /* 侧边栏样式 */
        .sidebar {
            width: 240px;
            background-color: #151e29;
            padding: 20px 0;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo img {
            width: 80px;
            height: 80px;
            border-radius: 8px;
        }

        .nav-menu {
            margin-top: 30px;
        }

        .nav-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .nav-item.active {
            background-color: rgba(153, 0, 0, 0.2);
            border-left-color: #990000;
        }

        .nav-item a {
            color: #ffffff;
            text-decoration: none;
            display: flex;
            align-items: center;
            font-size: 16px;
        }

        .nav-item i {
            margin-right: 12px;
            font-size: 18px;
        }
        
        /* 主内容区域 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-left: 240px;
        }
        
        /* 顶部导航栏 */
        .top-nav {
            height: 80px;
            background-color: #151e29;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
        }
        
        .nav-left {
            display: flex;
            align-items: center;
        }
        
        .nav-title {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }
        
        .nav-right {
            display: flex;
            align-items: center;
            gap: 30px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 24px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .user-info:hover {
            background-color: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #ffffff;
            border: 2px solid #cc0000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #cc0000;
            margin-right: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .user-info:hover .user-avatar {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(204, 0, 0, 0.3);
        }
        
        .user-details {
            text-align: right;
            transition: all 0.3s ease;
        }
        
        .user-name {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 2px;
        }
        
        .user-role {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
        }
        
        .user-info:hover .user-role {
            color: rgba(255, 255, 255, 0.9);
        }
        
        /* 用户信息更新动画 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .user-info.updated {
            animation: fadeIn 0.5s ease;
        }
        
        /* 内容区域 */
        .content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background-color: #1a2430;
        }
        
        /* 欢迎卡片 */
        .welcome-card {
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 40px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .welcome-message {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 15px;
        }
        
        .welcome-subtext {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(153, 0, 0, 0.2);
            border-color: rgba(153, 0, 0, 0.3);
        }
        
        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .stat-title {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .stat-icon {
            font-size: 32px;
            color: #990000;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 10px;
        }
        
        .stat-change {
            font-size: 14px;
            color: #4caf50;
        }
        
        /* 快速操作 */
        .quick-actions {
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .actions-title {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 25px;
        }
        
        .actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            font-size: 18px;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .action-btn:hover {
            background-color: rgba(153, 0, 0, 0.2);
            border-color: #990000;
            transform: translateY(-3px);
        }
        
        .action-icon {
            font-size: 48px;
            margin-bottom: 15px;
            color: #990000;
        }
        
        .action-text {
            font-weight: bold;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .sidebar {
                width: 240px;
            }
            
            .main-content {
                padding: 20px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .actions-grid {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 576px) {
            .sidebar {
                width: 100%;
                position: fixed;
                left: -100%;
                z-index: 1000;
            }
            
            .sidebar.open {
                left: 0;
            }
            
            .main-content {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <aside class="sidebar">
        <div class="logo">
            <img src="/images/logo.png" alt="Logo">
        </div>
        <nav class="nav-menu">
            <div class="nav-item active">
                <a href="/dashboard">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>仪表盘</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="/brand-edit">
                    <i class="fas fa-edit"></i>
                    <span>品牌管理</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="/works">
                    <i class="fas fa-palette"></i>
                    <span>作品管理</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="/categories">
                    <i class="fas fa-list"></i>
                    <span>分类管理</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="/leads">
                    <i class="fas fa-handshake"></i>
                    <span>线索管理</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="/customers">
                    <i class="fas fa-users"></i>
                    <span>客户管理</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="/stats">
                    <i class="fas fa-chart-bar"></i>
                    <span>数据统计</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="/settings">
                    <i class="fas fa-cog"></i>
                    <span>系统设置</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="/users">
                    <i class="fas fa-user-cog"></i>
                    <span>操作员管理</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="/logout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>退出登录</span>
                </a>
            </div>
        </nav>
    </aside>
    
    <!-- 主内容区域 -->
    <div class="main-content">
        <!-- 顶部导航栏 -->
        <div class="top-nav">
            <div class="nav-left">
                <div class="nav-title">仪表盘</div>
            </div>
            <div class="nav-right">
                <div class="user-info" id="userInfoContainer">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">管理员</div>
                        <div class="user-role" id="userRole">系统管理员</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 内容区域 -->
        <div class="content">
            <div class="welcome-card">
                <div class="welcome-message">欢迎回来，管理员</div>
                <div class="welcome-subtext">布珥·迈拓空间设计管理后台</div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-title">作品总数</div>
                        <div class="stat-icon">📋</div>
                    </div>
                    <div class="stat-value">24</div>
                    <div class="stat-change">+2 本月新增</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-title">分类数量</div>
                        <div class="stat-icon">🏷️</div>
                    </div>
                    <div class="stat-value">6</div>
                    <div class="stat-change">+1 本月新增</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-title">客户线索</div>
                        <div class="stat-icon">👥</div>
                    </div>
                    <div class="stat-value">18</div>
                    <div class="stat-change">+5 本月新增</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-title">浏览量</div>
                        <div class="stat-icon">👁️</div>
                    </div>
                    <div class="stat-value">1,245</div>
                    <div class="stat-change">+15% 本月</div>
                </div>
            </div>
            
            <div class="quick-actions">
                <div class="actions-title">快速操作</div>
                <div class="actions-grid">
                    <a href="#" class="action-btn">
                        <div class="action-icon">+</div>
                        <div class="action-text">添加新作品</div>
                    </a>
                    <a href="#" class="action-btn">
                        <div class="action-icon">📋</div>
                        <div class="action-text">查看新线索</div>
                    </a>
                    <a href="#" class="action-btn">
                        <div class="action-icon">🏷️</div>
                        <div class="action-text">管理分类</div>
                    </a>
                    <a href="#" class="action-btn">
                        <div class="action-icon">📈</div>
                        <div class="action-text">查看统计</div>
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 获取统计数据的函数
        async function fetchStats() {
            try {
                const response = await fetch('/api/v1/stats');
                
                if (!response.ok) {
                    if (response.status === 401) {
                        // 未授权，重定向到登录页面
                        console.log('未授权访问，重定向到登录页面');
                        window.location.href = '/login';
                        return;
                    }
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const result = await response.json();
                
                if (result.success && result.data) {
                    // 更新统计数据
                    updateStats(result.data);
                } else {
                    console.error('获取统计数据失败:', result.message || '未知错误');
                }
            } catch (error) {
                console.error('获取统计数据出错:', error.message);
            }
        }
        
        // 更新统计数据到页面
        function updateStats(stats) {
            // 获取所有统计卡片
            const statCards = document.querySelectorAll('.stat-card');
            
            // 确保我们有正确数量的卡片
            if (statCards.length >= 4) {
                // 更新作品总数
                const worksCard = statCards[0];
                const worksValue = worksCard.querySelector('.stat-value');
                if (worksValue) {
                    worksValue.textContent = stats.works.toLocaleString();
                }
                
                // 更新分类数量
                const categoriesCard = statCards[1];
                const categoriesValue = categoriesCard.querySelector('.stat-value');
                if (categoriesValue) {
                    categoriesValue.textContent = stats.categories.toLocaleString();
                }
                
                // 更新客户线索
                const leadsCard = statCards[2];
                const leadsValue = leadsCard.querySelector('.stat-value');
                if (leadsValue) {
                    leadsValue.textContent = stats.leads.toLocaleString();
                }
                
                // 更新浏览量
                const viewsCard = statCards[3];
                const viewsValue = viewsCard.querySelector('.stat-value');
                if (viewsValue) {
                    viewsValue.textContent = stats.views.toLocaleString();
                }
            }
        }
        
        // 加载当前用户信息
        async function loadCurrentUserInfo() {
            try {
                const response = await fetch('/api/v1/users/current');
                
                if (!response.ok) {
                    if (response.status === 401) {
                        // 未授权，重定向到登录页面
                        console.log('未授权访问，重定向到登录页面');
                        window.location.href = '/login';
                        return null;
                    }
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const result = await response.json();
                
                if (result.success && result.data) {
                    return result.data;
                } else {
                    console.error('获取用户信息失败:', result.message || '未知错误');
                    return null;
                }
            } catch (error) {
                console.error('获取用户信息出错:', error.message);
                return null;
            }
        }
        
        // 更新用户信息显示
        function updateUserInfoDisplay(userInfo) {
            if (!userInfo) {
                return;
            }
            
            const userInfoContainer = document.getElementById('userInfoContainer');
            const userAvatar = document.getElementById('userAvatar');
            const userName = document.getElementById('userName');
            const userRole = document.getElementById('userRole');
            const welcomeMessage = document.querySelector('.welcome-message');
            
            if (userAvatar) {
                userAvatar.textContent = userInfo.id || 'A';
            }
            
            if (userName) {
                userName.textContent = userInfo.username || '未知用户';
            }
            
            if (userRole) {
                const roleMap = {
                    'admin': '系统管理员',
                    'editor': '编辑员',
                    'viewer': '查看员'
                };
                userRole.textContent = roleMap[userInfo.role] || '普通用户';
            }
            
            // 更新欢迎消息
            if (welcomeMessage) {
                welcomeMessage.textContent = `欢迎回来，${userInfo.username || '未知用户'}`;
            }
            
            // 添加更新动画效果
            if (userInfoContainer) {
                userInfoContainer.classList.add('updated');
                setTimeout(() => {
                    userInfoContainer.classList.remove('updated');
                }, 500);
            }
            
            // 根据权限更新导航菜单
            updateNavigationBasedOnPermissions(userInfo.permissions, userInfo.role);
        }
        
        // 根据权限更新导航菜单
        function updateNavigationBasedOnPermissions(permissions, role) {
            // 导航项与权限的映射关系
            const navPermissionMap = {
                'dashboard': 'dashboard',
                'brand-edit': 'brand',
                'works': 'works',
                'categories': 'categories',
                'leads': 'leads',
                'customers': 'customers',
                'stats': 'stats',
                'settings': 'settings',
                'users': 'users'
            };
            
            // 获取所有导航项
            const navItems = document.querySelectorAll('.nav-item');
            
            navItems.forEach(navItem => {
                const link = navItem.querySelector('a');
                if (link) {
                    const href = link.getAttribute('href');
                    // 提取路径部分（去掉开头的/）
                    const path = href.substring(1);
                    
                    // 检查是否需要权限控制（排除退出登录）
                    if (path !== 'logout') {
                        const requiredPermission = navPermissionMap[path];
                        
                        // 检查用户是否有对应权限
                        if (permissions && permissions[requiredPermission]) {
                            navItem.style.display = 'block';
                        } else {
                            navItem.style.display = 'none';
                        }
                    }
                }
            });
            
            // 根据权限更新快速操作按钮
            updateQuickActionsBasedOnPermissions(permissions, role);
        }
        
        // 根据权限更新快速操作按钮
        function updateQuickActionsBasedOnPermissions(permissions, role) {
            const quickActions = document.querySelectorAll('.action-btn');
            
            quickActions.forEach((actionBtn, index) => {
                // 快速操作按钮与权限的映射关系
                const actionPermissionMap = {
                    0: 'works', // 添加新作品
                    1: 'leads', // 查看新线索
                    2: 'categories', // 管理分类
                    3: 'stats' // 查看统计
                };
                
                const requiredPermission = actionPermissionMap[index];
                
                if (permissions && permissions[requiredPermission]) {
                    actionBtn.style.display = 'flex';
                } else {
                    actionBtn.style.display = 'none';
                }
            });
        }
        
        // 页面加载时获取数据
        document.addEventListener('DOMContentLoaded', async () => {
            fetchStats();
            
            // 加载当前用户信息
            const userInfo = await loadCurrentUserInfo();
            updateUserInfoDisplay(userInfo);
            
            // 设置定时刷新，每30秒更新一次数据
            setInterval(fetchStats, 30000);
            
            // 设置定时刷新用户信息，每5分钟更新一次
            setInterval(async () => {
                const updatedUserInfo = await loadCurrentUserInfo();
                updateUserInfoDisplay(updatedUserInfo);
            }, 300000);
            
            // 为"添加新作品"按钮添加事件监听器
            const addWorkBtn = document.querySelector('.action-btn:first-child');
            if (addWorkBtn) {
                addWorkBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    // 跳转到作品管理页面并自动打开添加作品模态框
                    window.location.href = '/works?action=add';
                });
            }
            
            // 为"查看新线索"按钮添加事件监听器
            const viewLeadsBtn = document.querySelector('.action-btn:nth-child(2)');
            if (viewLeadsBtn) {
                viewLeadsBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.location.href = '/leads';
                });
            }
            
            // 为"管理分类"按钮添加事件监听器
            const manageCategoriesBtn = document.querySelector('.action-btn:nth-child(3)');
            if (manageCategoriesBtn) {
                manageCategoriesBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.location.href = '/categories';
                });
            }
            
            // 为"查看统计"按钮添加事件监听器
            const viewStatsBtn = document.querySelector('.action-btn:nth-child(4)');
            if (viewStatsBtn) {
                viewStatsBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.location.href = '/stats';
                });
            }
        });
    </script>
</body>
</html>
