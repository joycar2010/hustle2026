<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>线索管理 - 布珥·迈拓空间设计</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #1a2430;
            color: #ffffff;
            display: flex;
            min-height: 100vh;
            line-height: 1.6;
        }
        
        /* 侧边栏样式 */
        .sidebar {
            width: 240px;
            background-color: #151e29;
            padding: 20px 0;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
        }
        
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .logo img {
            width: 80px;
            height: 80px;
            border-radius: 8px;
        }
        
        .nav-menu {
            margin-top: 30px;
        }
        
        .nav-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }
        
        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }
        
        .nav-item.active {
            background-color: rgba(153, 0, 0, 0.2);
            border-left-color: #990000;
        }
        
        .nav-item a {
            color: #ffffff;
            text-decoration: none;
            display: flex;
            align-items: center;
            font-size: 16px;
        }
        
        .nav-item i {
            margin-right: 12px;
            font-size: 18px;
        }
        
        .nav-item span {
            flex: 1;
        }
        
        /* 主内容区域 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-left: 240px;
        }
        
        /* 顶部导航栏 */
        .top-nav {
            height: 80px;
            background-color: #151e29;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
        }
        
        .nav-left {
            display: flex;
            align-items: center;
        }
        
        .nav-title {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }
        
        .nav-right {
            display: flex;
            align-items: center;
            gap: 30px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 24px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .user-info:hover {
            background-color: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #ffffff;
            border: 2px solid #cc0000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #cc0000;
            margin-right: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .user-info:hover .user-avatar {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(204, 0, 0, 0.3);
        }
        
        .user-details {
            text-align: right;
            transition: all 0.3s ease;
        }
        
        .user-name {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 2px;
        }
        
        .user-role {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
        }
        
        .user-info:hover .user-role {
            color: rgba(255, 255, 255, 0.9);
        }
        
        /* 用户信息更新动画 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .user-info.updated {
            animation: fadeIn 0.5s ease;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            border: none;
        }
        
        .btn-primary {
            background-color: #990000;
            color: #fff;
        }
        
        .btn-primary:hover {
            background-color: #cc0000;
            transform: translateY(-2px);
        }
        
        /* 内容区域 */
        .content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background-color: #1a2430;
        }
        
        /* 线索管理 */
        .leads-container {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 30px;
        }
        
        /* 筛选和搜索区域 */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            align-items: center;
        }
        
        .search-box {
            display: flex;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px 15px;
        }
        
        .search-box input {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 16px;
            outline: none;
            margin-left: 10px;
            width: 200px;
        }
        
        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        
        .filter-select {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px 15px;
            color: #fff;
            font-size: 16px;
            outline: none;
            min-width: 150px;
        }

        .filter-select option {
            background-color: #1a2430;
            color: white;
        }
        
        /* 线索列表 */
        .leads-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }
        
        .leads-table th,
        .leads-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .leads-table th {
            font-weight: bold;
            color: #fff;
            background-color: rgba(255, 255, 255, 0.05);
        }
        
        .leads-table td {
            color: rgba(255, 255, 255, 0.8);
        }
        
        .leads-table tbody tr:hover {
            background-color: rgba(153, 0, 0, 0.1);
        }
        
        /* 状态标签 */
        .status-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .status-new {
            background-color: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }
        
        .status-processing {
            background-color: rgba(33, 150, 243, 0.2);
            color: #2196f3;
        }
        
        .status-completed {
            background-color: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }
        
        .status-canceled {
            background-color: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }
        
        /* 操作按钮 */
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        
        .btn-sm {
            padding: 5px 12px;
            font-size: 14px;
            border-radius: 4px;
            min-width: 80px;
        }
        
        .active-status {
            font-weight: bold;
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.2);
        }
        
        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        
        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }
        
        .btn-danger {
            background-color: #cc0000;
            color: #fff;
        }
        
        .btn-danger:hover {
            background-color: #a30000;
        }

        .btn-success {
            background-color: #22c55e;
            color: #fff;
        }

        .btn-success:hover {
            background-color: #16a34a;
        }
        
        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background-color: #2a2a2a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-title {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }
        
        .close-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.7;
        }
        
        .close-btn:hover {
            opacity: 1;
        }
        
        /* 表单样式 */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 16px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            padding: 12px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        
        .form-input:focus {
            border-color: #990000;
            box-shadow: 0 0 0 3px rgba(153, 0, 0, 0.1);
        }

        .form-input option {
            background-color: #1a2430;
            color: white;
        }
        
        .form-textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        .form-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 30px;
        }
        
        /* 加载状态 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        
        .loading::after {
            content: '';
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #990000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        
        /* 通知提示 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: #fff;
            font-weight: 500;
            z-index: 2000;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.3s ease;
        }
        
        .toast.active {
            opacity: 1;
            transform: translateX(0);
        }
        
        .toast.success {
            background-color: #4caf50;
        }
        
        .toast.error {
            background-color: #cc0000;
        }
        
        .toast.info {
            background-color: #2196f3;
        }
        
        /* 响应式设计 */
        @media (max-width: 1200px) {
            .filter-bar {
                flex-direction: column;
                align-items: stretch;
            }
            
            .leads-table {
                font-size: 14px;
            }
            
            .leads-table th,
            .leads-table td {
                padding: 10px;
            }
        }
        
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .main-content {
                margin-left: 0;
                width: 100%;
            }
            
            .content {
                padding: 20px;
            }
            
            .top-nav {
                padding: 0 20px;
            }
            
            .leads-container {
                padding: 20px;
            }
            
            .leads-table {
                display: block;
                overflow-x: auto;
            }
        }
        
        @media (max-width: 576px) {
            .action-buttons {
                flex-direction: column;
            }
            
            .modal-content {
                width: 95%;
                max-width: 500px;
                margin: 20px;
                padding: 20px;
            }
            
            .form-group {
                margin-bottom: 15px;
            }
            
            .form-input {
                font-size: 14px;
                padding: 10px;
            }
            
            .form-actions {
                flex-direction: column;
                gap: 10px;
            }
            
            .form-actions button {
                width: 100%;
                margin: 0;
            }
        }
    </style>
</head>

      <nav class="nav-menu">

        </div>

      </nav>
    </aside>
    
    <!-- 主内容区域 -->
    <div class="main-content">
        <!-- 顶部导航栏 -->
        <div class="top-nav">
            <div class="nav-left">
                <div class="nav-title">线索管理</div>
            </div>
            <div class="nav-right">
                <button class="btn btn-primary" onclick="openAddModal()">
                    + 添加线索
                </button>
                <div class="user-info" id="userInfoContainer">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">管理员</div>
                        <div class="user-role" id="userRole">系统管理员</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 内容区域 -->
        <div class="content">
            <div class="leads-container">
                <!-- 筛选和搜索区域 -->
                <div class="filter-bar">
                    <div class="search-box">
                        <span>🔍</span>
                        <input type="text" id="searchInput" placeholder="搜索客户名称或电话..." oninput="handleSearch()">
                    </div>
                    
                    <select class="filter-select" id="statusFilter" onchange="handleFilter()">
                        <option value="">全部状态</option>
                        <option value="new">新线索</option>
                        <option value="processing">处理中</option>
                        <option value="completed">已完成</option>
                        <option value="canceled">已取消</option>
                    </select>
                    
                    <select class="filter-select" id="sortSelect" onchange="handleSort()">
                        <option value="id:desc">最新创建</option>
                        <option value="id:asc">最早创建</option>
                    </select>
                </div>
                
                <!-- 线索列表 -->
                <div id="leadsTableContainer">
                    <div class="loading"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 添加/编辑线索模态框 -->
    <div class="modal" id="leadsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">添加线索</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            
            <div style="width: 100%;">
                <!-- 线索编辑表单 -->
                <div style="width: 100%; max-width: 800px; margin: 0 auto;">
                    <form id="leadsForm" onsubmit="submitForm(event)">
                        <input type="hidden" id="leadId">
                        
                        <div class="form-group">
                            <label class="form-label" for="leadName">客户名称</label>
                            <input type="text" class="form-input" id="leadName" name="name" required placeholder="请输入客户名称">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" for="leadPhone">联系电话</label>
                            <input type="tel" class="form-input" id="leadPhone" name="phone" required placeholder="请输入联系电话">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" for="leadEmail">电子邮箱</label>
                            <input type="email" class="form-input" id="leadEmail" name="email" placeholder="请输入电子邮箱">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" for="leadProjectType">项目类型</label>
                            <select class="form-input" id="leadProjectType" name="projectType" required>
                                <option value="residential">家装设计</option>
                                <option value="office">公装设计</option>
                                <option value="commercial">商业空间</option>
                                <option value="other">其他</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" for="leadBudget">预算范围</label>
                            <input type="text" class="form-input" id="leadBudget" name="budget" placeholder="请输入预算范围">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" for="leadStatus">状态</label>
                            <select class="form-input" id="leadStatus" name="status" required>
                                <option value="new">新线索</option>
                                <option value="processing">处理中</option>
                                <option value="completed">已完成</option>
                                <option value="canceled">已取消</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" for="leadDescription">备注</label>
                            <textarea class="form-input form-textarea" id="leadDescription" name="description" placeholder="请输入备注信息"></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" for="leadWechatAvatar">微信头像</label>
                            <input type="text" class="form-input" id="leadWechatAvatar" name="wechatAvatar" placeholder="请输入微信头像URL">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" for="leadWechatNickname">微信昵称</label>
                            <input type="text" class="form-input" id="leadWechatNickname" name="wechatNickname" placeholder="请输入微信昵称">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" for="leadWechatOpenId">微信OpenID</label>
                            <input type="text" class="form-input" id="leadWechatOpenId" name="wechatOpenId" placeholder="请输入微信OpenID">
                        </div>
                        
                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                            <button type="submit" class="btn btn-primary">保存</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 通知提示 -->
    <div class="toast" id="toast"></div>
    
    <script>
        // 全局状态
        let leads = [];
        let filteredLeads = [];
        let currentPage = 1;
        const pageSize = 10;
        let currentSort = 'id:desc';
        let currentFilter = '';
        let currentSearch = '';
        
        // 加载当前用户信息
        async function loadCurrentUserInfo() {
            try {
                const response = await fetch('/api/v1/users/current');
                
                if (!response.ok) {
                    if (response.status === 401) {
                        // 未授权，重定向到登录页面
                        console.log('未授权访问，重定向到登录页面');
                        window.location.href = '/login';
                        return null;
                    }
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const result = await response.json();
                
                if (result.success && result.data) {
                    return result.data;
                } else {
                    console.error('获取用户信息失败:', result.message || '未知错误');
                    return null;
                }
            } catch (error) {
                console.error('获取用户信息出错:', error.message);
                return null;
            }
        }
        
        // 更新用户信息显示
        function updateUserInfoDisplay(userInfo) {
            if (!userInfo) {
                return;
            }
            
            const { id, username, role, permissions } = userInfo;
            
            const userInfoContainer = document.getElementById('userInfoContainer');
            const userAvatar = document.getElementById('userAvatar');
            const userName = document.getElementById('userName');
            const userRole = document.getElementById('userRole');
            
            if (userAvatar) {
                userAvatar.textContent = id || 'A';
            }
            
            if (userName) {
                userName.textContent = username || '未知用户';
            }
            
            if (userRole) {
                const roleMap = {
                    'admin': '系统管理员',
                    'editor': '编辑员',
                    'viewer': '查看员'
                };
                userRole.textContent = roleMap[role] || '普通用户';
            }
            
            // 添加更新动画效果
            if (userInfoContainer) {
                userInfoContainer.classList.add('updated');
                setTimeout(() => {
                    userInfoContainer.classList.remove('updated');
                }, 500);
            }
            
            // 根据权限更新导航菜单
            updateNavigationBasedOnPermissions(permissions, role);
        }
        
        // 根据权限更新导航菜单
        function updateNavigationBasedOnPermissions(permissions, role) {
            // 导航项与权限的映射关系
            const navPermissionMap = {
                'dashboard': 'dashboard',
                'brand-edit': 'brand',
                'works': 'works',
                'categories': 'categories',
                'leads': 'leads',
                'customers': 'customers',
                'stats': 'stats',
                'settings': 'settings',
                'users': 'users'
            };
            
            // 获取所有导航项
            const navItems = document.querySelectorAll('.nav-item');
            
            navItems.forEach(navItem => {
                const link = navItem.querySelector('a');
                if (link) {
                    const href = link.getAttribute('href');
                    // 提取路径部分（去掉开头的/）
                    const path = href.substring(1);
                    
                    // 检查是否需要权限控制（排除退出登录）
                    if (path !== 'logout') {
                        const requiredPermission = navPermissionMap[path];
                        
                        // 管理员角色或有对应权限的用户可以看到该导航项
                        if (role === 'admin' || (permissions && permissions[requiredPermission])) {
                            navItem.style.display = 'block';
                        } else {
                            navItem.style.display = 'none';
                        }
                    }
                }
            });
        }
        
        // 初始化页面
        document.addEventListener('DOMContentLoaded', async () => {
            loadLeads();
            
            // 加载当前用户信息
            const userInfo = await loadCurrentUserInfo();
            updateUserInfoDisplay(userInfo);
            
            // 设置定时刷新，每30秒更新一次数据
            setInterval(loadLeads, 30000);
            
            // 设置定时刷新用户信息，每5分钟更新一次
            setInterval(async () => {
                const updatedUserInfo = await loadCurrentUserInfo();
                updateUserInfoDisplay(updatedUserInfo);
            }, 300000);
        });
        
        // 加载线索数据
        async function loadLeads() {
            const container = document.getElementById('leadsTableContainer');
            container.innerHTML = '<div class="loading"></div>';
            
            try {
                const response = await fetch('/api/v1/leads');
                if (!response.ok) {
                    throw new Error('加载线索失败');
                }
                
                const result = await response.json();
                if (result.success) {
                    leads = result.data;
                    applyFilters();
                } else {
                    showToast('加载线索失败', 'error');
                }
            } catch (error) {
                console.error('加载线索错误:', error);
                showToast('加载线索失败', 'error');
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: rgba(255, 255, 255, 0.5);">加载线索失败，请刷新页面重试</div>';
            }
        }
        
        // 应用筛选和排序
        function applyFilters() {
            filteredLeads = [...leads];
            
            // 搜索筛选
            if (currentSearch) {
                const searchLower = currentSearch.toLowerCase();
                filteredLeads = filteredLeads.filter(lead => 
                    lead.name.toLowerCase().includes(searchLower) ||
                    lead.phone.toLowerCase().includes(searchLower)
                );
            }
            
            // 状态筛选
            if (currentFilter) {
                filteredLeads = filteredLeads.filter(lead => 
                    lead.status === currentFilter
                );
            }
            
            // 排序
            const [sortField, sortOrder] = currentSort.split(':');
            filteredLeads.sort((a, b) => {
                const aVal = a[sortField];
                const bVal = b[sortField];
                
                if (aVal < bVal) return sortOrder === 'asc' ? -1 : 1;
                if (aVal > bVal) return sortOrder === 'asc' ? 1 : -1;
                return 0;
            });
            
            // 渲染表格
            renderLeadsTable();
        }
        
        // 获取状态标签
        function getStatusTag(status) {
            const statusMap = {
                'new': { text: '新线索', class: 'status-new' },
                'processing': { text: '处理中', class: 'status-processing' },
                'completed': { text: '已完成', class: 'status-completed' },
                'canceled': { text: '已取消', class: 'status-canceled' }
            };
            
            const statusInfo = statusMap[status] || { text: status, class: '' };
            return `<span class="status-tag ${statusInfo.class}">${statusInfo.text}</span>`;
        }
        
        // 渲染线索表格
        function renderLeadsTable() {
            const container = document.getElementById('leadsTableContainer');
            
            if (filteredLeads.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: rgba(255, 255, 255, 0.5);">没有找到符合条件的线索</div>';
                return;
            }
            
            // 分页
            const totalPages = Math.ceil(filteredLeads.length / pageSize);
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const paginatedLeads = filteredLeads.slice(startIndex, endIndex);
            
            // 渲染表格
            const tableHTML = `
                <table class="leads-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>客户名称</th>
                            <th>联系电话</th>
                            <th>电子邮箱</th>
                            <th>项目类型</th>
                            <th>预算范围</th>
                            <th>状态</th>
                            <th>微信头像</th>
                            <th>微信昵称</th>
                            <th>微信OpenID</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${paginatedLeads.map(lead => `
                            <tr>
                                <td>${lead.id}</td>
                                <td>${lead.name}</td>
                                <td>${lead.phone}</td>
                                <td>${lead.email || '-'}</td>
                                <td>${lead.projectType}</td>
                                <td>${lead.budget || '-'}</td>
                                <td>${getStatusTag(lead.status)}</td>
                                <td>${lead.wechatAvatar ? `<img src="${lead.wechatAvatar}" alt="头像" style="width: 40px; height: 40px; border-radius: 50%;">` : '-'}</td>
                                <td>${lead.wechatNickname || '-'}</td>
                                <td>${lead.wechatOpenId || '-'}</td>
                                <td>${new Date(lead.createdAt).toLocaleString()}</td>
                                <td>
                                    <div style="display: flex; flex-direction: column; gap: 10px;">
                                        <!-- 顶部：添加客户信息按钮 -->
                                        <div>
                                            <button class="btn btn-sm btn-success" onclick="openAddCustomerModal(${lead.id})" title="添加客户信息至客户管理">
                                                ➕ 添加客户
                                            </button>
                                        </div>
                                        <!-- 中间：状态变更按钮组 -->
                                        <div class="action-buttons" style="gap: 5px; flex-wrap: wrap;">
                                            <button class="btn btn-sm ${lead.status === 'processing' ? 'btn-secondary active-status' : 'btn-secondary'}" onclick="updateLeadStatus(${lead.id}, 'processing')">
                                                处理中
                                            </button>
                                            <button class="btn btn-sm ${lead.status === 'completed' ? 'btn-success active-status' : 'btn-secondary'}" onclick="updateLeadStatus(${lead.id}, 'completed')">
                                                已完成
                                            </button>
                                            <button class="btn btn-sm ${lead.status === 'canceled' ? 'btn-danger active-status' : 'btn-secondary'}" onclick="updateLeadStatus(${lead.id}, 'canceled')">
                                                已取消
                                            </button>
                                        </div>
                                        <!-- 底部：编辑和删除按钮 -->
                                        <div class="action-buttons">
                                            <button class="btn btn-sm btn-secondary" onclick="editLead(${lead.id})">
                                                编辑
                                            </button>
                                            <button class="btn btn-sm btn-danger" onclick="deleteLead(${lead.id})">
                                                删除
                                            </button>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
                
                <!-- 分页 -->
                <div class="pagination">
                    <button onclick="changePage(1)" ${currentPage === 1 ? 'disabled' : ''}>
                        首页
                    </button>
                    <button onclick="changePage(currentPage - 1)" ${currentPage === 1 ? 'disabled' : ''}>
                        上一页
                    </button>
                    
                    ${Array.from({ length: totalPages }, (_, i) => i + 1).map(page => `
                        <button 
                            onclick="changePage(${page})" 
                            class="${currentPage === page ? 'active' : ''}"
                        >
                            ${page}
                        </button>
                    `).join('')}
                    
                    <button onclick="changePage(currentPage + 1)" ${currentPage === totalPages ? 'disabled' : ''}>
                        下一页
                    </button>
                    <button onclick="changePage(totalPages)" ${currentPage === totalPages ? 'disabled' : ''}>
                        末页
                    </button>
                    <span style="color: rgba(255, 255, 255, 0.6); margin-left: 20px;">
                        共 ${filteredLeads.length} 条线索，第 ${currentPage} / ${totalPages} 页
                    </span>
                </div>
            `;
            
            container.innerHTML = tableHTML;
        }
        
        // 搜索处理
        function handleSearch() {
            currentSearch = document.getElementById('searchInput').value;
            currentPage = 1;
            applyFilters();
        }
        
        // 筛选处理
        function handleFilter() {
            currentFilter = document.getElementById('statusFilter').value;
            currentPage = 1;
            applyFilters();
        }
        
        // 排序处理
        function handleSort() {
            currentSort = document.getElementById('sortSelect').value;
            currentPage = 1;
            applyFilters();
        }
        
        // 分页处理
        function changePage(page) {
            const totalPages = Math.ceil(filteredLeads.length / pageSize);
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                renderLeadsTable();
            }
        }
        
        // 打开添加模态框
        function openAddModal() {
            document.getElementById('modalTitle').textContent = '添加线索';
            document.getElementById('leadsForm').reset();
            document.getElementById('leadId').value = '';
            document.getElementById('leadsModal').classList.add('active');
        }
        
        // 关闭模态框
        function closeModal() {
            document.getElementById('leadsModal').classList.remove('active');
        }
        
        // 编辑线索
        function editLead(id) {
            const lead = leads.find(l => l.id === id);
            if (!lead) return;
            
            document.getElementById('modalTitle').textContent = '编辑线索';
            document.getElementById('leadId').value = lead.id;
            document.getElementById('leadName').value = lead.name;
            document.getElementById('leadPhone').value = lead.phone;
            document.getElementById('leadEmail').value = lead.email;
            document.getElementById('leadProjectType').value = lead.projectType;
            document.getElementById('leadBudget').value = lead.budget;
            document.getElementById('leadStatus').value = lead.status;
            document.getElementById('leadDescription').value = lead.description;
            document.getElementById('leadWechatAvatar').value = lead.wechatAvatar || '';
            document.getElementById('leadWechatNickname').value = lead.wechatNickname || '';
            document.getElementById('leadWechatOpenId').value = lead.wechatOpenId || '';
            
            document.getElementById('leadsModal').classList.add('active');
        }
        
        // 删除线索
        async function deleteLead(id) {
            if (confirm('确定要删除这条线索吗？此操作不可恢复。')) {
                try {
                    const response = await fetch(`/api/v1/leads/${id}`, {
                        method: 'DELETE'
                    });
                    
                    const result = await response.json();
                    if (result.success) {
                        showToast('删除线索成功', 'success');
                        loadLeads(); // 重新加载线索列表
                    } else {
                        showToast('删除线索失败', 'error');
                    }
                } catch (error) {
                    console.error('删除线索错误:', error);
                    showToast('删除线索失败', 'error');
                }
            }
        }
        
        // 提交表单
        async function submitForm(event) {
            event.preventDefault();
            
            const leadId = document.getElementById('leadId').value;
            
            try {
                // 构建线索数据
                const leadData = {
                    name: document.getElementById('leadName').value,
                    phone: document.getElementById('leadPhone').value,
                    email: document.getElementById('leadEmail').value,
                    projectType: document.getElementById('leadProjectType').value,
                    budget: document.getElementById('leadBudget').value,
                    status: document.getElementById('leadStatus').value,
                    description: document.getElementById('leadDescription').value,
                    wechatAvatar: document.getElementById('leadWechatAvatar').value,
                    wechatNickname: document.getElementById('leadWechatNickname').value,
                    wechatOpenId: document.getElementById('leadWechatOpenId').value
                };
                
                let response;
                if (leadId) {
                    // 编辑线索
                    response = await fetch(`/api/v1/leads/${leadId}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(leadData)
                    });
                } else {
                    // 添加线索
                    response = await fetch('/api/v1/leads', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(leadData)
                    });
                }
                
                const result = await response.json();
                if (result.success) {
                    showToast(leadId ? '编辑线索成功' : '添加线索成功', 'success');
                    closeModal();
                    loadLeads(); // 重新加载线索列表
                } else {
                    showToast(leadId ? '编辑线索失败' : '添加线索失败', 'error');
                }
            } catch (error) {
                console.error('提交表单错误:', error);
                showToast('操作失败，请检查输入格式', 'error');
            }
        }
        
        // 打开添加客户信息模态框
        function openAddCustomerModal(leadId) {
            // 直接调用添加客户信息函数
            addCustomerFromLeadDirect(leadId);
        }

        // 直接从线索添加客户信息
        async function addCustomerFromLeadDirect(leadId) {
            try {
                showToast('正在添加客户信息...', 'info');
                
                const response = await fetch(`/api/v1/leads/${leadId}/add-to-customers`);
                const result = await response.json();
                
                if (result.success) {
                    showToast('客户信息添加成功', 'success');
                } else {
                    showToast(result.message || '客户信息添加失败', 'error');
                }
            } catch (error) {
                console.error('添加客户信息错误:', error);
                showToast('添加客户信息失败，请稍后重试', 'error');
            }
        }

        // 从线索添加客户信息
        async function addCustomerFromLead() {
            const leadId = document.getElementById('leadId').value;
            if (!leadId) {
                document.getElementById('customerAddResult').textContent = '请先选择要编辑的线索';
                document.getElementById('customerAddResult').style.color = '#ffc107';
                return;
            }
            
            try {
                document.getElementById('customerAddResult').textContent = '正在添加客户信息...';
                document.getElementById('customerAddResult').style.color = '#2196f3';
                
                const response = await fetch(`/api/v1/leads/${leadId}/add-to-customers`);
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('customerAddResult').textContent = '客户信息添加成功';
                    document.getElementById('customerAddResult').style.color = '#4caf50';
                    showToast('客户信息添加成功', 'success');
                } else {
                    document.getElementById('customerAddResult').textContent = result.message || '客户信息添加失败';
                    document.getElementById('customerAddResult').style.color = '#f44336';
                    showToast('客户信息添加失败', 'error');
                }
            } catch (error) {
                console.error('添加客户信息错误:', error);
                document.getElementById('customerAddResult').textContent = '添加客户信息失败，请稍后重试';
                document.getElementById('customerAddResult').style.color = '#f44336';
                showToast('添加客户信息失败', 'error');
            }
        }
        
        // 更新线索状态
        async function updateLeadStatus(leadId, newStatus) {
            if (!confirm(`确定要将这条线索状态更新为「${getStatusText(newStatus)}」吗？`)) {
                return;
            }
            
            try {
                showToast('正在更新状态...', 'info');
                
                const response = await fetch(`/api/v1/leads/${leadId}/status`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: newStatus })
                });
                
                const result = await response.json();
                if (result.success) {
                    showToast('状态更新成功', 'success');
                    loadLeads(); // 重新加载线索列表以更新状态
                } else {
                    showToast('状态更新失败', 'error');
                }
            } catch (error) {
                console.error('更新线索状态错误:', error);
                showToast('状态更新失败，请稍后重试', 'error');
            }
        }
        
        // 获取状态文本
        function getStatusText(status) {
            const statusMap = {
                'new': '新线索',
                'processing': '处理中',
                'completed': '已完成',
                'canceled': '已取消'
            };
            return statusMap[status] || status;
        }
        
        // 显示通知
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} active`;
            
            setTimeout(() => {
                toast.classList.remove('active');
            }, 3000);
        }
        
        // 点击模态框外部关闭
        window.addEventListener('click', (e) => {
            const modal = document.getElementById('leadsModal');
            if (e.target === modal) {
                closeModal();
            }
        });
    </script>
</body>
</html>
