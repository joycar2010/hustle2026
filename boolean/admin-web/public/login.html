<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>布尔·迈拓空间设计 - 后台管理登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #191919;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .login-container {
            width: 100%;
            max-width: 500px;
            padding: 60px 40px;
            background-color: #2a2a2a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .login-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 60px;
        }
        
        .login-logo {
            width: 160px;
            height: 160px;
            margin-bottom: 30px;
            margin-left: auto;
            margin-right: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        .login-title {
            font-size: 36px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 15px;
        }
        
        .login-subtitle {
            font-size: 26px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .login-form {
            width: 100%;
        }
        
        .form-item {
            margin-bottom: 40px;
        }
        
        .form-label {
            display: block;
            font-size: 26px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 15px;
        }
        
        .form-input {
            width: 100%;
            padding: 25px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 26px;
            color: #fff;
            background-color: rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #e61736;
            background-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 8px rgba(230, 23, 54, 0.1);
        }
        
        .login-btn {
            width: 100%;
            padding: 25px 0;
            background-color: #e61736;
            color: #ffffff;
            font-size: 28px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            box-shadow: 0 4px 16px rgba(230, 23, 54, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(230, 23, 54, 0.4);
        }
        
        .login-btn:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(230, 23, 54, 0.5);
        }
        
        .error-message {
            color: #e61736;
            font-size: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        ::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        
        /* 响应式设计 */
        @media (max-width: 600px) {
            .login-container {
                padding: 40px 20px;
                margin: 20px;
            }
            
            .login-title {
                font-size: 28px;
            }
            
            .login-subtitle {
                font-size: 20px;
            }
            
            .form-input {
                padding: 20px;
                font-size: 22px;
            }
            
            .login-btn {
                padding: 20px 0;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">
                <img src="/images/logo.png" alt="布珥·迈拓空间设计" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            <div class="login-title">布珥·迈拓空间设计</div>
            <div class="login-subtitle">管理员登录</div>
        </div>
        
        <form class="login-form" id="loginForm">
            <div id="errorMessage" class="error-message" style="display: none;"></div>
            
            <div class="form-item">
                <label class="form-label" for="username">账号</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="请输入管理员账号" required>
            </div>
            
            <div class="form-item">
                <label class="form-label" for="password">密码</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="请输入管理员密码" required>
            </div>
            
            <button type="submit" class="login-btn">登录</button>
        </form>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            
            errorMessage.style.display = 'none';
            
            // 发送登录请求
            fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    errorMessage.textContent = data.message;
                    errorMessage.style.display = 'block';
                }
            })
            .catch(error => {
                console.error('登录请求失败:', error);
                errorMessage.textContent = '登录失败，请稍后重试';
                errorMessage.style.display = 'block';
            });
        });
    </script>
</body>
</html>
