<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户管理 - 布珥·迈拓空间设计</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #1a2430;
            color: #ffffff;
            display: flex;
            min-height: 100vh;
            line-height: 1.6;
        }
        
        /* 侧边栏样式 */
        .sidebar {
            width: 240px;
            background-color: #151e29;
            padding: 20px 0;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
        }
        
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .logo img {
            width: 80px;
            height: 80px;
            border-radius: 8px;
        }
        
        .nav-menu {
            margin-top: 30px;
        }
        
        .nav-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }
        
        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }
        
        .nav-item.active {
            background-color: rgba(153, 0, 0, 0.2);
            border-left-color: #990000;
        }
        
        .nav-item a {
            color: #ffffff;
            text-decoration: none;
            display: flex;
            align-items: center;
            font-size: 16px;
        }
        
        .nav-item i {
            margin-right: 12px;
            font-size: 18px;
        }
        
        .nav-item span {
            flex: 1;
        }
        
        /* 主内容区域 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-left: 240px;
        }
        
        /* 顶部导航栏 */
        .top-nav {
            height: 80px;
            background-color: #151e29;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
        }
        
        .nav-right {
            display: flex;
            align-items: center;
            gap: 30px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 24px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .user-info:hover {
            background-color: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #ffffff;
            border: 2px solid #cc0000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #cc0000;
            margin-right: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .user-info:hover .user-avatar {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(204, 0, 0, 0.3);
        }
        
        .user-details {
            text-align: right;
            transition: all 0.3s ease;
        }
        
        .user-name {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 2px;
        }
        
        .user-role {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
        }
        
        .user-info:hover .user-role {
            color: rgba(255, 255, 255, 0.9);
        }
        
        /* 用户信息更新动画 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .user-info.updated {
            animation: fadeIn 0.5s ease;
        }
        
        .nav-left {
            display: flex;
            align-items: center;
        }
        
        .nav-title {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }
        
        .nav-right {
            display: flex;
            align-items: center;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            border: none;
        }
        
        .btn-primary {
            background-color: #990000;
            color: #fff;
        }
        
        .btn-primary:hover {
            background-color: #cc0000;
            transform: translateY(-2px);
        }

        /* 内容区域 */
        .content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .filter-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-select {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px 15px;
            color: #fff;
            font-size: 16px;
            outline: none;
            min-width: 150px;
        }

        .filter-select option {
            background-color: #1a2430;
            color: white;
        }

        .table-container {
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th,
        .table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .table th {
            background-color: rgba(255, 255, 255, 0.1);
            font-weight: 600;
            font-size: 14px;
        }

        .table td {
            font-size: 14px;
        }

        .table tr:hover {
            background-color: rgba(255, 255, 255, 0.03);
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-dealer {
            background-color: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .badge-user {
            background-color: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .action-links {
            display: flex;
            gap: 10px;
        }

        .action-link {
            color: #990000;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
        }

        .action-link:hover {
            text-decoration: underline;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: #1a2430;
            border-radius: 8px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: bold;
        }

        .close {
            color: rgba(255, 255, 255, 0.6);
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            outline: none;
        }

        .form-input:focus {
            border-color: #990000;
            box-shadow: 0 0 0 3px rgba(153, 0, 0, 0.1);
        }

        .form-input option {
            background-color: #1a2430;
            color: white;
        }

        .form-textarea {
            resize: vertical;
            min-height: 120px;
        }

        .form-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-checkbox input[type="checkbox"] {
            width: 16px;
            height: 16px;
        }

        .permissions-section {
            margin-top: 20px;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.03);
            border-radius: 4px;
        }

        .permissions-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 15px;
        }

        .category-checkboxes {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .category-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 30px;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: #fff;
            font-weight: 500;
            z-index: 2000;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.3s ease;
        }

        .toast.active {
            opacity: 1;
            transform: translateX(0);
        }

        .toast-success {
            background-color: #4caf50;
        }

        .toast-error {
            background-color: #cc0000;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.6);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .empty-state-title {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .empty-state-description {
            font-size: 14px;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .main-content {
                margin-left: 0;
                width: 100%;
            }
            
            .content {
                padding: 20px;
            }
            
            .top-nav {
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="logo">
        <img src="/images/logo.png" alt="Logo">
      </div>
      <nav class="nav-menu">
        <div class="nav-item">
          <a href="/dashboard">
            <i class="fas fa-tachometer-alt"></i>
            <span>仪表盘</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/brand-edit">
            <i class="fas fa-edit"></i>
            <span>品牌管理</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/works">
            <i class="fas fa-palette"></i>
            <span>作品管理</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/categories">
            <i class="fas fa-list"></i>
            <span>分类管理</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/leads">
            <i class="fas fa-handshake"></i>
            <span>线索管理</span>
          </a>
        </div>
        <div class="nav-item active">
          <a href="/customers">
            <i class="fas fa-users"></i>
            <span>客户管理</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/stats">
            <i class="fas fa-chart-bar"></i>
            <span>数据统计</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/settings">
            <i class="fas fa-cog"></i>
            <span>系统设置</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/users">
            <i class="fas fa-user-cog"></i>
            <span>操作员管理</span>
          </a>
        </div>
        <div class="nav-item">
          <a href="/logout">
            <i class="fas fa-sign-out-alt"></i>
            <span>退出登录</span>
          </a>
        </div>
      </nav>
    </aside>
    
    <!-- 主内容区域 -->
    <div class="main-content">
        <!-- 顶部导航栏 -->
        <div class="top-nav">
            <div class="nav-left">
                <div class="nav-title">客户管理</div>
            </div>
            <div class="nav-right">
                <button class="btn btn-primary" id="addCustomerBtn">
                    <i class="fas fa-plus"></i> 添加客户
                </button>
                <div class="user-info" id="userInfoContainer">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">管理员</div>
                        <div class="user-role" id="userRole">系统管理员</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 内容区域 -->
        <div class="content">
            <!-- 操作按钮 -->
            <div class="action-buttons">
                <button class="btn btn-secondary" id="manageCategoriesBtn">
                    <i class="fas fa-tags"></i> 管理客户分类
                </button>
            </div>

            <!-- 筛选器 -->
            <div class="filter-section">
                <select class="filter-select" id="customerTypeFilter">
                    <option value="">全部客户</option>
                    <option value="经销商">经销商</option>
                    <option value="终端用户">终端用户</option>
                </select>
            </div>

            <!-- 客户列表 -->
            <div class="table-container">
                <table class="table" id="customersTable">
                    <thead>
                        <tr>
                            <th>微信头像</th>
                            <th>微信昵称</th>
                            <th>客户名称</th>
                            <th>联系电话</th>
                            <th>电子邮箱</th>
                            <th>客户类型</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="customersTableBody">
                        <!-- 客户数据将通过JavaScript动态添加 -->
                    </tbody>
                </table>
            </div>

            <!-- 空状态 -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-state-icon">
                    <i class="fas fa-user-slash"></i>
                </div>
                <div class="empty-state-title">暂无客户数据</div>
                <div class="empty-state-description">点击添加客户按钮开始管理客户信息</div>
            </div>
        </div>
    </div>

  <!-- 添加/编辑客户模态框 -->
  <div class="modal" id="customerModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">添加客户</h2>
        <span class="close">&times;</span>
      </div>
      <form id="customerForm">
        <input type="hidden" id="customerId">
        
        <div class="form-group">
          <label class="form-label" for="wechatAvatar">微信头像</label>
          <input type="text" class="form-input" id="wechatAvatar" placeholder="输入微信头像URL">
        </div>
        
        <div class="form-group">
          <label class="form-label" for="wechatNickname">微信昵称</label>
          <input type="text" class="form-input" id="wechatNickname" placeholder="输入微信昵称">
        </div>
        
        <div class="form-group">
          <label class="form-label" for="customerName">客户名称 <span style="color: #990000;">*</span></label>
          <input type="text" class="form-input" id="customerName" placeholder="输入客户名称" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="customerPhone">联系电话 <span style="color: #990000;">*</span></label>
          <input type="text" class="form-input" id="customerPhone" placeholder="输入联系电话" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="customerEmail">电子邮箱</label>
          <input type="email" class="form-input" id="customerEmail" placeholder="输入电子邮箱">
        </div>
        
        <div class="form-group">
          <label class="form-label" for="customerType">客户类型 <span style="color: #990000;">*</span></label>
          <select class="form-input" id="customerType" required>
            <option value="">选择客户类型</option>
            <option value="经销商">经销商</option>
            <option value="终端用户">终端用户</option>
          </select>
        </div>
        
        <div class="permissions-section">
          <div class="permissions-title">权限设置</div>
          
          <div class="form-group">
            <div class="form-checkbox">
              <input type="checkbox" id="viewWorksPermission" checked>
              <label for="viewWorksPermission">允许浏览作品</label>
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label">可访问的分类</label>
            <div class="category-checkboxes" id="categoryCheckboxes">
              <!-- 分类复选框将通过JavaScript动态添加 -->
            </div>
          </div>
        </div>
      </form>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelBtn">取消</button>
        <button class="btn btn-primary" id="saveCustomerBtn">保存</button>
      </div>
    </div>
  </div>

  <!-- 客户分类管理模态框 -->
  <div class="modal" id="categoriesModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">客户分类管理</h2>
        <span class="close">&times;</span>
      </div>
      <div>
        <button class="btn btn-primary" id="addCategoryBtn" style="margin-bottom: 20px;">
          <i class="fas fa-plus"></i> 添加分类
        </button>
        
        <div class="table-container">
          <table class="table">
            <thead>
              <tr>
                <th>分类名称</th>
                <th>描述</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="categoriesTableBody">
              <!-- 分类数据将通过JavaScript动态添加 -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- 添加/编辑分类模态框 -->
  <div class="modal" id="categoryModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="categoryModalTitle">添加客户分类</h2>
        <span class="close">&times;</span>
      </div>
      <form id="categoryForm">
        <input type="hidden" id="categoryId">
        
        <div class="form-group">
          <label class="form-label" for="categoryName">分类名称 <span style="color: #990000;">*</span></label>
          <input type="text" class="form-input" id="categoryName" placeholder="输入分类名称" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="categoryDescription">描述</label>
          <textarea class="form-textarea" id="categoryDescription" placeholder="输入分类描述"></textarea>
        </div>
      </form>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelCategoryBtn">取消</button>
        <button class="btn btn-primary" id="saveCategoryBtn">保存</button>
      </div>
    </div>
  </div>

  <!-- 提示框 -->
  <div class="toast" id="toast"></div>

  <script>
    // 全局变量
    let customers = [];
    let categories = [];
    let customerCategories = [];
    let currentCustomerId = null;
    let currentCategoryId = null;

    // DOM 元素
    const customersTableBody = document.getElementById('customersTableBody');
    const emptyState = document.getElementById('emptyState');
    const customerModal = document.getElementById('customerModal');
    const categoriesModal = document.getElementById('categoriesModal');
    const categoryModal = document.getElementById('categoryModal');
    const toast = document.getElementById('toast');

    // 初始化
    document.addEventListener('DOMContentLoaded', async () => {
      await loadCustomers();
      await loadCategories();
      await loadCustomerCategories();
      updateCustomerTypeDropdown();
      initEventListeners();
      
      // 加载当前用户信息
      const userInfo = await loadCurrentUserInfo();
      updateUserInfoDisplay(userInfo);
      
      // 设置定时刷新用户信息，每5分钟更新一次
      setInterval(async () => {
          const updatedUserInfo = await loadCurrentUserInfo();
          updateUserInfoDisplay(updatedUserInfo);
      }, 300000);
    });

    // 加载当前用户信息
    async function loadCurrentUserInfo() {
        try {
            const response = await fetch('/api/v1/users/current');
            
            if (!response.ok) {
                if (response.status === 401) {
                    // 未授权，重定向到登录页面
                    console.log('未授权访问，重定向到登录页面');
                    window.location.href = '/login';
                    return null;
                }
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
            const result = await response.json();
            
            if (result.success && result.data) {
                return result.data;
            } else {
                console.error('获取用户信息失败:', result.message || '未知错误');
                return null;
            }
        } catch (error) {
            console.error('获取用户信息出错:', error.message);
            return null;
        }
    }
    
    // 更新用户信息显示
    function updateUserInfoDisplay(userInfo) {
        if (!userInfo) {
            return;
        }
        
        const { id, username, role, permissions } = userInfo;
        
        const userInfoContainer = document.getElementById('userInfoContainer');
        const userAvatar = document.getElementById('userAvatar');
        const userName = document.getElementById('userName');
        const userRole = document.getElementById('userRole');
        
        if (userAvatar) {
            userAvatar.textContent = id || 'A';
        }
        
        if (userName) {
            userName.textContent = username || '未知用户';
        }
        
        if (userRole) {
            const roleMap = {
                'admin': '系统管理员',
                'editor': '编辑员',
                'viewer': '查看员'
            };
            userRole.textContent = roleMap[role] || '普通用户';
        }
        
        // 添加更新动画效果
        if (userInfoContainer) {
            userInfoContainer.classList.add('updated');
            setTimeout(() => {
                userInfoContainer.classList.remove('updated');
            }, 500);
        }
        
        // 根据权限更新导航菜单
        updateNavigationBasedOnPermissions(permissions, role);
    }
    
    // 根据权限更新导航菜单
    function updateNavigationBasedOnPermissions(permissions, role) {
        // 导航项与权限的映射关系
        const navPermissionMap = {
            'dashboard': 'dashboard',
            'brand-edit': 'brand',
            'works': 'works',
            'categories': 'categories',
            'leads': 'leads',
            'customers': 'customers',
            'stats': 'stats',
            'settings': 'settings',
            'users': 'users'
        };
        
        // 获取所有导航项
        const navItems = document.querySelectorAll('.nav-item');
        
        navItems.forEach(navItem => {
            const link = navItem.querySelector('a');
            if (link) {
                const href = link.getAttribute('href');
                // 提取路径部分（去掉开头的/）
                const path = href.substring(1);
                
                // 检查是否需要权限控制（排除退出登录）
                if (path !== 'logout') {
                    const requiredPermission = navPermissionMap[path];
                    
                    // 管理员角色或有对应权限的用户可以看到该导航项
                    if (role === 'admin' || (permissions && permissions[requiredPermission])) {
                        navItem.style.display = 'block';
                    } else {
                        navItem.style.display = 'none';
                    }
                }
            }
        });
    }

    // 加载客户列表
    async function loadCustomers() {
      try {
        const response = await fetch('/api/v1/customers');
        const data = await response.json();
        
        if (data.success) {
          customers = data.data;
          renderCustomers();
        } else {
          showToast('加载客户失败', 'error');
        }
      } catch (error) {
        console.error('加载客户失败:', error);
        showToast('加载客户失败', 'error');
      }
    }

    // 加载作品分类
    async function loadCategories() {
      try {
        const response = await fetch('/api/v1/categories');
        const data = await response.json();
        
        if (data.success) {
          categories = data.data;
          renderCategoryCheckboxes();
        }
      } catch (error) {
        console.error('加载分类失败:', error);
      }
    }

    // 加载客户分类
    async function loadCustomerCategories() {
      try {
        const response = await fetch('/api/v1/customer-categories');
        const data = await response.json();
        
        if (data.success) {
          customerCategories = data.data;
          renderCustomerCategories();
          updateCustomerTypeDropdown();
        }
      } catch (error) {
        console.error('加载客户分类失败:', error);
      }
    }

    // 渲染客户列表
    function renderCustomers() {
      const filterValue = document.getElementById('customerTypeFilter').value;
      const filteredCustomers = filterValue 
        ? customers.filter(customer => customer.customerType === filterValue)
        : customers;
      
      if (filteredCustomers.length === 0) {
        customersTableBody.innerHTML = '';
        emptyState.style.display = 'block';
        document.getElementById('customersTable').parentElement.style.display = 'none';
        return;
      }
      
      emptyState.style.display = 'none';
      document.getElementById('customersTable').parentElement.style.display = 'block';
      
      customersTableBody.innerHTML = filteredCustomers.map(customer => `
        <tr>
          <td>
            <img src="${customer.wechatAvatar || 'https://via.placeholder.com/100x100?text=No+Avatar'}" alt="微信头像" class="avatar">
          </td>
          <td>${customer.wechatNickname || '-'}</td>
          <td>${customer.name}</td>
          <td>${customer.phone}</td>
          <td>${customer.email || '-'}</td>
          <td>
            <span class="badge ${customer.customerType === '经销商' ? 'badge-dealer' : 'badge-user'}">
              ${customer.customerType}
            </span>
          </td>
          <td>
            <div class="action-links">
              <a href="#" class="action-link" onclick="editCustomer(${customer.id})">编辑</a>
              <a href="#" class="action-link" onclick="deleteCustomer(${customer.id})">删除</a>
            </div>
          </td>
        </tr>
      `).join('');
    }

    // 渲染分类复选框
    function renderCategoryCheckboxes() {
      const container = document.getElementById('categoryCheckboxes');
      container.innerHTML = categories.map(category => `
        <div class="category-checkbox">
          <input type="checkbox" id="category-${category.slug}" value="${category.slug}">
          <label for="category-${category.slug}">${category.name}</label>
        </div>
      `).join('');
    }

    // 渲染客户分类列表
    function renderCustomerCategories() {
      const container = document.getElementById('categoriesTableBody');
      container.innerHTML = customerCategories.map(category => `
        <tr>
          <td>${category.name}</td>
          <td>${category.description || '-'}</td>
          <td>
            <div class="action-links">
              <a href="#" class="action-link" onclick="editCustomerCategory(${category.id})">编辑</a>
              <a href="#" class="action-link" onclick="deleteCustomerCategory(${category.id})">删除</a>
            </div>
          </td>
        </tr>
      `).join('');
    }

    // 初始化事件监听器
    function initEventListeners() {
      // 添加客户按钮
      document.getElementById('addCustomerBtn').addEventListener('click', () => {
        openCustomerModal();
      });

      // 管理分类按钮
      document.getElementById('manageCategoriesBtn').addEventListener('click', () => {
        openCategoriesModal();
      });

      // 客户类型筛选
      document.getElementById('customerTypeFilter').addEventListener('change', renderCustomers);

      // 模态框关闭按钮
      document.querySelectorAll('.modal .close').forEach(closeBtn => {
        closeBtn.addEventListener('click', function() {
          this.closest('.modal').classList.remove('show');
        });
      });

      // 取消按钮
      document.getElementById('cancelBtn').addEventListener('click', () => {
        customerModal.classList.remove('show');
      });

      document.getElementById('cancelCategoryBtn').addEventListener('click', () => {
        categoryModal.classList.remove('show');
      });

      // 保存客户按钮
      document.getElementById('saveCustomerBtn').addEventListener('click', saveCustomer);

      // 保存分类按钮
      document.getElementById('saveCategoryBtn').addEventListener('click', saveCategory);

      // 添加分类按钮
      document.getElementById('addCategoryBtn').addEventListener('click', () => {
        openCategoryModal();
      });
    }

    // 打开客户模态框
    function openCustomerModal(customerId = null) {
      currentCustomerId = customerId;
      
      if (customerId) {
        const customer = customers.find(c => c.id === customerId);
        if (customer) {
          document.getElementById('modalTitle').textContent = '编辑客户';
          document.getElementById('customerId').value = customer.id;
          document.getElementById('wechatAvatar').value = customer.wechatAvatar || '';
          document.getElementById('wechatNickname').value = customer.wechatNickname || '';
          document.getElementById('customerName').value = customer.name;
          document.getElementById('customerPhone').value = customer.phone;
          document.getElementById('customerEmail').value = customer.email || '';
          document.getElementById('customerType').value = customer.customerType;
          document.getElementById('viewWorksPermission').checked = customer.permissions?.viewWorks || true;
          
          // 重置分类复选框
          document.querySelectorAll('#categoryCheckboxes input').forEach(checkbox => {
            checkbox.checked = false;
          });
          
          // 勾选已授权的分类
          if (customer.permissions?.categories) {
            customer.permissions.categories.forEach(categorySlug => {
              const checkbox = document.getElementById(`category-${categorySlug}`);
              if (checkbox) {
                checkbox.checked = true;
              }
            });
          }
        }
      } else {
        document.getElementById('modalTitle').textContent = '添加客户';
        document.getElementById('customerForm').reset();
        document.getElementById('customerId').value = '';
        document.getElementById('viewWorksPermission').checked = true;
      }
      
      customerModal.classList.add('show');
    }

    // 打开分类管理模态框
    function openCategoriesModal() {
      loadCustomerCategories();
      categoriesModal.classList.add('show');
    }

    // 打开分类模态框
    function openCategoryModal(categoryId = null) {
      currentCategoryId = categoryId;
      
      if (categoryId) {
        const category = customerCategories.find(c => c.id === categoryId);
        if (category) {
          document.getElementById('categoryModalTitle').textContent = '编辑分类';
          document.getElementById('categoryId').value = category.id;
          document.getElementById('categoryName').value = category.name;
          document.getElementById('categoryDescription').value = category.description || '';
        }
      } else {
        document.getElementById('categoryModalTitle').textContent = '添加分类';
        document.getElementById('categoryForm').reset();
        document.getElementById('categoryId').value = '';
      }
      
      categoryModal.classList.add('show');
    }

    // 保存客户
    async function saveCustomer() {
      const customerId = document.getElementById('customerId').value;
      const wechatAvatar = document.getElementById('wechatAvatar').value;
      const wechatNickname = document.getElementById('wechatNickname').value;
      const name = document.getElementById('customerName').value;
      const phone = document.getElementById('customerPhone').value;
      const email = document.getElementById('customerEmail').value;
      const customerType = document.getElementById('customerType').value;
      const viewWorks = document.getElementById('viewWorksPermission').checked;
      
      // 获取选中的分类
      const selectedCategories = [];
      document.querySelectorAll('#categoryCheckboxes input:checked').forEach(checkbox => {
        selectedCategories.push(checkbox.value);
      });
      
      // 验证必填字段
      if (!name || !phone || !customerType) {
        showToast('请填写必填字段', 'error');
        return;
      }
      
      const customerData = {
        wechatAvatar,
        wechatNickname,
        name,
        phone,
        email,
        customerType,
        permissions: {
          viewWorks,
          categories: selectedCategories
        }
      };
      
      try {
        let response;
        if (customerId) {
          // 编辑客户
          response = await fetch(`/api/v1/customers/${customerId}`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(customerData)
          });
        } else {
          // 添加客户
          response = await fetch('/api/v1/customers', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(customerData)
          });
        }
        
        // 检查响应状态
        if (!response.ok) {
          // 处理401未授权错误
          if (response.status === 401) {
            showToast('登录已过期，请重新登录', 'error');
            setTimeout(() => {
              window.location.href = '/login';
            }, 1500);
            return;
          }
          
          // 尝试解析错误响应
          try {
            const errorData = await response.json();
            showToast(errorData.message || '保存失败', 'error');
          } catch {
            showToast('保存失败，请检查网络连接', 'error');
          }
          return;
        }
        
        const data = await response.json();
        if (data.success) {
          showToast(data.message, 'success');
          customerModal.classList.remove('show');
          loadCustomers();
        } else {
          showToast(data.message, 'error');
        }
      } catch (error) {
        console.error('保存客户失败:', error);
        showToast('保存失败，请检查网络连接或重试', 'error');
      }
    }

    // 保存分类
    async function saveCategory() {
      const categoryId = document.getElementById('categoryId').value;
      const name = document.getElementById('categoryName').value;
      const description = document.getElementById('categoryDescription').value;
      
      // 验证必填字段
      if (!name) {
        showToast('请填写分类名称', 'error');
        return;
      }
      
      const categoryData = {
        name,
        description
      };
      
      try {
        let response;
        if (categoryId) {
          // 编辑分类
          response = await fetch(`/api/v1/customer-categories/${categoryId}`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(categoryData)
          });
        } else {
          // 添加分类
          response = await fetch('/api/v1/customer-categories', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(categoryData)
          });
        }
        
        // 检查响应状态
        if (!response.ok) {
          // 处理401未授权错误
          if (response.status === 401) {
            showToast('登录已过期，请重新登录', 'error');
            setTimeout(() => {
              window.location.href = '/login';
            }, 1500);
            return;
          }
          
          // 尝试解析错误响应
          try {
            const errorData = await response.json();
            showToast(errorData.message || '保存失败', 'error');
          } catch {
            showToast('保存失败，请检查网络连接', 'error');
          }
          return;
        }
        
        const data = await response.json();
        if (data.success) {
          showToast(data.message, 'success');
          categoryModal.classList.remove('show');
          loadCustomerCategories();
          updateCustomerTypeDropdown();
        } else {
          showToast(data.message, 'error');
        }
      } catch (error) {
        console.error('保存分类失败:', error);
        showToast('保存失败，请检查网络连接或重试', 'error');
      }
    }

    // 编辑客户
    function editCustomer(customerId) {
      openCustomerModal(customerId);
    }

    // 删除客户
    function deleteCustomer(customerId) {
      if (confirm('确定要删除这个客户吗？')) {
        fetch(`/api/v1/customers/${customerId}`, {
          method: 'DELETE'
        })
        .then(response => response.json())
        .then(data => {
          if (data.success) {
            showToast(data.message, 'success');
            loadCustomers();
          } else {
            showToast(data.message, 'error');
          }
        })
        .catch(error => {
          console.error('删除客户失败:', error);
          showToast('删除失败，请重试', 'error');
        });
      }
    }

    // 编辑客户分类
    function editCustomerCategory(categoryId) {
      openCategoryModal(categoryId);
    }

    // 删除客户分类
    function deleteCustomerCategory(categoryId) {
      if (confirm('确定要删除这个分类吗？删除后，使用该分类的客户将需要重新选择分类。')) {
        fetch(`/api/v1/customer-categories/${categoryId}`, {
          method: 'DELETE'
        })
        .then(response => {
          // 检查响应状态
          if (!response.ok) {
            // 处理401未授权错误
            if (response.status === 401) {
              showToast('登录已过期，请重新登录', 'error');
              setTimeout(() => {
                window.location.href = '/login';
              }, 1500);
              return Promise.reject(new Error('未授权'));
            }
            
            // 尝试解析错误响应
            return response.json().then(errorData => {
              throw new Error(errorData.message || '删除失败');
            }).catch(() => {
              throw new Error('删除失败，请检查网络连接');
            });
          }
          return response.json();
        })
        .then(data => {
          if (data.success) {
            showToast(data.message, 'success');
            loadCustomerCategories();
            updateCustomerTypeDropdown();
          } else {
            showToast(data.message, 'error');
          }
        })
        .catch(error => {
          console.error('删除分类失败:', error);
          if (error.message !== '未授权') {
            showToast(error.message, 'error');
          }
        });
      }
    }

    // 更新客户类型下拉菜单
    function updateCustomerTypeDropdown() {
      // 从分类管理模态框的表格中获取分类数据
      const categoriesTableBody = document.getElementById('categoriesTableBody');
      const categoryRows = categoriesTableBody ? categoriesTableBody.querySelectorAll('tr') : [];
      
      // 提取分类名称
      const categoryNames = [];
      categoryRows.forEach(row => {
        const nameCell = row.querySelector('td:first-child');
        if (nameCell) {
          categoryNames.push(nameCell.textContent.trim());
        }
      });
      
      // 更新添加/编辑客户模态框中的客户类型下拉菜单
      const customerTypeSelect = document.getElementById('customerType');
      if (customerTypeSelect) {
        // 保存当前选中的值
        const currentValue = customerTypeSelect.value;
        
        // 清空下拉菜单，保留默认选项
        customerTypeSelect.innerHTML = '<option value="">选择客户类型</option>';
        
        // 添加从分类管理表格中获取的分类选项
        categoryNames.forEach(categoryName => {
          const option = document.createElement('option');
          option.value = categoryName;
          option.textContent = categoryName;
          customerTypeSelect.appendChild(option);
        });
        
        // 恢复当前选中的值
        customerTypeSelect.value = currentValue;
      }
      
      // 更新客户列表筛选中的客户类型下拉菜单
      const customerTypeFilter = document.getElementById('customerTypeFilter');
      if (customerTypeFilter) {
        // 保存当前选中的值
        const currentValue = customerTypeFilter.value;
        
        // 清空下拉菜单，保留默认选项
        customerTypeFilter.innerHTML = '<option value="">全部客户</option>';
        
        // 添加从分类管理表格中获取的分类选项
        categoryNames.forEach(categoryName => {
          const option = document.createElement('option');
          option.value = categoryName;
          option.textContent = categoryName;
          customerTypeFilter.appendChild(option);
        });
        
        // 恢复当前选中的值
        customerTypeFilter.value = currentValue;
      }
    }

    // 显示提示框
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type === 'success' ? 'success' : 'error'}`;
      toast.classList.add('active');
      
      setTimeout(() => {
        toast.classList.remove('active');
      }, 3000);
    }
  </script>
</body>
</html>
