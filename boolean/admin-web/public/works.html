<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品管理 - 布珥·迈拓空间设计</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #1a2430;
            color: #ffffff;
            display: flex;
            min-height: 100vh;
            line-height: 1.6;
        }
        
        /* 侧边栏样式 */
        .sidebar {
            width: 240px;
            background-color: #151e29;
            padding: 20px 0;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo img {
            width: 80px;
            height: 80px;
            border-radius: 8px;
        }

        .nav-menu {
            margin-top: 30px;
        }

        .nav-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .nav-item.active {
            background-color: rgba(153, 0, 0, 0.2);
            border-left-color: #990000;
        }

        .nav-item a {
            color: #ffffff;
            text-decoration: none;
            display: flex;
            align-items: center;
            font-size: 16px;
        }

        .nav-item i {
            margin-right: 12px;
            font-size: 18px;
        }
        
        /* 主内容区域 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-left: 240px;
        }
        
        /* 顶部导航栏 */
        .top-nav {
            height: 80px;
            background-color: #151e29;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
        }
        
        .nav-left {
            display: flex;
            align-items: center;
        }
        
        .nav-title {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }
        
        .nav-right {
            display: flex;
            align-items: center;
            gap: 30px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 24px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .user-info:hover {
            background-color: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #ffffff;
            border: 2px solid #cc0000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #cc0000;
            margin-right: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .user-info:hover .user-avatar {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(204, 0, 0, 0.3);
        }
        
        .user-details {
            text-align: right;
            transition: all 0.3s ease;
        }
        
        .user-name {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 2px;
        }
        
        .user-role {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
        }
        
        .user-info:hover .user-role {
            color: rgba(255, 255, 255, 0.9);
        }
        
        /* 用户信息更新动画 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .user-info.updated {
            animation: fadeIn 0.5s ease;
        }
        
        /* 内容区域 */
        .content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background-color: #1a2430;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background-color: #990000;
            color: white;
        }

        .btn-primary:hover {
            background-color: #cc0000;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 14px;
        }

        .btn-danger {
            background-color: #cc0000;
            color: white;
        }


        
        /* 作品管理 */
        .works-container {
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* 筛选和搜索区域 */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            align-items: center;
        }
        
        .search-box {
            display: flex;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px 15px;
        }
        
        .search-box input {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 16px;
            outline: none;
            margin-left: 10px;
            width: 200px;
        }
        
        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        
        .filter-select {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px 15px;
            color: #fff;
            font-size: 16px;
            outline: none;
            min-width: 150px;
        }
        
        .filter-select option {
            background-color: #1a2430;
            color: white;
        }
        
        /* 作品列表 */
        .works-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }
        
        .works-table th,
        .works-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .works-table th {
            font-weight: bold;
            color: #fff;
            background-color: rgba(255, 255, 255, 0.05);
        }
        
        .works-table td {
            color: rgba(255, 255, 255, 0.8);
        }
        
        .works-table tbody tr:hover {
            background-color: rgba(153, 0, 0, 0.1);
        }
        
        /* 图片预览 */
        .img-preview {
            width: 80px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
        }
        
        /* 操作按钮 */
        .action-links {
            display: flex;
            gap: 10px;
        }
        
        .action-link {
            color: #990000;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
        }
        
        .action-link:hover {
            text-decoration: underline;
        }
        
        /* 分页 */
        .pagination {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            margin-top: 30px;
        }
        
        .pagination button {
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .pagination button:hover {
            background-color: rgba(255, 255, 255, 0.15);
        }
        
        .pagination button.active {
            background-color: #990000;
            border-color: #990000;
        }
        
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: #1a2430;
            border-radius: 8px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 自定义滚动条样式 */
        .modal-content::-webkit-scrollbar {
            width: 8px;
        }

        .modal-content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .modal-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
        }

        .modal-content::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: bold;
        }

        .close {
            color: rgba(255, 255, 255, 0.6);
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: white;
        }
        
        /* 表单样式 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: white;
            font-size: 14px;
        }

        .form-input:focus {
            outline: none;
            border-color: #990000;
        }

        .form-input option {
            background-color: #1a2430;
            color: white;
        }

        .form-textarea {
            width: 100%;
            padding: 12px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: white;
            font-size: 14px;
            resize: vertical;
            min-height: 100px;
        }

        .form-textarea:focus {
            outline: none;
            border-color: #990000;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 30px;
        }
        
        /* 加载状态 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        
        .loading::after {
            content: '';
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #990000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        
        /* 图片上传容器样式 */
        .image-upload-container {
            margin-bottom: 20px;
        }
        
        /* 图片预览样式 */
        .image-preview {
            width: 100%;
            height: 200px;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            background-color: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            overflow: hidden;
            position: relative;
            transition: all 0.3s ease;
        }
        
        .image-preview:hover {
            border-color: rgba(153, 0, 0, 0.3);
            background-color: rgba(153, 0, 0, 0.05);
        }
        
        .preview-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }
        
        .preview-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .preview-text {
            font-size: 14px;
        }
        
        /* 图片上传区域样式 */
        .image-upload-area {
            width: 100%;
            min-height: 150px;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            background-color: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
        }
        
        .image-upload-area:hover {
            border-color: rgba(153, 0, 0, 0.3);
            background-color: rgba(153, 0, 0, 0.05);
        }
        
        .image-upload-area.dragover {
            border-color: rgba(153, 0, 0, 0.5);
            background-color: rgba(153, 0, 0, 0.1);
        }
        
        .upload-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 150px;
            color: rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .upload-text {
            text-align: center;
        }
        
        .upload-text div:first-child {
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .upload-hint {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        /* 上传进度样式 */
        .upload-progress {
            width: 100%;
            height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .progress-bar {
            width: 80%;
            height: 8px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .progress-bar::after {
            content: '';
            display: block;
            height: 100%;
            background-color: #990000;
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .progress-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }
        
        /* 已上传图片样式 */
        .uploaded-images {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .uploaded-image-item {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .uploaded-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .remove-image {
            position: absolute;
            top: 5px;
            right: 5px;
            background-color: rgba(153, 0, 0, 0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .remove-image:hover {
            background-color: rgba(153, 0, 0, 1);
            transform: scale(1.1);
        }
        
        /* 通知提示 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: #fff;
            font-weight: 500;
            z-index: 2000;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.3s ease;
        }

        .toast.active {
            opacity: 1;
            transform: translateX(0);
        }

        .toast.success {
            background-color: #4caf50;
        }

        .toast.error {
            background-color: #cc0000;
        }

        .toast.info {
            background-color: #2196f3;
        }
        
        /* 开关组件样式 */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.2);
            transition: .4s;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
        }

        input:checked + .slider {
            background-color: #990000;
        }

        input:focus + .slider {
            box-shadow: 0 0 1px #990000;
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        /* Rounded sliders */
        .slider.round {
            border-radius: 20px;
        }

        .slider.round:before {
            border-radius: 50%;
        }

        /* 富文本编辑器样式 */
        .rich-text-editor {
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .editor-toolbar {
            display: flex;
            gap: 5px;
            padding: 10px;
            background-color: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            flex-wrap: wrap;
        }
        
        .toolbar-btn {
            padding: 8px 12px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        
        .toolbar-btn:hover {
            background-color: rgba(255, 255, 255, 0.15);
            border-color: #990000;
        }
        
        .editor-content {
            min-height: 200px;
            padding: 15px;
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            outline: none;
        }
        
        .editor-content:empty:before {
            content: attr(placeholder);
            color: rgba(255, 255, 255, 0.3);
            pointer-events: none;
        }
        
        .editor-content img {
            max-width: 100%;
            height: auto;
            margin: 10px 0;
            border-radius: 4px;
        }
        
        /* 响应式设计 */
        @media (max-width: 1200px) {
            .filter-bar {
                flex-direction: column;
                align-items: stretch;
            }
            
            .works-table {
                font-size: 14px;
            }
            
            .works-table th,
            .works-table td {
                padding: 10px;
            }
            
            .action-buttons {
                flex-wrap: wrap;
            }
        }
        
        @media (max-width: 768px) {
            .sidebar {
                width: 240px;
            }
            
            .main-content {
                padding: 20px;
            }
            
            .works-container {
                padding: 20px;
            }
            
            .works-table {
                display: block;
                overflow-x: auto;
            }
            
            .pagination {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
        
        @media (max-width: 576px) {
            .sidebar {
                width: 100%;
                position: fixed;
                left: -100%;
                z-index: 1000;
            }
            
            .sidebar.open {
                left: 0;
            }
            
            .main-content {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <aside class="sidebar">
        <div class="logo">
            <img src="/images/logo.png" alt="Logo">
        </div>
        <nav class="nav-menu">
            <div class="nav-item">
                <a href="/dashboard">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>仪表盘</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="/brand-edit">
                    <i class="fas fa-edit"></i>
                    <span>品牌管理</span>
                </a>
            </div>
            <div class="nav-item active">
                <a href="/works">
                    <i class="fas fa-palette"></i>
                    <span>作品管理</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="/categories">
                    <i class="fas fa-list"></i>
                    <span>分类管理</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="/leads">
                    <i class="fas fa-handshake"></i>
                    <span>线索管理</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="/customers">
                    <i class="fas fa-users"></i>
                    <span>客户管理</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="/stats">
                    <i class="fas fa-chart-bar"></i>
                    <span>数据统计</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="/settings">
                    <i class="fas fa-cog"></i>
                    <span>系统设置</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="/users">
                    <i class="fas fa-user-cog"></i>
                    <span>操作员管理</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="/logout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>退出登录</span>
                </a>
            </div>
        </nav>
    </aside>
    
    <!-- 主内容区域 -->
    <div class="main-content">
        <!-- 顶部导航栏 -->
        <div class="top-nav">
            <div class="nav-left">
                <div class="nav-title">作品管理</div>
            </div>
            <div class="nav-right">
                <button class="btn btn-primary" onclick="openAddModal()">
                    + 添加作品
                </button>
                <div class="user-info" id="userInfoContainer">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">管理员</div>
                        <div class="user-role" id="userRole">系统管理员</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 内容区域 -->
        <div class="content">
            <div class="works-container">
                <!-- 筛选和搜索区域 -->
                <div class="filter-bar">
                    <div class="search-box">
                        <span>🔍</span>
                        <input type="text" id="searchInput" placeholder="搜索作品名称..." oninput="handleSearch()">
                    </div>
                    
                    <select class="filter-select" id="categoryFilter" onchange="handleFilter()">
                        <option value="">全部分类</option>
                        <option value="residential">家装设计</option>
                        <option value="office">公装设计</option>
                        <option value="commercial">商业空间</option>
                        <option value="other">其他</option>
                    </select>
                    
                    <select class="filter-select" id="sortSelect" onchange="handleSort()">
                        <option value="id:desc">最新发布</option>
                        <option value="id:asc">最早发布</option>
                        <option value="views:desc">最多浏览</option>
                    </select>
                </div>
                
                <!-- 作品列表 -->
                <div id="worksTableContainer">
                    <div class="loading"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 添加/编辑作品模态框 -->
    <div class="modal" id="worksModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">添加作品</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            
            <form id="worksForm" onsubmit="submitForm(event)">
                <input type="hidden" id="workId">
                
                <div class="form-group">
                    <label class="form-label" for="workTitle">作品标题 <span style="color: #990000;">*</span></label>
                    <input type="text" class="form-input" id="workTitle" name="title" required placeholder="请输入作品标题">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="workType">作品类型 <span style="color: #990000;">*</span></label>
                    <select class="form-input" id="workType" name="type" required>
                        <option value="residential">家装设计</option>
                        <option value="office">公装设计</option>
                        <option value="commercial">商业空间</option>
                        <option value="other">其他</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="workArea">面积 (㎡) <span style="color: #990000;">*</span></label>
                    <input type="number" class="form-input" id="workArea" name="area" required placeholder="请输入作品面积">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="workLocation">所在城市 <span style="color: #990000;">*</span></label>
                    <input type="text" class="form-input" id="workLocation" name="location" required placeholder="请输入所在城市">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="workCover">封面图片 <span style="color: #990000;">*</span></label>
                    <div class="image-upload-container">
                        <input type="file" id="coverFileInput" accept="image/jpeg,image/png,image/jpg" style="display: none;" onchange="handleCoverImageChange(event)">
                        <input type="hidden" id="workCover" name="coverImage" required>
                        <div class="image-preview" id="coverPreview" onclick="document.getElementById('coverFileInput').click()">
                            <div class="preview-placeholder">
                                <span class="preview-icon">📷</span>
                                <span class="preview-text">点击选择封面图片</span>
                            </div>
                            <img id="coverPreviewImg" src="" alt="封面预览" style="display: none; width: 100%; height: auto; border-radius: 4px;">
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">作品图片列表 <span style="color: #990000;">*</span></label>
                    <div class="image-upload-area" id="imagesUploadArea" ondragover="handleDragOver(event)" ondrop="handleDrop(event)" onclick="document.getElementById('imagesFileInput').click()">
                        <input type="file" id="imagesFileInput" accept="image/jpeg,image/png,image/jpg" multiple style="display: none;" onchange="handleImagesChange(event)">
                        <input type="hidden" id="workImages" name="images" required>
                        <div class="upload-placeholder">
                            <span class="upload-icon">📁</span>
                            <div class="upload-text">
                                <div>点击选择图片或拖放图片到此处</div>
                                <div class="upload-hint">支持 .jpg, .png, .jpeg 格式，单张不超过 5MB</div>
                            </div>
                        </div>
                        <div class="upload-progress" id="uploadProgress" style="display: none;">
                            <div class="progress-bar" id="progressBar"></div>
                            <div class="progress-text" id="progressText">0%</div>
                        </div>
                    </div>
                    <div class="uploaded-images" id="uploadedImages"></div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="workDescription">作品描述</label>
                    <div class="rich-text-editor">
                        <div class="editor-toolbar">
                            <button type="button" class="toolbar-btn" onclick="format('bold')"><i class="fas fa-bold"></i></button>
                            <button type="button" class="toolbar-btn" onclick="format('italic')"><i class="fas fa-italic"></i></button>
                            <button type="button" class="toolbar-btn" onclick="format('underline')"><i class="fas fa-underline"></i></button>
                            <button type="button" class="toolbar-btn" onclick="format('strike')"><i class="fas fa-strikethrough"></i></button>
                            <button type="button" class="toolbar-btn" onclick="format('header', 1)"><i class="fas fa-heading"></i> H1</button>
                            <button type="button" class="toolbar-btn" onclick="format('header', 2)"><i class="fas fa-heading"></i> H2</button>
                            <button type="button" class="toolbar-btn" onclick="format('list', 'ordered')"><i class="fas fa-list-ol"></i></button>
                            <button type="button" class="toolbar-btn" onclick="format('list', 'bullet')"><i class="fas fa-list-ul"></i></button>
                            <button type="button" class="toolbar-btn" onclick="insertImage()"><i class="fas fa-image"></i> 图片</button>
                            <button type="button" class="toolbar-btn" onclick="clearContent()"><i class="fas fa-trash"></i> 清空</button>
                        </div>
                        <div class="editor-content" id="editorContent" contenteditable="true" placeholder="请输入作品描述"></div>
                        <input type="hidden" id="workDescription" name="description">
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="workDesignPeriod">设计周期</label>
                    <input type="text" class="form-input" id="workDesignPeriod" name="designPeriod" placeholder="请输入设计周期，如：6个月">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="workStyle">设计风格</label>
                    <input type="text" class="form-input" id="workStyle" name="style" placeholder="请输入设计风格，如：现代简约">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="workDesignDescription">设计描述</label>
                    <textarea class="form-textarea" id="workDesignDescription" name="designDescription" placeholder="请输入详细设计描述"></textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="workDesignConcept">设计理念</label>
                    <textarea class="form-textarea" id="workDesignConcept" name="designConcept" placeholder="请输入设计理念和思路"></textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="workFunctionPlanning">功能规划</label>
                    <textarea class="form-textarea" id="workFunctionPlanning" name="functionPlanning" placeholder="请输入空间功能规划"></textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="workMaterialSelection">材料选择</label>
                    <textarea class="form-textarea" id="workMaterialSelection" name="materialSelection" placeholder="请输入材料选择方案"></textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="workHighlights">项目亮点</label>
                    <textarea class="form-textarea" id="workHighlights" name="highlights" placeholder="请输入项目亮点，每行一个"></textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="workSpaceType">空间类型</label>
                    <input type="text" class="form-input" id="workSpaceType" name="spaceType" placeholder="请输入空间类型，如：住宅">
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 通知提示 -->
    <div class="toast" id="toast"></div>
    
    <script>
        // 全局状态
        let works = [];
        let filteredWorks = [];
        let currentPage = 1;
        const pageSize = 10;
        let currentSort = 'id:desc';
        let currentFilter = '';
        let currentSearch = '';
        
        // 加载当前用户信息
        async function loadCurrentUserInfo() {
            try {
                const response = await fetch('/api/v1/users/current');
                
                if (!response.ok) {
                    if (response.status === 401) {
                        // 未授权，重定向到登录页面
                        console.log('未授权访问，重定向到登录页面');
                        window.location.href = '/login';
                        return null;
                    }
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const result = await response.json();
                
                if (result.success && result.data) {
                    return result.data;
                } else {
                    console.error('获取用户信息失败:', result.message || '未知错误');
                    return null;
                }
            } catch (error) {
                console.error('获取用户信息出错:', error.message);
                return null;
            }
        }
        
        // 更新用户信息显示
        function updateUserInfoDisplay(userInfo) {
            if (!userInfo) {
                return;
            }
            
            const { id, username, role, permissions } = userInfo;
            
            const userInfoContainer = document.getElementById('userInfoContainer');
            const userAvatar = document.getElementById('userAvatar');
            const userName = document.getElementById('userName');
            const userRole = document.getElementById('userRole');
            
            if (userAvatar) {
                userAvatar.textContent = id || 'A';
            }
            
            if (userName) {
                userName.textContent = username || '未知用户';
            }
            
            if (userRole) {
                const roleMap = {
                    'admin': '系统管理员',
                    'editor': '编辑员',
                    'viewer': '查看员'
                };
                userRole.textContent = roleMap[role] || '普通用户';
            }
            
            // 添加更新动画效果
            if (userInfoContainer) {
                userInfoContainer.classList.add('updated');
                setTimeout(() => {
                    userInfoContainer.classList.remove('updated');
                }, 500);
            }
            
            // 根据权限更新导航菜单
            updateNavigationBasedOnPermissions(permissions, role);
        }
        
        // 根据权限更新导航菜单
        function updateNavigationBasedOnPermissions(permissions, role) {
            // 导航项与权限的映射关系
            const navPermissionMap = {
                'dashboard': 'dashboard',
                'brand-edit': 'brand',
                'works': 'works',
                'categories': 'categories',
                'leads': 'leads',
                'customers': 'customers',
                'stats': 'stats',
                'settings': 'settings',
                'users': 'users'
            };
            
            // 获取所有导航项
            const navItems = document.querySelectorAll('.nav-item');
            
            navItems.forEach(navItem => {
                const link = navItem.querySelector('a');
                if (link) {
                    const href = link.getAttribute('href');
                    // 提取路径部分（去掉开头的/）
                    const path = href.substring(1);
                    
                    // 检查是否需要权限控制（排除退出登录）
                    if (path !== 'logout') {
                        const requiredPermission = navPermissionMap[path];
                        
                        // 管理员角色或有对应权限的用户可以看到该导航项
                        if (role === 'admin' || (permissions && permissions[requiredPermission])) {
                            navItem.style.display = 'block';
                        } else {
                            navItem.style.display = 'none';
                        }
                    }
                }
            });
        }
        
        // 初始化页面
        document.addEventListener('DOMContentLoaded', async () => {
            loadWorks();
            
            // 加载当前用户信息
            const userInfo = await loadCurrentUserInfo();
            updateUserInfoDisplay(userInfo);
            
            // 设置定时刷新用户信息，每5分钟更新一次
            setInterval(async () => {
                const updatedUserInfo = await loadCurrentUserInfo();
                updateUserInfoDisplay(updatedUserInfo);
            }, 300000);
            
            // 处理URL参数，自动打开添加模态框
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('action') === 'add') {
                // 延迟执行，确保页面完全加载
                setTimeout(() => {
                    openAddModal();
                }, 500);
            }
        });
        
        // 加载作品数据
        async function loadWorks() {
            const container = document.getElementById('worksTableContainer');
            container.innerHTML = '<div class="loading"></div>';
            
            try {
                const response = await fetch('/api/v1/works');
                if (!response.ok) {
                    throw new Error('加载作品失败');
                }
                
                const result = await response.json();
                if (result.success) {
                    works = result.data;
                    applyFilters();
                } else {
                    showToast('加载作品失败', 'error');
                }
            } catch (error) {
                console.error('加载作品错误:', error);
                showToast('加载作品失败', 'error');
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: rgba(255, 255, 255, 0.5);">加载作品失败，请刷新页面重试</div>';
            }
        }
        
        // 应用筛选和排序
        function applyFilters() {
            filteredWorks = [...works];
            
            // 搜索筛选
            if (currentSearch) {
                const searchLower = currentSearch.toLowerCase();
                filteredWorks = filteredWorks.filter(work => 
                    work.title.toLowerCase().includes(searchLower)
                );
            }
            
            // 分类筛选
            if (currentFilter) {
                filteredWorks = filteredWorks.filter(work => 
                    work.type === currentFilter
                );
            }
            
            // 排序
            const [sortField, sortOrder] = currentSort.split(':');
            filteredWorks.sort((a, b) => {
                const aVal = a[sortField];
                const bVal = b[sortField];
                
                if (aVal < bVal) return sortOrder === 'asc' ? -1 : 1;
                if (aVal > bVal) return sortOrder === 'asc' ? 1 : -1;
                return 0;
            });
            
            // 渲染表格
            renderWorksTable();
        }
        
        // 渲染作品表格
        function renderWorksTable() {
            const container = document.getElementById('worksTableContainer');
            
            if (filteredWorks.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: rgba(255, 255, 255, 0.5);">没有找到符合条件的作品</div>';
                return;
            }
            
            // 分页
            const totalPages = Math.ceil(filteredWorks.length / pageSize);
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const paginatedWorks = filteredWorks.slice(startIndex, endIndex);
            
            // 渲染表格
            const tableHTML = `
                <table class="works-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>封面</th>
                            <th>作品名称</th>
                            <th>分类</th>
                            <th>面积</th>
                            <th>城市</th>
                            <th>浏览量</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${paginatedWorks.map(work => `
                            <tr>
                                <td>${work.id}</td>
                                <td>
                                    <img src="${work.coverImage}" alt="${work.title}" class="img-preview">
                                </td>
                                <td>${work.title}</td>
                                <td>${getCategoryName(work.type)}</td>
                                <td>${work.area}㎡</td>
                                <td>${work.location}</td>
                                <td>${work.views || 0}</td>
                                <td>
                                    <div class="action-buttons" style="display: flex; align-items: center; gap: 15px;">
                                        <!-- 权限控制开关 -->
                                        <div style="display: flex; align-items: center; gap: 8px;">
                                            <span style="font-size: 14px;">公开</span>
                                            <label class="switch">
                                                <input type="checkbox" ${work.isPublic ? 'checked' : ''} onchange="toggleWorkPermission(${work.id}, this.checked)">
                                                <span class="slider round"></span>
                                            </label>
                                        </div>
                                        <button class="btn btn-sm btn-secondary" onclick="editWork(${work.id})">
                                            编辑
                                        </button>
                                        <button class="btn btn-sm btn-danger" onclick="deleteWork(${work.id})">
                                            删除
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
                
                <!-- 分页 -->
                <div class="pagination">
                    <button onclick="changePage(1)" ${currentPage === 1 ? 'disabled' : ''}>
                        首页
                    </button>
                    <button onclick="changePage(currentPage - 1)" ${currentPage === 1 ? 'disabled' : ''}>
                        上一页
                    </button>
                    
                    ${Array.from({ length: totalPages }, (_, i) => i + 1).map(page => `
                        <button 
                            onclick="changePage(${page})" 
                            class="${currentPage === page ? 'active' : ''}"
                        >
                            ${page}
                        </button>
                    `).join('')}
                    
                    <button onclick="changePage(currentPage + 1)" ${currentPage === totalPages ? 'disabled' : ''}>
                        下一页
                    </button>
                    <button onclick="changePage(totalPages)" ${currentPage === totalPages ? 'disabled' : ''}>
                        末页
                    </button>
                    <span style="color: rgba(255, 255, 255, 0.6); margin-left: 20px;">
                        共 ${filteredWorks.length} 件作品，第 ${currentPage} / ${totalPages} 页
                    </span>
                </div>
            `;
            
            container.innerHTML = tableHTML;
        }
        
        // 获取分类名称
        function getCategoryName(type) {
            const categoryMap = {
                'residential': '家装设计',
                'office': '公装设计',
                'commercial': '商业空间',
                'other': '其他'
            };
            return categoryMap[type] || type;
        }
        
        // 搜索处理
        function handleSearch() {
            currentSearch = document.getElementById('searchInput').value;
            currentPage = 1;
            applyFilters();
        }
        
        // 筛选处理
        function handleFilter() {
            currentFilter = document.getElementById('categoryFilter').value;
            currentPage = 1;
            applyFilters();
        }
        
        // 排序处理
        function handleSort() {
            currentSort = document.getElementById('sortSelect').value;
            currentPage = 1;
            applyFilters();
        }
        
        // 分页处理
        function changePage(page) {
            const totalPages = Math.ceil(filteredWorks.length / pageSize);
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                renderWorksTable();
            }
        }
        
        // 打开添加模态框
        function openAddModal() {
            document.getElementById('modalTitle').textContent = '添加作品';
            document.getElementById('worksForm').reset();
            document.getElementById('workId').value = '';
            
            // 重置图片上传状态
            resetImageUpload();
            
            document.getElementById('worksModal').classList.add('active');
        }
        
        // 关闭模态框
        function closeModal() {
            document.getElementById('worksModal').classList.remove('active');
        }
        
        // 编辑作品
        function editWork(id) {
            const work = works.find(w => w.id === id);
            if (!work) return;
            
            // 重置图片上传状态
            resetImageUpload();
            
            document.getElementById('modalTitle').textContent = '编辑作品';
            document.getElementById('workId').value = work.id;
            document.getElementById('workTitle').value = work.title;
            document.getElementById('workType').value = work.type;
            document.getElementById('workArea').value = work.area;
            document.getElementById('workLocation').value = work.location;
            document.getElementById('workCover').value = work.coverImage;
            document.getElementById('workDescription').value = work.description;
            // 加载富文本内容
            loadRichTextContent(work.description);
            document.getElementById('workDesignPeriod').value = work.designPeriod || '';
            document.getElementById('workStyle').value = work.style || '';
            document.getElementById('workDesignDescription').value = work.designDescription || '';
            document.getElementById('workDesignConcept').value = work.designConcept || '';
            document.getElementById('workFunctionPlanning').value = work.functionPlanning || '';
            document.getElementById('workMaterialSelection').value = work.materialSelection || '';
            document.getElementById('workHighlights').value = work.highlights ? work.highlights.join('\n') : '';
            document.getElementById('workSpaceType').value = work.spaceType || '';
            
            // 更新封面图片预览
            if (work.coverImage) {
                const coverPreview = document.getElementById('coverPreview');
                const previewPlaceholder = coverPreview.querySelector('.preview-placeholder');
                const coverPreviewImg = document.getElementById('coverPreviewImg');
                
                // 隐藏占位符，显示图片
                previewPlaceholder.style.display = 'none';
                coverPreviewImg.src = work.coverImage;
                coverPreviewImg.style.display = 'block';
            }
            
            // 更新作品图片预览，使用现有的uploadedImages数组
            if (work.images && work.images.length > 0) {
                // 重置uploadedImages数组
                uploadedImages = [];
                
                // 将work.images转换为uploadedImages格式
                work.images.forEach((url, index) => {
                    uploadedImages.push({
                        id: Date.now() + index,
                        url: url,
                        name: `作品图片 ${index + 1}`
                    });
                });
                
                // 渲染图片预览
                renderUploadedImages();
                updateImagesInput();
                
                // 隐藏上传占位符
                if (uploadedImages.length > 0) {
                    document.querySelector('.upload-placeholder').style.display = 'none';
                }
            }
            
            document.getElementById('worksModal').classList.add('active');
        }
        
        // 富文本编辑器功能
        function format(command, value = null) {
            document.execCommand(command, false, value);
        }
        
        function clearContent() {
            document.getElementById('editorContent').innerHTML = '';
        }
        
        function insertImage() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                try {
                    const formData = new FormData();
                    formData.append('image', file);
                    
                    const response = await fetch('/api/v1/upload', {
                        method: 'POST',
                        body: formData
                    });
                    
                    const result = await response.json();
                    if (result.success) {
                        const img = document.createElement('img');
                        img.src = result.data.url;
                        img.alt = '作品图片';
                        document.execCommand('insertHTML', false, img.outerHTML);
                    } else {
                        showToast('上传图片失败', 'error');
                    }
                } catch (error) {
                    console.error('上传图片错误:', error);
                    showToast('上传图片失败', 'error');
                }
            };
            input.click();
        }
        
        // 保存富文本内容到隐藏输入框
        function saveRichTextContent() {
            const editorContent = document.getElementById('editorContent').innerHTML;
            document.getElementById('workDescription').value = editorContent;
        }
        
        // 加载富文本内容
        function loadRichTextContent(content) {
            document.getElementById('editorContent').innerHTML = content || '';
        }
        
        // 删除作品
        async function deleteWork(id) {
            if (confirm('确定要删除这件作品吗？此操作不可恢复。')) {
                try {
                    const response = await fetch(`/api/v1/works/${id}`, {
                        method: 'DELETE'
                    });
                    
                    const result = await response.json();
                    if (result.success) {
                        showToast('删除成功', 'success');
                        loadWorks(); // 重新加载作品列表
                    } else {
                        showToast('删除失败', 'error');
                    }
                } catch (error) {
                    console.error('删除作品错误:', error);
                    showToast('删除失败', 'error');
                }
            }
        }
        
        // 提交表单
        async function submitForm(event) {
            event.preventDefault();
            
            // 保存富文本内容
            saveRichTextContent();
            
            const formData = new FormData(event.target);
            const workId = document.getElementById('workId').value;
            
            try {
                // 构建作品数据
                const workData = {
                    title: document.getElementById('workTitle').value,
                    type: document.getElementById('workType').value,
                    area: parseFloat(document.getElementById('workArea').value),
                    location: document.getElementById('workLocation').value,
                    coverImage: document.getElementById('workCover').value,
                    images: JSON.parse(document.getElementById('workImages').value),
                    description: document.getElementById('workDescription').value,
                    designPeriod: document.getElementById('workDesignPeriod').value,
                    style: document.getElementById('workStyle').value,
                    designDescription: document.getElementById('workDesignDescription').value,
                    designConcept: document.getElementById('workDesignConcept').value,
                    functionPlanning: document.getElementById('workFunctionPlanning').value,
                    materialSelection: document.getElementById('workMaterialSelection').value,
                    highlights: document.getElementById('workHighlights').value.split('\n').filter(line => line.trim() !== ''),
                    spaceType: document.getElementById('workSpaceType').value
                };
                
                // 前端验证
                if (isNaN(workData.area) || workData.area <= 0) {
                    showToast('面积必须是有效的正数', 'error');
                    return;
                }
                
                let response;
                if (workId) {
                    // 编辑作品
                    response = await fetch(`/api/v1/works/${workId}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(workData)
                    });
                } else {
                    // 添加作品
                    response = await fetch('/api/v1/works', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(workData)
                    });
                }
                
                // 调试日志
                console.log('Response status:', response.status);
                
                // 处理未授权错误
                if (response.status === 401) {
                    showToast('登录已过期，请重新登录', 'error');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1500);
                    return;
                }
                
                const result = await response.json();
                console.log('Response result:', result);
                
                if (result.success) {
                    showToast(workId ? '编辑成功' : '添加成功', 'success');
                    closeModal();
                    loadWorks(); // 重新加载作品列表
                } else {
                    showToast(workId ? `编辑失败: ${result.message}` : `添加失败: ${result.message}`, 'error');
                }
            } catch (error) {
                console.error('提交表单错误:', error);
                showToast(`操作失败: ${error.message}`, 'error');
            }
        }
        
        // 图片上传相关状态
        let uploadedImages = [];
        
        // 处理封面图片选择
        function handleCoverImageChange(event) {
            const file = event.target.files[0];
            if (file) {
                // 验证文件类型和大小
                if (!validateImageFile(file)) {
                    return;
                }
                
                // 读取文件并显示预览
                const reader = new FileReader();
                reader.onload = function(e) {
                    const coverPreview = document.getElementById('coverPreview');
                    const coverPreviewImg = document.getElementById('coverPreviewImg');
                    const coverPlaceholder = coverPreview.querySelector('.preview-placeholder');
                    
                    coverPlaceholder.style.display = 'none';
                    coverPreviewImg.style.display = 'block';
                    coverPreviewImg.src = e.target.result;
                    
                    // 设置隐藏输入框的值
                    document.getElementById('workCover').value = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }
        
        // 处理作品图片选择
        function handleImagesChange(event) {
            const files = Array.from(event.target.files);
            handleImageFiles(files);
        }
        
        // 处理拖放事件
        function handleDragOver(event) {
            event.preventDefault();
            event.currentTarget.classList.add('dragover');
        }
        
        // 处理拖放完成事件
        function handleDrop(event) {
            event.preventDefault();
            event.currentTarget.classList.remove('dragover');
            
            const files = Array.from(event.dataTransfer.files);
            handleImageFiles(files);
        }
        
        // 处理图片文件
        function handleImageFiles(files) {
            // 过滤有效的图片文件
            const validFiles = files.filter(file => validateImageFile(file));
            
            if (validFiles.length === 0) {
                return;
            }
            
            // 显示上传进度
            showUploadProgress();
            
            // 模拟上传过程
            let uploadedCount = 0;
            const totalFiles = validFiles.length;
            
            validFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    uploadedCount++;
                    
                    // 更新进度
                    updateUploadProgress(uploadedCount / totalFiles);
                    
                    // 添加到已上传图片列表
                    const imageData = {
                        id: Date.now() + Math.random(),
                        url: e.target.result,
                        name: file.name
                    };
                    uploadedImages.push(imageData);
                    
                    // 更新显示
                    renderUploadedImages();
                    updateImagesInput();
                    
                    // 所有文件上传完成
                    if (uploadedCount === totalFiles) {
                        setTimeout(() => {
                            hideUploadProgress();
                        }, 500);
                    }
                };
                reader.readAsDataURL(file);
            });
        }
        
        // 验证图片文件
        function validateImageFile(file) {
            // 验证文件类型
            const allowedTypes = ['image/jpeg', 'image/png', 'image/jpg'];
            if (!allowedTypes.includes(file.type)) {
                showToast('只允许上传 .jpg, .png, .jpeg 格式的图片', 'error');
                return false;
            }
            
            // 验证文件大小 (5MB)
            const maxSize = 5 * 1024 * 1024;
            if (file.size > maxSize) {
                showToast('单张图片大小不能超过 5MB', 'error');
                return false;
            }
            
            return true;
        }
        
        // 显示上传进度
        function showUploadProgress() {
            const uploadPlaceholder = document.getElementById('imagesUploadArea').querySelector('.upload-placeholder');
            const uploadProgress = document.getElementById('uploadProgress');
            
            uploadPlaceholder.style.display = 'none';
            uploadProgress.style.display = 'flex';
        }
        
        // 隐藏上传进度
        function hideUploadProgress() {
            const uploadPlaceholder = document.getElementById('imagesUploadArea').querySelector('.upload-placeholder');
            const uploadProgress = document.getElementById('uploadProgress');
            
            uploadProgress.style.display = 'none';
            uploadPlaceholder.style.display = 'flex';
        }
        
        // 更新上传进度
        function updateUploadProgress(progress) {
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');
            const percentage = Math.round(progress * 100);
            
            progressBar.style.width = `${percentage}%`;
            progressText.textContent = `${percentage}%`;
        }
        
        // 渲染已上传图片
        function renderUploadedImages() {
            const container = document.getElementById('uploadedImages');
            container.innerHTML = '';
            
            uploadedImages.forEach(image => {
                const imageItem = document.createElement('div');
                imageItem.className = 'uploaded-image-item';
                
                imageItem.innerHTML = `
                    <img src="${image.url}" alt="${image.name}" class="uploaded-image">
                    <button class="remove-image" onclick="removeImage(${image.id})">×</button>
                `;
                
                container.appendChild(imageItem);
            });
        }
        
        // 删除图片
        function removeImage(id) {
            uploadedImages = uploadedImages.filter(image => image.id !== id);
            renderUploadedImages();
            updateImagesInput();
        }
        
        // 更新图片输入框
        function updateImagesInput() {
            const urls = uploadedImages.map(image => image.url);
            document.getElementById('workImages').value = JSON.stringify(urls);
        }
        
        // 重置图片上传状态
        function resetImageUpload() {
            uploadedImages = [];
            renderUploadedImages();
            updateImagesInput();
            
            // 重置封面预览
            const coverPreview = document.getElementById('coverPreview');
            const coverPreviewImg = document.getElementById('coverPreviewImg');
            const coverPlaceholder = coverPreview.querySelector('.preview-placeholder');
            
            coverPreviewImg.style.display = 'none';
            coverPlaceholder.style.display = 'flex';
            document.getElementById('workCover').value = '';
            
            // 重置上传占位符
            const uploadPlaceholder = document.querySelector('.upload-placeholder');
            if (uploadPlaceholder) {
                uploadPlaceholder.style.display = 'flex';
            }
        }
        
        // 编辑作品时加载图片
        function loadWorkImages(work) {
            // 加载封面图片
            if (work.coverImage) {
                const coverPreview = document.getElementById('coverPreview');
                const coverPreviewImg = document.getElementById('coverPreviewImg');
                const coverPlaceholder = coverPreview.querySelector('.preview-placeholder');
                
                coverPlaceholder.style.display = 'none';
                coverPreviewImg.style.display = 'block';
                coverPreviewImg.src = work.coverImage;
                document.getElementById('workCover').value = work.coverImage;
            }
            
            // 加载作品图片
            if (work.images && work.images.length > 0) {
                uploadedImages = work.images.map((url, index) => ({
                    id: Date.now() + index,
                    url: url,
                    name: `作品图片 ${index + 1}`
                }));
                renderUploadedImages();
                updateImagesInput();
            }
        }
        
        // 显示通知
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} active`;
            
            setTimeout(() => {
                toast.classList.remove('active');
            }, 3000);
        }
        
        // 切换作品权限状态
        async function toggleWorkPermission(id, isPublic) {
            try {
                const response = await fetch(`/api/v1/works/${id}/permission`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ isPublic })
                });
                
                // 检查响应状态
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                // 检查响应是否为JSON
                const contentType = response.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    throw new Error('Response is not JSON');
                }
                
                const result = await response.json();
                if (result.success) {
                    showToast('权限状态更新成功', 'success');
                    // 更新本地作品数据
                    const work = works.find(w => w.id === id);
                    if (work) {
                        work.isPublic = isPublic;
                        work.updatedAt = new Date().toISOString();
                    }
                    // 重新渲染表格
                    renderWorksTable();
                } else {
                    showToast('权限状态更新失败', 'error');
                }
            } catch (error) {
                console.error('切换作品权限状态错误:', error);
                showToast('操作失败，请检查网络连接或重新登录', 'error');
            }
        }
        
        // 点击模态框外部关闭
        window.addEventListener('click', (e) => {
            const modal = document.getElementById('worksModal');
            if (e.target === modal) {
                closeModal();
            }
        });
    </script>
</body>
</html>
