<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类管理 - 布珥·迈拓空间设计</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #1a2430;
            color: #ffffff;
            display: flex;
            min-height: 100vh;
            line-height: 1.6;
        }
        
        /* 侧边栏样式 */
        .sidebar {
            width: 240px;
            background-color: #151e29;
            padding: 20px 0;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo img {
            width: 80px;
            height: 80px;
            border-radius: 8px;
        }

        .nav-menu {
            margin-top: 30px;
        }

        .nav-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .nav-item.active {
            background-color: rgba(153, 0, 0, 0.2);
            border-left-color: #990000;
        }

        .nav-item a {
            color: #ffffff;
            text-decoration: none;
            display: flex;
            align-items: center;
            font-size: 16px;
        }

        .nav-item i {
            margin-right: 12px;
            font-size: 18px;
        }
        
        /* 主内容区域 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-left: 240px;
        }
        
        /* 顶部导航栏 */
        .top-nav {
            height: 80px;
            background-color: #151e29;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
        }
        
        .nav-left {
            display: flex;
            align-items: center;
        }
        
        .nav-title {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }
        
        .nav-right {
            display: flex;
            align-items: center;
            gap: 30px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 24px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .user-info:hover {
            background-color: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #ffffff;
            border: 2px solid #cc0000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #cc0000;
            margin-right: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .user-info:hover .user-avatar {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(204, 0, 0, 0.3);
        }
        
        .user-details {
            text-align: right;
            transition: all 0.3s ease;
        }
        
        .user-name {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 2px;
        }
        
        .user-role {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
        }
        
        .user-info:hover .user-role {
            color: rgba(255, 255, 255, 0.9);
        }
        
        /* 用户信息更新动画 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .user-info.updated {
            animation: fadeIn 0.5s ease;
        }
        
        /* 内容区域 */
        .content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background-color: #1a2430;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            border: none;
        }

        .btn-primary {
            background-color: #990000;
            color: #fff;
        }

        .btn-primary:hover {
            background-color: #cc0000;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 14px;
        }

        .btn-danger {
            background-color: #cc0000;
            color: #fff;
        }

        .btn-danger:hover {
            background-color: #a30000;
        }
        
        /* 分类管理 */
        .categories-container {
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* 筛选和搜索区域 */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            align-items: center;
        }
        
        .search-box {
            display: flex;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px 15px;
        }
        
        .search-box input {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 16px;
            outline: none;
            margin-left: 10px;
            width: 200px;
        }
        
        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        
        /* 分类列表 */
        .categories-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }
        
        .categories-table th,
        .categories-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .categories-table th {
            font-weight: bold;
            color: #fff;
            background-color: rgba(255, 255, 255, 0.05);
        }
        
        .categories-table td {
            color: rgba(255, 255, 255, 0.8);
        }
        
        .categories-table tbody tr:hover {
            background-color: rgba(153, 0, 0, 0.1);
        }
        
        /* 操作按钮 */
        .action-links {
            display: flex;
            gap: 10px;
        }
        
        .action-link {
            color: #990000;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
        }
        
        .action-link:hover {
            text-decoration: underline;
        }
        
        /* 分页 */
        .pagination {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            margin-top: 30px;
        }
        
        .pagination button {
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .pagination button:hover {
            background-color: rgba(255, 255, 255, 0.15);
        }
        
        .pagination button.active {
            background-color: #990000;
            border-color: #990000;
        }
        
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: #1a2430;
            border-radius: 8px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: bold;
        }

        .close {
            color: rgba(255, 255, 255, 0.6);
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: white;
        }
        
        /* 表单样式 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: white;
            font-size: 14px;
        }

        .form-input:focus {
            outline: none;
            border-color: #990000;
        }

        .form-input option {
            background-color: #1a2430;
            color: white;
        }

        .form-textarea {
            width: 100%;
            padding: 12px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: white;
            font-size: 14px;
            resize: vertical;
            min-height: 100px;
        }

        .form-textarea:focus {
            outline: none;
            border-color: #990000;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 30px;
        }
        
        /* 加载状态 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        
        .loading::after {
            content: '';
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #990000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        
        /* 通知提示 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: #fff;
            font-weight: 500;
            z-index: 2000;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.3s ease;
        }

        .toast.active {
            opacity: 1;
            transform: translateX(0);
        }

        .toast.success {
            background-color: #4caf50;
        }

        .toast.error {
            background-color: #cc0000;
        }

        .toast.info {
            background-color: #2196f3;
        }
        
        /* 响应式设计 */
        @media (max-width: 1200px) {
            .filter-bar {
                flex-direction: column;
                align-items: stretch;
            }
            
            .categories-table {
                font-size: 14px;
            }
            
            .categories-table th,
            .categories-table td {
                padding: 10px;
            }
        }
        
        @media (max-width: 768px) {
            .sidebar {
                width: 240px;
            }
            
            .main-content {
                padding: 20px;
            }
            
            .categories-container {
                padding: 20px;
            }
            
            .categories-table {
                display: block;
                overflow-x: auto;
            }
            
            .pagination {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
        
        @media (max-width: 576px) {
            .sidebar {
                width: 100%;
                position: fixed;
                left: -100%;
                z-index: 1000;
            }
            
            .sidebar.open {
                left: 0;
            }
            
            .main-content {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <aside class="sidebar">
        <div class="logo">
            <img src="/images/logo.png" alt="Logo">
        </div>
        <nav class="nav-menu">
            <div class="nav-item">
                <a href="/dashboard">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>仪表盘</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="/brand-edit">
                    <i class="fas fa-edit"></i>
                    <span>品牌管理</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="/works">
                    <i class="fas fa-palette"></i>
                    <span>作品管理</span>
                </a>
            </div>
            <div class="nav-item active">
                <a href="/categories">
                    <i class="fas fa-list"></i>
                    <span>分类管理</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="/leads">
                    <i class="fas fa-handshake"></i>
                    <span>线索管理</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="/customers">
                    <i class="fas fa-users"></i>
                    <span>客户管理</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="/stats">
                    <i class="fas fa-chart-bar"></i>
                    <span>数据统计</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="/settings">
                    <i class="fas fa-cog"></i>
                    <span>系统设置</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="/users">
                    <i class="fas fa-user-cog"></i>
                    <span>操作员管理</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="/logout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>退出登录</span>
                </a>
            </div>
        </nav>
    </aside>
    
    <!-- 主内容区域 -->
    <div class="main-content">
        <!-- 顶部导航栏 -->
        <div class="top-nav">
            <div class="nav-left">
                <div class="nav-title">分类管理</div>
            </div>
            <div class="nav-right">
                <button class="btn btn-primary" onclick="openAddModal()">
                    + 添加分类
                </button>
                <div class="user-info" id="userInfoContainer">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">管理员</div>
                        <div class="user-role" id="userRole">系统管理员</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 内容区域 -->
        <div class="content">
            <div class="categories-container">
                <!-- 筛选和搜索区域 -->
                <div class="filter-bar">
                    <div class="search-box">
                        <span>🔍</span>
                        <input type="text" id="searchInput" placeholder="搜索分类名称..." oninput="handleSearch()">
                    </div>
                </div>
                
                <!-- 分类列表 -->
                <div id="categoriesTableContainer">
                    <div class="loading"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 添加/编辑分类模态框 -->
    <div class="modal" id="categoriesModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">添加分类</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            
            <form id="categoriesForm" onsubmit="submitForm(event)">
                <input type="hidden" id="categoryId">
                
                <div class="form-group">
                    <label class="form-label" for="categoryName">分类名称</label>
                    <input type="text" class="form-input" id="categoryName" name="name" required placeholder="请输入分类名称">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="categorySlug">分类标识</label>
                    <input type="text" class="form-input" id="categorySlug" name="slug" required placeholder="请输入分类标识（英文或数字）">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="categoryDescription">分类描述</label>
                    <textarea class="form-input form-textarea" id="categoryDescription" name="description" placeholder="请输入分类描述"></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 通知提示 -->
    <div class="toast" id="toast"></div>
    
    <script>
        // 全局状态
        let categories = [];
        let filteredCategories = [];
        let currentPage = 1;
        const pageSize = 10;
        let currentSearch = '';
        
        // 加载当前用户信息
        async function loadCurrentUserInfo() {
            try {
                const response = await fetch('/api/v1/users/current');
                
                if (!response.ok) {
                    if (response.status === 401) {
                        // 未授权，重定向到登录页面
                        console.log('未授权访问，重定向到登录页面');
                        window.location.href = '/login';
                        return null;
                    }
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const result = await response.json();
                
                if (result.success && result.data) {
                    return result.data;
                } else {
                    console.error('获取用户信息失败:', result.message || '未知错误');
                    return null;
                }
            } catch (error) {
                console.error('获取用户信息出错:', error.message);
                return null;
            }
        }
        
        // 更新用户信息显示
        function updateUserInfoDisplay(userInfo) {
            if (!userInfo) {
                return;
            }
            
            const { id, username, role, permissions } = userInfo;
            
            const userInfoContainer = document.getElementById('userInfoContainer');
            const userAvatar = document.getElementById('userAvatar');
            const userName = document.getElementById('userName');
            const userRole = document.getElementById('userRole');
            
            if (userAvatar) {
                userAvatar.textContent = id || 'A';
            }
            
            if (userName) {
                userName.textContent = username || '未知用户';
            }
            
            if (userRole) {
                const roleMap = {
                    'admin': '系统管理员',
                    'editor': '编辑员',
                    'viewer': '查看员'
                };
                userRole.textContent = roleMap[role] || '普通用户';
            }
            
            // 添加更新动画效果
            if (userInfoContainer) {
                userInfoContainer.classList.add('updated');
                setTimeout(() => {
                    userInfoContainer.classList.remove('updated');
                }, 500);
            }
            
            // 根据权限更新导航菜单
            updateNavigationBasedOnPermissions(permissions, role);
        }
        
        // 根据权限更新导航菜单
        function updateNavigationBasedOnPermissions(permissions, role) {
            // 导航项与权限的映射关系
            const navPermissionMap = {
                'dashboard': 'dashboard',
                'brand-edit': 'brand',
                'works': 'works',
                'categories': 'categories',
                'leads': 'leads',
                'customers': 'customers',
                'stats': 'stats',
                'settings': 'settings',
                'users': 'users'
            };
            
            // 获取所有导航项
            const navItems = document.querySelectorAll('.nav-item');
            
            navItems.forEach(navItem => {
                const link = navItem.querySelector('a');
                if (link) {
                    const href = link.getAttribute('href');
                    // 提取路径部分（去掉开头的/）
                    const path = href.substring(1);
                    
                    // 检查是否需要权限控制（排除退出登录）
                    if (path !== 'logout') {
                        const requiredPermission = navPermissionMap[path];
                        
                        // 管理员角色或有对应权限的用户可以看到该导航项
                        if (role === 'admin' || (permissions && permissions[requiredPermission])) {
                            navItem.style.display = 'block';
                        } else {
                            navItem.style.display = 'none';
                        }
                    }
                }
            });
        }
        
        // 初始化页面
        document.addEventListener('DOMContentLoaded', async () => {
            loadCategories();
            
            // 加载当前用户信息
            const userInfo = await loadCurrentUserInfo();
            updateUserInfoDisplay(userInfo);
            
            // 设置定时刷新用户信息，每5分钟更新一次
            setInterval(async () => {
                const updatedUserInfo = await loadCurrentUserInfo();
                updateUserInfoDisplay(updatedUserInfo);
            }, 300000);
        });
        
        // 加载分类数据
        async function loadCategories() {
            const container = document.getElementById('categoriesTableContainer');
            container.innerHTML = '<div class="loading"></div>';
            
            try {
                const response = await fetch('/api/v1/categories');
                if (!response.ok) {
                    throw new Error('加载分类失败');
                }
                
                const result = await response.json();
                if (result.success) {
                    categories = result.data;
                    applyFilters();
                } else {
                    showToast('加载分类失败', 'error');
                }
            } catch (error) {
                console.error('加载分类错误:', error);
                showToast('加载分类失败', 'error');
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: rgba(255, 255, 255, 0.5);">加载分类失败，请刷新页面重试</div>';
            }
        }
        
        // 应用筛选
        function applyFilters() {
            filteredCategories = [...categories];
            
            // 搜索筛选
            if (currentSearch) {
                const searchLower = currentSearch.toLowerCase();
                filteredCategories = filteredCategories.filter(category => 
                    category.name.toLowerCase().includes(searchLower) ||
                    category.slug.toLowerCase().includes(searchLower)
                );
            }
            
            // 渲染表格
            renderCategoriesTable();
        }
        
        // 渲染分类表格
        function renderCategoriesTable() {
            const container = document.getElementById('categoriesTableContainer');
            
            if (filteredCategories.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: rgba(255, 255, 255, 0.5);">没有找到符合条件的分类</div>';
                return;
            }
            
            // 分页
            const totalPages = Math.ceil(filteredCategories.length / pageSize);
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const paginatedCategories = filteredCategories.slice(startIndex, endIndex);
            
            // 渲染表格
            const tableHTML = `
                <table class="categories-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>分类名称</th>
                            <th>分类标识</th>
                            <th>描述</th>
                            <th>作品数量</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${paginatedCategories.map(category => `
                            <tr>
                                <td>${category.id}</td>
                                <td>${category.name}</td>
                                <td>${category.slug}</td>
                                <td>${category.description || '-'}</td>
                                <td>${category.worksCount || 0}</td>
                                <td>${new Date(category.createdAt).toLocaleDateString()}</td>
                                <td>
                                    <div class="action-buttons">
                                        <button class="btn btn-sm btn-secondary" onclick="editCategory(${category.id})">
                                            编辑
                                        </button>
                                        <button class="btn btn-sm btn-danger" onclick="deleteCategory(${category.id})">
                                            删除
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
                
                <!-- 分页 -->
                <div class="pagination">
                    <button onclick="changePage(1)" ${currentPage === 1 ? 'disabled' : ''}>
                        首页
                    </button>
                    <button onclick="changePage(currentPage - 1)" ${currentPage === 1 ? 'disabled' : ''}>
                        上一页
                    </button>
                    
                    ${Array.from({ length: totalPages }, (_, i) => i + 1).map(page => `
                        <button 
                            onclick="changePage(${page})" 
                            class="${currentPage === page ? 'active' : ''}"
                        >
                            ${page}
                        </button>
                    `).join('')}
                    
                    <button onclick="changePage(currentPage + 1)" ${currentPage === totalPages ? 'disabled' : ''}>
                        下一页
                    </button>
                    <button onclick="changePage(totalPages)" ${currentPage === totalPages ? 'disabled' : ''}>
                        末页
                    </button>
                    <span style="color: rgba(255, 255, 255, 0.6); margin-left: 20px;">
                        共 ${filteredCategories.length} 个分类，第 ${currentPage} / ${totalPages} 页
                    </span>
                </div>
            `;
            
            container.innerHTML = tableHTML;
        }
        
        // 搜索处理
        function handleSearch() {
            currentSearch = document.getElementById('searchInput').value;
            currentPage = 1;
            applyFilters();
        }
        
        // 分页处理
        function changePage(page) {
            const totalPages = Math.ceil(filteredCategories.length / pageSize);
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                renderCategoriesTable();
            }
        }
        
        // 打开添加模态框
        function openAddModal() {
            document.getElementById('modalTitle').textContent = '添加分类';
            document.getElementById('categoriesForm').reset();
            document.getElementById('categoryId').value = '';
            document.getElementById('categoriesModal').classList.add('active');
        }
        
        // 关闭模态框
        function closeModal() {
            document.getElementById('categoriesModal').classList.remove('active');
        }
        
        // 编辑分类
        function editCategory(id) {
            const category = categories.find(c => c.id === id);
            if (!category) return;
            
            document.getElementById('modalTitle').textContent = '编辑分类';
            document.getElementById('categoryId').value = category.id;
            document.getElementById('categoryName').value = category.name;
            document.getElementById('categorySlug').value = category.slug;
            document.getElementById('categoryDescription').value = category.description;
            
            document.getElementById('categoriesModal').classList.add('active');
        }
        
        // 删除分类
        async function deleteCategory(id) {
            if (confirm('确定要删除这个分类吗？此操作不可恢复。')) {
                try {
                    const response = await fetch(`/api/v1/categories/${id}`, {
                        method: 'DELETE'
                    });
                    
                    const result = await response.json();
                    if (result.success) {
                        showToast('删除分类成功', 'success');
                        loadCategories(); // 重新加载分类列表
                    } else {
                        showToast('删除分类失败', 'error');
                    }
                } catch (error) {
                    console.error('删除分类错误:', error);
                    showToast('删除分类失败', 'error');
                }
            }
        }
        
        // 提交表单
        async function submitForm(event) {
            event.preventDefault();
            
            const categoryId = document.getElementById('categoryId').value;
            
            try {
                // 构建分类数据
                const categoryData = {
                    name: document.getElementById('categoryName').value,
                    slug: document.getElementById('categorySlug').value,
                    description: document.getElementById('categoryDescription').value
                };
                
                let response;
                if (categoryId) {
                    // 编辑分类
                    response = await fetch(`/api/v1/categories/${categoryId}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(categoryData)
                    });
                } else {
                    // 添加分类
                    response = await fetch('/api/v1/categories', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(categoryData)
                    });
                }
                
                const result = await response.json();
                if (result.success) {
                    showToast(categoryId ? '编辑分类成功' : '添加分类成功', 'success');
                    closeModal();
                    loadCategories(); // 重新加载分类列表
                } else {
                    showToast(categoryId ? '编辑分类失败' : '添加分类失败', 'error');
                }
            } catch (error) {
                console.error('提交表单错误:', error);
                showToast('操作失败，请检查输入格式', 'error');
            }
        }
        
        // 显示通知
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} active`;
            
            setTimeout(() => {
                toast.classList.remove('active');
            }, 3000);
        }
        
        // 点击模态框外部关闭
        window.addEventListener('click', (e) => {
            const modal = document.getElementById('categoriesModal');
            if (e.target === modal) {
                closeModal();
            }
        });
    </script>
</body>
</html>
